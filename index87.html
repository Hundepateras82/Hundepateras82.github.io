<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SYSTEM 0.8.6">
    <title>SYSTEM V0.8.6: RESTORED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg-base: #0c0c12; --lavender: #b4a8d4; --mint: #8abfcc;
            --pink: #c49090; --gold: #c8b98a; --border-glass: rgba(180,168,212,0.12);
        }
        body { 
            background: var(--bg-base); color: var(--lavender); font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            padding-top: calc(env(safe-area-inset-top) + 5px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
        }
        .font-sys { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: linear-gradient(145deg, rgba(18,18,24,0.9) 0%, rgba(12,12,18,0.95) 100%);
            border: 1px solid var(--border-glass); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); border-radius: 16px;
        }
        .btn-aaa {
            background: linear-gradient(90deg, rgba(180,168,212,0.1), rgba(138,191,204,0.1));
            border: 1px solid var(--border-glass); color: var(--mint); transition: all 0.2s;
        }
        .btn-aaa:active { transform: scale(0.97); }
        .progress-bar { transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .active-tab { display: block; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(5px); } }
        
        /* Historia y Gráficas */
        .story-glow { border: 1px solid #fff700 !important; box-shadow: 0 0 15px rgba(255,247,0,0.4); cursor: pointer; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        .chart-svg { width: 100%; height: 80px; stroke: var(--mint); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .record-highlight { background: rgba(255,247,0,0.15); color: #fff700; font-weight: bold; border-left: 2px solid #fff700; padding-left: 4px; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="px-4">

    <header class="glass-panel p-5 mb-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[var(--mint)] opacity-5 blur-[60px] rounded-full"></div>
        
        <div class="flex justify-between items-start mb-4 relative z-10">
            <div>
                <h1 class="font-sys font-bold text-xl text-[var(--mint)] tracking-wider">SYS<span class="text-[var(--pink)] text-xs ml-1">v0.8.6</span></h1>
                <p class="text-[10px] font-bold mt-1 uppercase text-[var(--gold)]">💰 <span id="hud-gold">0</span>G</p>
                <p id="hud-bonus-txt" class="text-[9px] font-bold mt-1 uppercase text-yellow-400 hidden">⚡ Bono Activo</p>
            </div>
            <div class="text-right">
                <p class="font-sys font-bold text-3xl text-[var(--lavender)]">Tier <span id="hud-tier" class="text-white">I</span></p>
                <p id="hud-next-tier" class="text-[9px] text-[var(--mint)] font-bold uppercase tracking-widest mt-1">Siguiente Tier: H</p>
                <p id="hud-prestige" class="text-[10px] text-[var(--gold)] font-bold mt-1">Ascensión 0</p>
            </div>
        </div>

        <div class="space-y-3 relative z-10">
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-red-300"><span>Reloj Solar</span> <span id="sys-countdown">--:--:--</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full border border-red-900 overflow-hidden">
                    <div id="hud-time-bar" class="progress-bar h-full bg-red-600 shadow-[0_0_8px_red]" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-green-300"><span>EXP</span> <span id="hud-exp-txt">0/1000</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full border border-green-900 overflow-hidden">
                    <div id="hud-exp-bar" class="progress-bar h-full bg-green-500 shadow-[0_0_8px_green]" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-blue-300"><span>MANÁ</span> <span id="hud-mana-txt">10/10</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full border border-blue-900 overflow-hidden">
                    <div id="hud-mana-bar" class="progress-bar h-full bg-blue-500 shadow-[0_0_8px_blue]" style="width: 100%"></div>
                </div>
            </div>
            <div id="mult-container" class="hidden">
                <div class="flex justify-between text-[9px] font-bold mb-1 uppercase text-yellow-400"><span>Poción Exp</span> <span id="hud-mult-txt">x1.0</span></div>
                <div class="h-1 w-full bg-black/50 rounded-full overflow-hidden">
                    <div class="h-full bg-yellow-400 opacity-80 w-full animate-pulse shadow-[0_0_8px_yellow]"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="min-h-[50vh] pb-6"></main>

    <nav class="fixed bottom-0 left-0 w-full glass-panel border-t-0 rounded-t-3xl rounded-b-none p-4 grid grid-cols-5 gap-1 z-40">
        <button onclick="nav('home')" class="flex flex-col items-center nav-btn" id="nav-home"><span class="text-xl mb-1">⛺</span><span class="text-[8px] font-bold uppercase tracking-wider text-[var(--mint)]">Refugio</span></button>
        <button onclick="nav('lab')" class="flex flex-col items-center nav-btn opacity-40" id="nav-lab"><span class="text-xl mb-1">⚗️</span><span class="text-[8px] font-bold uppercase tracking-wider">Lab</span></button>
        <button onclick="nav('dungeon')" class="flex flex-col items-center nav-btn opacity-40" id="nav-dungeon"><span class="text-xl mb-1">⛩️</span><span class="text-[8px] font-bold uppercase tracking-wider">Abismos</span></button>
        <button onclick="nav('forge')" class="flex flex-col items-center nav-btn opacity-40" id="nav-forge"><span class="text-xl mb-1">⚒️</span><span class="text-[8px] font-bold uppercase tracking-wider">Forja</span></button>
        <button onclick="nav('shop')" class="flex flex-col items-center nav-btn" id="nav-shop"><span class="text-xl mb-1">⚖️</span><span class="text-[8px] font-bold uppercase tracking-wider">Tienda</span></button>
    </nav>

    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 glass-panel !rounded-full px-6 py-3 text-xs font-bold uppercase tracking-widest text-[var(--mint)] opacity-0 pointer-events-none transition-opacity duration-300 z-50">GUARDADO</div>

    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex-col justify-center items-center p-6 text-center">
        <div class="glass-panel w-full p-8 relative overflow-hidden">
            <div id="modal-glow" class="absolute inset-0 opacity-20 blur-2xl"></div>
            <div id="modal-icon" class="text-6xl mb-4 relative z-10 drop-shadow-2xl">🔮</div>
            <h3 id="modal-title" class="font-sys text-[12px] font-bold tracking-[0.2em] mb-2 relative z-10">...</h3>
            <p id="modal-desc" class="text-sm text-gray-300 relative z-10 mb-8 font-sys leading-relaxed">...</p>
            <button id="modal-btn" onclick="closeModal()" class="btn-aaa w-full py-4 rounded-xl text-xs font-bold tracking-widest relative z-10 bg-black/50 border border-white/20">ACEPTAR (6s)</button>
        </div>
    </div>

    <script>
        const DB_KEY = 'sys_v0_8_6_save';
        const TIERS = {1:'I', 2:'H', 3:'G', 4:'F', 5:'E', 6:'D', 7:'C', 8:'B', 9:'A', 10:'S'};
        
        const ALL_MATS = [
            ["m1","⛏️","Acero","Se compra en la Tienda o se farmea en Mazmorra Tier I."], ["m2","🐉","Escamas","Droppeado por bestias y comprado en Tienda."], ["m3","🧱","Cobre","Mineral básico de la Forja Tier I."], ["m4","🔩","Hierro","Extraído de gólems en la Mazmorra."], ["m5","🪙","Plata","Moneda antigua fundida. Se encuentra en la Tienda."], ["m6","🥇","Oro Puro","Versión refinada del oro. Raro drop de jefes."], ["m7","💎","Platino","Mineral denso. Mazmorra Maldita Tier II."], ["m8","💠","Mithril","Metal ligero y mágico. Exclusivo de Abismo Profundo Tier III."], ["m9","🪨","Piedra Rúnica","Se obtiene purificando tareas en el Lab Personal."],
            ["m10","🪵","Madera Roble","Material estándar. Tienda Básica."], ["m11","🌿","Hoja Curativa","Cae de monstruos tipo planta en Tier I."], ["m12","☠️","Raíz Venenosa","Mazmorra Maldita. Usada en Alquimia."], ["m13","🌸","Flor Lunar","Florece de noche. Recompensa de misiones."], ["m14","🌻","Semilla Solar","Extraída de monstruos ígneos."], ["m15","🍯","Savia Pétrea","Sangre de Ent. Drop raro de Jefe de Tier I."], ["m16","🦴","Hueso Roto","Común en esqueletos (Tier I)."], ["m17","🦷","Colmillo","De lobos sombra (Tier I/II)."], ["m18","🐾","Piel de Bestia","De quimeras de la Mazmorra."],
            ["m19","👁️","Ojo de Araña","Drop de aracnidos en Tier II."], ["m20","🦇","Ala de Murciélago","Se encuentra en las cuevas del Lab Secreto."], ["m21","😈","Cuerno Demonio","Drop garantizado del Monarca Caído."], ["m22","🩸","Sangre Monstruo","Líquido vital. Exploraciones del Abismo."], ["m23","🔮","Núcleos","Fuente de energía. Exploraciones."], ["m24","✨","Polvo Estelar","Se compra en Tienda o cae de Jefes mágicos."], ["m25","🧊","Cristal Roto","Restos de gólems de hielo (Tier II)."], ["m26","🔥","Esencia Fuego","Elemento puro. Abismo Tier III."], ["m27","❄️","Esencia Hielo","Elemento puro. Abismo Tier III."],
            ["m28","🌪️","Esencia Viento","Drop de arpías en Tier II."], ["m29","🌍","Esencia Tierra","Drop de basiliscos en Tier II."], ["m30","👻","Alma Errante","Sacrificio de diarios en Tier III."], ["m31","🌑","Materia Oscura","Comprado en Bazar Oscuro. Muy raro."], ["m32","⚱️","Ceniza Maldita","Alquimia Oscura. Drop de Liches."], ["m33","🧪","Ectoplasma","Restos espectrales. Exploración de M. Maldita."], ["m34","💧","Lágrima Sirena","Extremadamente raro. Eventos del Lab."], ["m35","🧚","Polvo de Hada","Bazar Oscuro. Sirve para magia de alto nivel."], ["m36","🌋","Azufre","Mazmorra Maldita profunda."]
        ];

        const BOSSES_T1 = ["Duende Ladrón", "Lobo Sombra", "Esqueleto Roto", "Orco Menor"];
        const BOSSES_T2 = ["Caballero Caído", "Liche Menor", "Quimera", "Basilisco"];
        const BOSSES_T3 = ["Dragón de Hueso", "Monarca Caído", "Guardián de Puerta", "General Sangriento", "Rey Aric"];

        const W_P1 = ["Filo", "Espada", "Hacha", "Cuerno", "Garra", "Martillo", "Daga", "Lanza", "Cetro", "Guadaña"];
        const W_P2 = ["del Demonio", "Vampiresco", "Roto", "de Luz", "Sombrío", "del Rey", "Abisal", "Sangriento", "Maldito", "Antiguo"];
        
        let ALL_WEAPONS = [];
        for(let i=1; i<=100; i++) {
            let n = `${W_P1[i%10]} ${W_P2[Math.floor((i-1)/10)%10]}`;
            if(i === 1) n = "Daga Oxidada";
            if(i === 2) n = "Espada Corta";
            if(i === 100) n = "Matadioses";
            ALL_WEAPONS.push({id:`w_sys_${i}`, name: n, atk: i*5, reqTier: Math.ceil(i/10)});
        }

        const STORY_TITLES = ["El Exilio", "Impuestos de Sangre", "La Alianza Subterránea", "Cazadores Reales", "El Pacto Abisal", "Sangre y Barro", "Ecos Antiguos", "El Asedio", "La Guardia Caída", "Sangre de mi Sangre"];
        const STORY_TEXT = [
            "Tu hermano, el Rey Aric, consumió la magia del reino para volverse inmortal. Por oponerte, te arrebató tus títulos y te exilió a los páramos oscuros. No tienes nada, salvo tu vida y tu voluntad.",
            "En los páramos, descubres la verdad. Aric no usa magia común; drena la fuerza vital de los campesinos. Las aldeas están muriendo. El reino se marchita mientras él brilla de juventud.",
            "Has encontrado un refugio en las antiguas catacumbas. Aquí, los olvidados y marginados te han nombrado su campeón. Si quieres recuperar el trono, necesitas entrenar tu cuerpo y tu maná.",
            "Aric sabe que sigues vivo. Ha enviado a sus Perros de Sangre a las mazmorras para cazarte. Las peleas se vuelven más duras, pero cada asesino que derrotas te hace más fuerte.",
            "Interrogando a un asesino moribundo, descubres el origen del poder de Aric. Hizo un trato con los Señores del Abismo Profundo. Su alma ya no le pertenece, es un mero títere de la oscuridad.",
            "Intentaste emboscar una caravana de suministros del Rey. Fue una trampa. Aric en persona apareció. Casi te mata, dejándote una cicatriz arcana que quema cuando usas maná. Ahora es personal.",
            "Te has adentrado más profundo que cualquier mortal en la Forja Primigenia. Estás forjando tu voluntad y tu equipo con las reliquias de los Primeros Reyes. Tu poder empieza a rivalizar con el de tu hermano.",
            "Es la hora. Los estandartes de los olvidados se alzan en la noche. Marchamos hacia la Ciudadela de Obsidiana. El suelo tiembla con los pasos de tu ejército improvisado. No hay vuelta atrás.",
            "Las puertas exteriores de la capital están rotas. Avanzas por los pasillos que una vez llamaste hogar, ahora apestando a magia negra y muerte. Solo queda la Sala del Trono.",
            "Aric ha caído a tus pies. La corona, manchada de negro, murmura tu nombre ofreciéndote el mismo poder absoluto. El reino es tuyo de nuevo. La pregunta es... ¿Serás un salvador, o el próximo tirano?"
        ];

        const SHOP_POOL = [
            { id:'s1', mat:'m1', qty:10, cost:500, reqLvl: 1 },
            { id:'s2', mat:'m10', qty:15, cost:800, reqLvl: 1 },
            { id:'s3', mat:'m11', qty:5, cost:300, reqLvl: 1 },
            { id:'s4', mat:'m4', qty:5, cost:1000, reqLvl: 2 },
            { id:'s5', mat:'m5', qty:3, cost:1500, reqLvl: 2 },
            { id:'s6', mat:'m24', qty:2, cost:2000, reqLvl: 3 },
            { id:'s7', mat:'m31', qty:1, cost:5000, reqLvl: 5 },
            { id:'s8', mat:'m8', qty:1, cost:4000, reqLvl: 4 }
        ];

        let defaultMats = {}; ALL_MATS.forEach(m => defaultMats[m[0]] = 0);

        let s = JSON.parse(localStorage.getItem(DB_KEY)) || {
            lvl: 1, exp: 0, gold: 0, prestige: 0, mana: 10, atk: 10,
            lastDate: null, timeOffset: 0,
            objective: "Objetivo: Menor tiempo posible", races: [],
            dailies: [{name: "Entrenamiento Físico", done: false}], dailySacrificed: false,
            labCraftsToday: 0, storyClaimed: Array(10).fill(false),
            potions: { expB: 1.0 }, mats: defaultMats,
            weapons: [ALL_WEAPONS[0]], activeWepId: 'w_sys_1',
            bosses: { b1: { name: BOSSES_T1[0], hp: 50, maxHp: 50, lvl: 1 }, b2: { name: BOSSES_T2[0], hp: 500, maxHp: 500, lvl: 11 }, b3: { name: BOSSES_T3[0], hp: 2000, maxHp: 2000, lvl: 21 } },
            currentTab: 'home', subTabs: {}, dailyShopIds: []
        };

        ALL_MATS.forEach(m => { if(s.mats[m[0]] === undefined) s.mats[m[0]] = 0; });
        if(!s.dailies) s.dailies = [{name: "Entrenamiento Físico", done: false}];
        if(!s.races) s.races = [];
        if(!s.objective) s.objective = "Objetivo: Menor tiempo posible";

        const MAX_MANA = () => 10 + (s.lvl * 2);
        const MAX_EXP = () => 1000 * Math.pow(1.2, s.lvl - 1);

        let virtualTime = new Date(); let modalTimer = null; let modalCountdown = 0;

        function rollShop() {
            let available = SHOP_POOL.filter(x => x.reqLvl <= s.lvl);
            if(available.length < 4) available = SHOP_POOL.slice(0,4);
            let shuffled = available.sort(() => 0.5 - Math.random());
            s.dailyShopIds = shuffled.slice(0, 4).map(x => x.id);
        }

        function checkTime() {
            virtualTime = new Date(Date.now() + s.timeOffset);
            
            let msSinceMidnight = virtualTime.getHours()*3600000 + virtualTime.getMinutes()*60000 + virtualTime.getSeconds()*1000;
            let percentDay = (msSinceMidnight / 86400000) * 100;
            document.getElementById('hud-time-bar').style.width = `${percentDay}%`;

            let msUntilMidnight = 86400000 - msSinceMidnight;
            const h = Math.floor(msUntilMidnight / 3600000).toString().padStart(2, '0');
            const m = Math.floor((msUntilMidnight % 3600000) / 60000).toString().padStart(2, '0');
            const sec = Math.floor((msUntilMidnight % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('sys-countdown').innerText = `${h}:${m}:${sec}`;

            const strDate = virtualTime.toLocaleDateString();
            if(s.lastDate !== strDate) { 
                s.dailySacrificed = false;
                s.dailies.forEach(d => d.done = false);
                s.labCraftsToday = 0;
                rollShop(); s.lastDate = strDate; save(); 
            }
        }
        setInterval(checkTime, 1000);

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(s)); updateHUD(); render(); }
        
        function toast(msg, color="var(--mint)") { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; 
            t.style.color = color;
            t.style.opacity = 1; 
            setTimeout(() => { t.style.opacity = 0; setTimeout(()=>{t.style.color="var(--mint)";},300); }, 2000); 
        }

        function getActiveWeapon() { return s.weapons.find(w => w.id === s.activeWepId) || { atk: 0, passives: {} }; }

        function gain(type, amount) {
            let mult = (s.prestige + 1);
            let w = getActiveWeapon();
            if(type === 'exp') {
                let pMult = w.passives?.exp ? parseFloat(w.passives.exp) : 1.0;
                s.exp += amount * mult * s.potions.expB * pMult;
                s.potions.expB = 1.0; 
                while(s.exp >= MAX_EXP() && s.lvl < 10) { s.exp -= MAX_EXP(); s.lvl++; s.atk += 5; s.mana = MAX_MANA(); showModal("✨ TIER AUMENTADO", `TIER ${TIERS[s.lvl]} ALCANZADO`, "var(--mint)"); }
                if(s.lvl >= 10) { s.lvl = 10; s.exp = MAX_EXP(); }
            }
            if(type === 'gold') {
                let pMult = w.passives?.gold ? parseFloat(w.passives.gold) : 1.0;
                s.gold += amount * mult * pMult;
            }
            save();
        }

        function updateHUD() {
            document.getElementById('hud-tier').innerText = TIERS[s.lvl] || s.lvl;
            document.getElementById('hud-next-tier').innerText = s.lvl >= 10 ? "PRESTIGIO DISPONIBLE" : `Siguiente Tier: ${TIERS[s.lvl+1]}`;
            document.getElementById('hud-gold').innerText = Math.floor(s.gold);
            document.getElementById('hud-prestige').innerText = `Ascensión ${s.prestige}`;
            
            document.getElementById('hud-exp-bar').style.width = `${(s.exp/MAX_EXP())*100}%`;
            document.getElementById('hud-exp-txt').innerText = `${Math.floor(s.exp)}/${Math.floor(MAX_EXP())}`;
            document.getElementById('hud-mana-bar').style.width = `${(s.mana/MAX_MANA())*100}%`;
            document.getElementById('hud-mana-txt').innerText = `${s.mana}/${MAX_MANA()}`;

            const mc = document.getElementById('mult-container');
            const bt = document.getElementById('hud-bonus-txt');
            let w = getActiveWeapon(); let hasPassive = w.passives && Object.keys(w.passives).length > 0;
            
            if(s.potions.expB > 1.0) { mc.classList.remove('hidden'); document.getElementById('hud-mult-txt').innerText = `x${s.potions.expB}`; }
            else { mc.classList.add('hidden'); }

            if(s.potions.expB > 1.0 || hasPassive) {
                bt.classList.remove('hidden'); let t = "";
                if(s.potions.expB > 1.0) t+= `Exp x${s.potions.expB} `;
                if(hasPassive) t+= `[Wep Bonus]`;
                bt.innerText = t;
            } else bt.classList.add('hidden');

            ['lab', 'dungeon', 'forge', 'shop'].forEach((id, idx) => {
                const btn = document.getElementById(`nav-${id}`);
                let req = [2,3,4,1][idx];
                if(s.lvl >= req) btn.classList.remove('opacity-40');
                else btn.classList.add('opacity-40');
            });
        }

        function showModal(title, desc, color, btnText="ACEPTAR") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-title').style.color = color || "var(--mint)";
            document.getElementById('modal-desc').innerHTML = desc;
            if(color) document.getElementById('modal-glow').style.backgroundColor = color;
            
            const m = document.getElementById('modal');
            m.classList.remove('hidden'); m.style.display = 'flex';
            
            modalCountdown = 6;
            document.getElementById('modal-btn').innerText = `${btnText} (${modalCountdown}s)`;
            
            if(modalTimer) clearInterval(modalTimer);
            modalTimer = setInterval(() => {
                modalCountdown--;
                if(modalCountdown <= 0) { closeModal(); } 
                else { document.getElementById('modal-btn').innerText = `${btnText} (${modalCountdown}s)`; }
            }, 1000);
        }

        function closeModal() { if(modalTimer) clearInterval(modalTimer); document.getElementById('modal').classList.add('hidden'); document.getElementById('modal').style.display = ''; }

        function generateLineChart() {
            if(!s.races || s.races.length < 2) return `<p class="text-[9px] text-center opacity-50 uppercase tracking-widest py-4">Gráfica visible a partir de 2 carreras</p>`;
            let max = Math.max(...s.races.map(r => r.val));
            let min = Math.min(...s.races.map(r => r.val));
            let range = max - min || 1; // Evitar división por 0
            let points = s.races.map((r, i) => {
                let x = (i / (s.races.length - 1)) * 100;
                let y = 100 - ((r.val - min) / range * 80 + 10);
                return `${x},${y}`;
            }).join(' ');
            return `<svg viewBox="0 0 100 100" class="chart-svg"><polyline points="${points}"/></svg>`;
        }

        function generateRaceHistory() {
            if(!s.races || s.races.length === 0) return `<p class="text-[9px] opacity-50">Sin registros</p>`;
            let minRace = Math.min(...s.races.map(r=>r.val)); // Menor tiempo es el récord
            return s.races.slice().reverse().map(r => {
                let isRec = r.val === minRace;
                let h = Math.floor(r.val/60); let sc = r.val%60;
                return `<div class="flex justify-between items-center text-[10px] py-2 border-b border-[var(--border-glass)] ${isRec?'record-highlight':''}">
                    <span>${new Date(r.date).toLocaleDateString()}</span>
                    <span>${h}m ${sc}s ${isRec?'🏆':''}</span>
                </div>`;
            }).join('');
        }

        function exploreAbyss(tierLvl) {
            let allDone = s.dailies.length > 0 && s.dailies.every(d => d.done);
            if(!allDone) return toast("Requiere todas las Diarias Completadas", "var(--pink)");
            if(s.dailySacrificed) return toast("Ya has sacrificado hoy", "var(--pink)");
            
            s.dailySacrificed = true;
            let min = (tierLvl-1)*12; let max = min + 11;
            let lootText = "";
            for(let i=0; i<3; i++) {
                let mId = ALL_MATS[Math.floor(Math.random()*(max-min+1))+min];
                s.mats[mId[0]] += 2;
                lootText += `${mId[1]} 2x ${mId[2]}<br>`;
            }
            showModal("🎒 EXPLORACIÓN FINALIZADA", `Has sacrificado tus Diarias.<br><br>Botín obtenido:<br>${lootText}`, "var(--mint)");
            save();
        }

        function attackBoss(bId, cost, namesArray) {
            let b = s.bosses[bId];
            if(s.mana < cost) return toast("Maná Insuficiente", "var(--pink)");
            s.mana -= cost;
            let dmg = s.atk + getActiveWeapon().atk;
            b.hp -= dmg;
            if(b.hp <= 0) {
                let e = cost * 400; let g = cost * 200;
                b.lvl++; b.maxHp = Math.floor(b.maxHp * 1.5); b.hp = b.maxHp;
                b.name = namesArray[Math.min(b.lvl-1, namesArray.length-1)] || namesArray[namesArray.length-1];
                showModal("☠️ JEFE DERROTADO", `+${e} EXP / +${g}G`, "red");
                gain('exp', e); gain('gold', g);
            }
            save();
        }

        function craftPotion(name, mult, costMats) {
            if(s.labCraftsToday >= 3) return toast("Límite de 3 creaciones por día", "var(--pink)");
            for(let mat in costMats) { if(s.mats[mat] < costMats[mat]) return toast(`Faltan Materiales`, "var(--pink)"); }
            for(let mat in costMats) { s.mats[mat] -= costMats[mat]; }
            s.potions.expB = mult;
            s.labCraftsToday++;
            showModal('🧪 ALQUIMIA EXITOSA', `Has creado ${name}.<br>Multiplicador x${mult} Activo.`, 'var(--mint)');
            save();
        }

                const st = s.subTabs[t] || 'base';
                h += `<div class="flex gap-1 mb-4 bg-black/40 p-1 rounded-xl">
                    <button onclick="setSubTab('base')" class="flex-1 py-2 rounded-lg text-[10px] uppercase font-bold ${st==='base'?'bg-white/10 text-[var(--gold)]':'opacity-50'}">Base</button>
                    <button onclick="${s.lvl>=6?`setSubTab('bm')`:`toast('Requiere Tier D (Eres Tier ${TIERS[s.lvl]})', 'var(--pink)')`}" class="flex-1 py-2 rounded-lg text-[10px] uppercase font-bold ${st==='bm'?'bg-[var(--pink)]/20 text-[var(--pink)]':'opacity-50'}">Mercado Negro</button>
                </div>`;

                let renderPool = st === 'base' ? SHOP_BASE : BM_POOL;
                let color = st === 'base' ? 'var(--gold)' : 'var(--pink)';

                h += `<div class="glass-panel p-4 mb-4 border-[${color}]/30"><div class="space-y-2 max-h-[250px] overflow-y-auto pr-1">`;
                renderPool.forEach(item => {
                    if(s.lvl >= item.reqTier) {
                        h += `<div class="flex justify-between items-center text-[10px] bg-black/30 p-2 rounded border border-gray-800">
                            <span>${item.name}</span>
                            <button onclick="if(s.gold>=${item.cost}){ s.gold-=${item.cost}; s.weapons.push(ALL_WEAPONS[Math.floor(Math.random()*ALL_WEAPONS.length)]); toast('Comprado'); save(); } else toast('Oro Insuficiente', 'var(--pink)')" class="text-[${color}] font-sys border border-[${color}]/50 px-2 py-1 rounded bg-[${color}]/10">${item.cost}G</button>
                        </div>`;
                    } else {
                        h += `<div class="flex justify-between items-center text-[10px] bg-black/10 p-2 rounded border border-gray-900 opacity-40"><span>🔒 Desconocido</span><span class="text-gray-500">Tier ${TIERS[item.reqTier]}</span></div>`;
                    }
                });
                h += `</div></div>`;

                // ADMIN PANEL TEMPORAL
                let adminUI = `<div class="border border-red-900/50 bg-black/80 rounded-xl p-4 shadow-inner mb-4"><p class="text-[9px] font-sys text-red-500 mb-3 text-center tracking-widest">CONSOLA ADMIN (TEMPORAL)</p>
                <div class="flex flex-col gap-2">
                    <button onclick="ALL_WEAPONS.forEach(w=>{if(!s.weapons.find(x=>x.id===w.id)) s.weapons.push(w);}); save(); toast('Arsenal Desbloqueado');" class="bg-purple-900/40 py-2 rounded-lg text-[10px] border border-purple-500/30 text-purple-300 font-bold uppercase tracking-widest">Desbloquear Arsenal</button>
                    <button onclick="s.gold+=99999; save(); toast('+99999 Oro')" class="bg-yellow-900/40 py-2 rounded-lg text-[10px] border border-yellow-500/30 text-yellow-300 font-bold uppercase tracking-widest">+99999 Oro</button>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <button onclick="s.timeOffset+=3600000; checkTime(); toast('Reloj: +1 Hora')" class="bg-gray-800 py-2 rounded text-[9px] border border-gray-600 text-gray-300">+1H Reloj</button>
                        <button onclick="if(confirm('¿BORRAR TODO EL PROGRESO?')){ localStorage.removeItem(DB_KEY); location.reload(); }" class="bg-red-900/50 py-2 rounded text-[9px] border border-red-500 text-red-300 font-bold">Hard Reset</button>
                    </div>
                </div></div>`;
                h += adminUI;

                if(s.lvl >= 10) {
                    h += `<button onclick="if(confirm('¿Ascender? Pierdes niveles, oro y armas, pero ganas un multiplicador permanente.')){ s.prestige++; s.lvl=1; s.exp=0; s.gold=0; s.weapons=[ALL_WEAPONS[0]]; s.activeWepId='w_sys_1'; s.storyClaimed.fill(false); save(); showModal('🌌 ASCENSIÓN', 'Has renacido más fuerte', 'var(--mint)'); }" class="w-full py-5 bg-gradient-to-r from-blue-900 to-[var(--mint)] rounded-xl font-sys text-white text-xs tracking-widest border border-blue-400 shadow-[0_0_20px_rgba(138,191,204,0.4)]">🌌 ASCENSIÓN (PRESTIGIO)</button>`;
                }
            }
            mc.innerHTML = `<div class="active-tab">${h}</div>`;
        }

        if(s.dailyShopIds.length === 0) rollShop();
        checkTime();
        save();
    </script>
</body>
</html>
