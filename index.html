<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYSTEM V0.9.1: THE DEEP DIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg-base: #0c0c12; 
            --sys-blue: #60a5fa;   /* Mazmorra / Maná / Base */
            --sys-red: #f87171;    /* Maldita / Reloj / Errores */
            --sys-purple: #c084fc; /* Abismo / EXP */
            --gold: #fcd34d;       /* Oro / Legendario */
            --dia: #2dd4bf;        /* Diamantes */
            --border-glass: rgba(255,255,255,0.12);
        }
        body { 
            background: var(--bg-base); color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            padding-top: calc(env(safe-area-inset-top) + 5px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
        }
        .font-sys { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: linear-gradient(145deg, rgba(18,18,24,0.9) 0%, rgba(12,12,18,0.95) 100%);
            border: 1px solid var(--border-glass); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); border-radius: 16px;
        }
        .btn-aaa {
            background: linear-gradient(90deg, rgba(96,165,250,0.1), rgba(192,132,252,0.1));
            border: 1px solid var(--border-glass); color: var(--sys-blue); transition: all 0.2s;
        }
        .btn-aaa:active { transform: scale(0.97); }
        .progress-bar { transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .story-claimable { border: 1px solid #fff700 !important; box-shadow: 0 0 12px rgba(255, 247, 0, 0.5); cursor: pointer; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        .editable-objective { border-bottom: 1px dashed var(--sys-blue); background: rgba(59,130,246,0.05); transition: 0.2s; padding: 6px; border-radius: 4px 4px 0 0; }
        .editable-objective:focus { background: rgba(59,130,246,0.15); outline: none; border-bottom-style: solid; }

        .chart-svg { width: 100%; height: 100%; stroke: var(--sys-blue); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="px-4">

    <header class="glass-panel p-5 mb-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[var(--sys-blue)] opacity-5 blur-[60px] rounded-full"></div>
        
        <div class="flex justify-between items-start mb-4 relative z-10">
            <div>
                <h1 class="font-sys font-bold text-xl text-[var(--sys-blue)] tracking-wider">SYS<span class="text-[var(--sys-red)] text-xs ml-1">v0.9.1</span></h1>
                <div class="flex gap-3 mt-1">
                    <p class="text-[10px] font-bold uppercase text-[var(--gold)]">💰 <span id="hud-gold">0</span></p>
                    <p class="text-[10px] font-bold uppercase text-[var(--dia)]">💎 <span id="hud-dia">0</span></p>
                </div>
                <p id="hud-bonus-txt" class="text-[8px] font-bold mt-1 uppercase text-[var(--gold)] hidden animate-pulse">⚡ Bono Activo</p>
            </div>
            <div class="text-right">
                <p class="font-sys font-bold text-3xl text-[var(--sys-purple)]">Tier <span id="hud-tier" class="text-white">I</span></p>
                <p id="hud-next-tier" class="text-[9px] text-[var(--sys-blue)] font-bold uppercase tracking-widest mt-1">Siguiente: H</p>
                <p id="hud-prestige" class="text-[10px] text-[var(--gold)] font-bold mt-1">Ascensión 0</p>
            </div>
        </div>

        <div class="space-y-3 relative z-10">
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-[var(--sys-red)]"><span>Reloj Solar</span> <span id="sys-countdown">--:--:--</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full border border-[var(--sys-red)]/30 overflow-hidden">
                    <div id="hud-time-bar" class="progress-bar h-full bg-[var(--sys-red)] shadow-[0_0_8px_var(--sys-red)]" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-[var(--sys-purple)]"><span>EXP</span> <span id="hud-exp-txt">0/500</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full border border-[var(--sys-purple)]/30 overflow-hidden">
                    <div id="hud-exp-bar" class="progress-bar h-full bg-[var(--sys-purple)] shadow-[0_0_8px_var(--sys-purple)]" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-[var(--sys-blue)]">
                    <span>MANÁ</span> 
                    <div class="flex gap-2 items-center">
                        <span id="mana-regen-timer" class="text-[8px] text-[var(--sys-blue)] opacity-70">(MAX)</span>
                        <span id="hud-mana-txt">10/10</span>
                    </div>
                </div>
                <div class="h-1.5 w-full bg-black/50 rounded-full border border-[var(--sys-blue)]/30 overflow-hidden">
                    <div id="hud-mana-bar" class="progress-bar h-full bg-[var(--sys-blue)] shadow-[0_0_8px_var(--sys-blue)]" style="width: 100%"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="min-h-[50vh] pb-10"></main>

    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 glass-panel !rounded-full px-6 py-3 text-xs font-bold uppercase tracking-widest text-white opacity-0 pointer-events-none transition-opacity duration-300 z-50">GUARDADO</div>

    <nav class="fixed bottom-0 left-0 w-full glass-panel border-t-0 rounded-t-3xl rounded-b-none p-4 grid grid-cols-5 gap-1 z-40">
        <button onclick="nav('home')" class="flex flex-col items-center nav-btn" id="nav-home"><span class="text-xl mb-1">⛺</span><span class="text-[8px] font-bold uppercase tracking-wider text-[var(--sys-blue)]">Refugio</span></button>
        <button onclick="nav('lab')" class="flex flex-col items-center nav-btn opacity-40" id="nav-lab"><span class="text-xl mb-1">⚗️</span><span class="text-[8px] font-bold uppercase tracking-wider">Lab</span></button>
        <button onclick="nav('dungeon')" class="flex flex-col items-center nav-btn opacity-40" id="nav-dungeon"><span class="text-xl mb-1">⛩️</span><span class="text-[8px] font-bold uppercase tracking-wider">Abismo</span></button>
        <button onclick="nav('forge')" class="flex flex-col items-center nav-btn opacity-40" id="nav-forge"><span class="text-xl mb-1">⚒️</span><span class="text-[8px] font-bold uppercase tracking-wider">Forja</span></button>
        <button onclick="nav('shop')" class="flex flex-col items-center nav-btn" id="nav-shop"><span class="text-xl mb-1">⚖️</span><span class="text-[8px] font-bold uppercase tracking-wider">Tienda</span></button>
    </nav>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col justify-center items-center p-6 text-center">
        <div class="glass-panel w-full p-8 relative overflow-hidden">
            <div id="modal-glow" class="absolute inset-0 opacity-20 blur-2xl"></div>
            <h3 id="modal-title" class="font-sys text-[16px] font-bold tracking-[0.2em] mb-4 relative z-10 text-[var(--sys-blue)]">...</h3>
            <p id="modal-desc" class="text-sm text-gray-300 mb-8 font-sys leading-relaxed relative z-10">...</p>
            <button onclick="closeModal()" class="btn-aaa w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest relative z-10 bg-black/50 z-[101]">
                ACEPTAR (<span id="modal-timer">5</span>s)
            </button>
        </div>
    </div>

    <script>
        const DB_KEY = 'sys_v0_9_1_save'; 
        const TIERS = {1:'I', 2:'H', 3:'G', 4:'F', 5:'E', 6:'D', 7:'C', 8:'B', 9:'A', 10:'S'};
        const EXP_NEEDED = [0, 500, 1000, 3000, 7500, 15000, 30000, 50000, 75000, 100000];

        // --- ARMAS Y ARMADURAS ---
        let ALL_WEAPONS = [];
        const W_P1 = ["Filo", "Espada", "Hacha", "Cuerno", "Garra", "Martillo", "Daga", "Lanza", "Cetro", "Guadaña"];
        const W_P2 = ["del Demonio", "Vampiresco", "Roto", "de Luz", "Sombrío", "del Rey", "Abisal", "Sangriento", "Maldito", "Antiguo"];
        for(let i=1; i<=100; i++) {
            let n = i===1 ? "Daga Oxidada" : `${W_P1[i%10]} ${W_P2[Math.floor((i-1)/10)%10]}`;
            ALL_WEAPONS.push({id:`w_sys_${i}`, type:'weapon', name: n, atk: i*20, reqTier: Math.ceil(i/10)});
        }

        let ALL_ARMORS = [];
        const ARMOR_SETS = [
            {n:"Hierro Oscuro", t:1}, {n:"Cuero Bestia", t:2}, {n:"Hueso Maldito", t:3},
            {n:"Plata Lunar", t:4}, {n:"Caballero Caído", t:5}, {n:"Escamas Dragón", t:6},
            {n:"Sombra Profunda", t:7}, {n:"Fuego Infernal", t:8}, {n:"Viento Ártico", t:9}, {n:"Monarca Rey", t:10}
        ];
        const SLOTS = [{id:'head', n:'Casco'}, {id:'chest', n:'Peto'}, {id:'legs', n:'Grebas'}, {id:'acc', n:'Amuleto'}];
        ARMOR_SETS.forEach(set => {
            SLOTS.forEach(sl => {
                ALL_ARMORS.push({ id: `ar_${set.t}_${sl.id}`, type: 'armor', slot: sl.id, setName: set.n, name: `${sl.n} de ${set.n}`, manaDiscount: set.t * 2, reqTier: set.t });
            });
        });

        // --- JEFES (Restaurados para que no crashee el Abismo) ---
        const BOSSES_T1 = ["Duende Ladrón", "Lobo Sombra", "Esqueleto Roto", "Orco Menor"];
        const BOSSES_T2 = ["Caballero Caído", "Liche Menor", "Quimera", "Basilisco"];
        const BOSSES_T3 = ["Dragón de Hueso", "Monarca Caído", "Guardián de Puerta", "Rey Aric"];

        const ALL_MATS = [
            ["m1","⛏️","Acero"], ["m2","🐉","Escamas"], ["m3","🧱","Cobre"], ["m4","🔩","Hierro"], ["m5","🪙","Plata"], ["m6","🥇","Oro Puro"], ["m7","💎","Platino"], ["m8","💠","Mithril"], ["m9","🪨","P. Rúnica"],
            ["m10","🪵","Madera"], ["m11","🌿","H. Curativa"], ["m12","☠️","R. Venenosa"], ["m13","🌸","F. Lunar"], ["m14","🌻","S. Solar"], ["m15","🍯","Savia"], ["m16","🦴","Hueso"], ["m17","🦷","Colmillo"], ["m18","🐾","Piel"],
            ["m19","👁️","Ojo Araña"], ["m20","🦇","Ala Murc."], ["m21","😈","Cuerno"], ["m22","🩸","Sangre M."], ["m23","🔮","Núcleo"], ["m24","✨","Polvo Est."], ["m25","🧊","C. Roto"], ["m26","🔥","E. Fuego"], ["m27","❄️","E. Hielo"],
            ["m28","🌪️","E. Viento"], ["m29","🌍","E. Tierra"], ["m30","👻","Alma"], ["m31","🌑","M. Oscura"], ["m32","⚱️","Ceniza"], ["m33","🧪","Ectoplasma"], ["m34","💧","Lágrima"], ["m35","🧚","P. Hada"], ["m36","🌋","Azufre"]
        ];

        function getMatName(id) { let f = ALL_MATS.find(x => x[0] === id); return f ? f[2] : id; }

        const STORY_TITLES = ["El Exilio", "Impuestos de Sangre", "Alianza Subterránea", "Cazadores Reales", "El Pacto Abisal", "Sangre y Barro", "Ecos Antiguos", "El Asedio", "La Guardia Caída", "Sangre de mi Sangre"];
        const STORY_TEXT = [
            "Tu hermano, el Rey Aric, consumió la magia del reino para volverse inmortal. Por oponerte, te arrebató tus títulos y te exilió.",
            "En los páramos, descubres la verdad. Aric drena la fuerza vital de los campesinos.",
            "Has encontrado un refugio en las antiguas catacumbas. Los olvidados te han nombrado su campeón.",
            "Aric ha enviado a sus Perros de Sangre a las mazmorras para cazarte.",
            "Descubres el origen del poder de Aric. Hizo un trato con los Señores del Abismo Profundo.",
            "Aric en persona apareció. Casi te mata, dejándote una cicatriz arcana que quema cuando usas maná.",
            "Te has adentrado en la Forja Primigenia. Estás forjando tu voluntad.",
            "Es la hora. Los estandartes de los olvidados se alzan en la noche.",
            "Avanzas por los pasillos que una vez llamaste hogar, ahora apestando a magia negra y muerte.",
            "Aric ha caído a tus pies. La corona murmura tu nombre ofreciéndote el mismo poder absoluto."
        ];

        const SHOP_POOL = [
            { id:'s1', mat:'m1', qty:10, cost:5000, reqLvl: 1 }, { id:'s2', mat:'m10', qty:15, cost:8000, reqLvl: 1 },
            { id:'s3', mat:'m11', qty:5, cost:3000, reqLvl: 1 }, { id:'s4', mat:'m4', qty:5, cost:15000, reqLvl: 2 },
            { id:'s5', mat:'m5', qty:3, cost:20000, reqLvl: 2 }, { id:'s6', mat:'m24', qty:2, cost:30000, reqLvl: 3 },
            { id:'s7', mat:'m31', qty:1, cost:80000, reqLvl: 5 }, { id:'s8', mat:'m8', qty:1, cost:60000, reqLvl: 4 }
        ];

        let s = JSON.parse(localStorage.getItem(DB_KEY)) || {};
        
        s.lvl = s.lvl || 1; s.exp = s.exp || 0; s.gold = s.gold || 0; s.diamonds = s.diamonds || 0;
        s.prestige = s.prestige || 0; s.mana = s.mana || 10; s.atk = s.atk || 10;
        s.timeOffset = s.timeOffset || 0; s.manaTimestamp = s.manaTimestamp || Date.now();
        s.objective = s.objective || "Objetivo: Menor tiempo posible";
        s.races = s.races || []; s.racesToday = s.racesToday || 0;
        s.dailies = (s.dailies && s.dailies.length > 0) ? s.dailies : [{name: "Entrenamiento Físico", done: false}];
        s.dailySacrificed = s.dailySacrificed || false; s.storyClaimed = s.storyClaimed || Array(10).fill(false);
        s.potions = s.potions || { expB: 1.0 }; s.potionInv = s.potionInv || {};
        s.mats = s.mats || {}; ALL_MATS.forEach(m => { if(s.mats[m[0]] === undefined) s.mats[m[0]] = 0; });
        s.weapons = (s.weapons && s.weapons.length > 0) ? s.weapons : [ALL_WEAPONS[0]];
        s.armors = s.armors || []; s.activeWeps = s.activeWeps || ['w_sys_1', null];
        s.activeArmors = s.activeArmors || {head:null, chest:null, legs:null, acc:null};
        s.bosses = s.bosses || { b1: { name: BOSSES_T1[0], hp: 500, maxHp: 500, lvl: 1 }, b2: { name: BOSSES_T2[0], hp: 5000, maxHp: 5000, lvl: 11 }, b3: { name: BOSSES_T3[0], hp: 20000, maxHp: 20000, lvl: 21 } };
        s.currentTab = s.currentTab || 'home'; s.subTabs = s.subTabs || {};
        s.dailyShopIds = s.dailyShopIds || [];

        const MAX_MANA = () => 10 + (s.lvl * 2);
        let virtualTime = new Date(); let modalTimer = null; let modalCount = 0;

        function rollShop() {
            let available = SHOP_POOL.filter(x => x.reqLvl <= s.lvl);
            if(available.length < 4) available = SHOP_POOL.slice(0,4);
            let shuffled = available.sort(() => 0.5 - Math.random());
            s.dailyShopIds = shuffled.slice(0, 4).map(x => x.id);
        }
        if(s.dailyShopIds.length === 0) rollShop();

        function checkTime() {
            let now = Date.now();
            virtualTime = new Date(now + s.timeOffset);
            let msSinceMidnight = virtualTime.getHours()*3600000 + virtualTime.getMinutes()*60000 + virtualTime.getSeconds()*1000;
            let tb = document.getElementById('hud-time-bar');
            if(tb) tb.style.width = `${(msSinceMidnight / 86400000) * 100}%`;

            let rem = 86400000 - msSinceMidnight;
            let h = Math.floor(rem/3600000).toString().padStart(2, '0');
            let m = Math.floor((rem%3600000)/60000).toString().padStart(2, '0');
            let sec = Math.floor((rem%60000)/1000).toString().padStart(2, '0');
            let tStr = `${h}:${m}:${sec}`;
            
            let cdown = document.getElementById('sys-countdown');
            if(cdown) cdown.innerText = tStr;
            let shopC = document.getElementById('shop-countdown');
            if(shopC) shopC.innerText = tStr;

            // Regeneración de Maná (1 por Hora)
            let maxM = MAX_MANA();
            if(s.mana < maxM) {
                let elapsed = now - s.manaTimestamp;
                let hoursPassed = Math.floor(elapsed / 3600000);
                if(hoursPassed > 0) {
                    s.mana = Math.min(maxM, s.mana + hoursPassed);
                    s.manaTimestamp += hoursPassed * 3600000;
                    save();
                }
                if(s.mana < maxM) {
                    let nextTick = 3600000 - (now - s.manaTimestamp);
                    let nm = Math.floor(nextTick / 60000).toString().padStart(2, '0');
                    let nsc = Math.floor((nextTick % 60000) / 1000).toString().padStart(2, '0');
                    let mTimer = document.getElementById('mana-regen-timer');
                    if(mTimer) mTimer.innerText = `(+1 en ${nm}:${nsc})`;
                } else {
                    let mTimer = document.getElementById('mana-regen-timer');
                    if(mTimer) mTimer.innerText = `(MAX)`;
                }
            } else {
                s.manaTimestamp = now;
                let mTimer = document.getElementById('mana-regen-timer');
                if(mTimer) mTimer.innerText = `(MAX)`;
            }

            const strDate = virtualTime.toLocaleDateString();
            if(s.lastDate !== strDate) { 
                s.dailySacrificed = false; s.racesToday = 0;
                s.dailies.forEach(d => d.done = false); s.labCraftsToday = 0;
                rollShop(); s.lastDate = strDate; save(); 
            }
        }
        setInterval(checkTime, 1000);

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(s)); updateHUD(); }
        
        function toast(msg, color="var(--sys-blue)") { 
            const t = document.getElementById('toast'); 
            if(!t) return; t.innerText = msg; t.style.color = color; t.style.borderColor = color;
            t.style.opacity = 1; setTimeout(() => { t.style.opacity = 0; }, 2000); 
        }

        function getEquipStats() {
            let w1 = s.weapons.find(x => x.id === s.activeWeps[0]);
            let w2 = s.weapons.find(x => x.id === s.activeWeps[1]);
            let atk = (w1?w1.atk:0) + (w2?w2.atk:0);

            let counts = {}; let md = 0;
            SLOTS.forEach(sl => {
                let a = s.armors.find(x => x.id === s.activeArmors[sl.id]);
                if(a) { md += a.manaDiscount; counts[a.setName] = (counts[a.setName]||0) + 1; }
            });

            for(let setName in counts) {
                if(counts[setName] === 4) {
                    let sample = s.armors.find(x => x.setName === setName);
                    if(sample) md += (sample.manaDiscount * 4); 
                }
            }
            return { atk, manaDiscount: md, setCounts: counts };
        }

        function gain(type, amount) {
            let mult = (s.prestige + 1);
            if(type === 'exp') {
                s.exp += amount * mult * s.potions.expB;
                s.potions.expB = 1.0; 
                let reqExp = EXP_NEEDED[s.lvl];
                while(s.exp >= reqExp && s.lvl < 10) { 
                    s.exp -= reqExp; s.lvl++; s.atk += 10; s.mana = MAX_MANA(); 
                    showModal("✨ TIER AUMENTADO", `TIER ${TIERS[s.lvl]} ALCANZADO`, "var(--sys-blue)"); 
                    reqExp = EXP_NEEDED[s.lvl]; 
                    render(); // Update UI instantly
                }
                if(s.lvl >= 10) { s.lvl = 10; s.exp = EXP_NEEDED[9]; }
                toast(`+${Math.floor(amount)} EXP`, "var(--sys-purple)");
            }
            if(type === 'gold') { s.gold += amount * mult; toast(`+${Math.floor(amount)} G`, "var(--gold)"); }
            if(type === 'dia') { s.diamonds += amount; toast(`+${amount} Diamantes`, "var(--dia)"); }
            save();
        }

        function updateHUD() {
            let tEl = document.getElementById('hud-tier'); if(tEl) tEl.innerText = TIERS[s.lvl] || s.lvl;
            let ntEl = document.getElementById('hud-next-tier'); if(ntEl) ntEl.innerText = s.lvl >= 10 ? "PRESTIGIO DISPONIBLE" : `Siguiente: ${TIERS[s.lvl+1]}`;
            let gEl = document.getElementById('hud-gold'); if(gEl) gEl.innerText = Math.floor(s.gold);
            let dEl = document.getElementById('hud-dia'); if(dEl) dEl.innerText = s.diamonds;
            let pEl = document.getElementById('hud-prestige'); if(pEl) pEl.innerText = `Ascensión ${s.prestige}`;
            
            let reqExp = EXP_NEEDED[s.lvl] || 100000;
            let eb = document.getElementById('hud-exp-bar'); if(eb) eb.style.width = `${(s.exp/reqExp)*100}%`;
            let et = document.getElementById('hud-exp-txt'); if(et) et.innerText = `${Math.floor(s.exp)}/${reqExp}`;
            
            let mb = document.getElementById('hud-mana-bar'); if(mb) mb.style.width = `${(s.mana/MAX_MANA())*100}%`;
            let mt = document.getElementById('hud-mana-txt'); if(mt) mt.innerText = `${Math.floor(s.mana)}/${MAX_MANA()}`;

            const bt = document.getElementById('hud-bonus-txt');
            if(bt) {
                if(s.potions.expB > 1.0) { bt.classList.remove('hidden'); bt.innerText = `✨ EXP x${s.potions.expB}`; } 
                else { bt.classList.add('hidden'); }
            }

            ['lab', 'dungeon', 'forge', 'shop'].forEach((id, idx) => {
                const btn = document.getElementById(`nav-${id}`);
                if(btn) {
                    if(s.lvl >= [2,3,4,1][idx]) btn.classList.remove('opacity-40');
                    else btn.classList.add('opacity-40');
                }
            });
        }

        function showModal(title, desc, color="var(--sys-blue)") {
            clearInterval(modalTimer);
            let mTitle = document.getElementById('modal-title');
            if(mTitle) { mTitle.innerText = title; mTitle.style.color = color; }
            let mDesc = document.getElementById('modal-desc');
            if(mDesc) mDesc.innerHTML = desc;
            let mGlow = document.getElementById('modal-glow');
            if(mGlow) mGlow.style.backgroundColor = color;
            
            const m = document.getElementById('modal');
            if(m) { m.classList.remove('hidden'); m.style.display = 'flex'; }
            
            modalCount = 5;
            let mt = document.getElementById('modal-timer');
            if(mt) mt.innerText = modalCount;
            
            modalTimer = setInterval(() => {
                modalCount--;
                let el = document.getElementById('modal-timer');
                if(el) el.innerText = modalCount;
                if(modalCount <= 0) closeModal();
            }, 1000);
        }

        function closeModal() { 
            clearInterval(modalTimer); 
            const m = document.getElementById('modal');
            if(m) { m.classList.add('hidden'); m.style.display = ''; }
        }

        function generateLineChart() {
            if(!s.races || s.races.length < 2) return `<div class="text-[10px] text-center opacity-50 py-10 uppercase tracking-widest text-[var(--sys-blue)] border border-dashed border-[var(--sys-blue)]/30 rounded-xl mt-4">Aparece a partir de 2 carreras</div>`;
            
            let max = Math.max(...s.races.map(r => r.val));
            let min = Math.min(...s.races.map(r => r.val));
            let range = (max - min) || 1;
            
            let w = 100; let h = 60; 
            let points = s.races.map((r, i) => {
                let x = (i / (s.races.length - 1)) * w;
                let y = h - ((r.val - min) / range * (h-10) + 5);
                return `${x},${y}`;
            }).join(' ');

            let sDate = new Date(s.races[0].date).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});
            let eDate = new Date(s.races[s.races.length-1].date).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});

            return `
            <div class="relative w-full h-[120px] flex items-end mt-6 mb-6 border-l border-b border-[var(--sys-blue)]/50 pb-4 pl-8">
                <div class="absolute left-0 top-0 bottom-4 flex flex-col justify-between text-[8px] text-[var(--sys-blue)] font-sys">
                    <span>${Math.ceil(max/60)}m</span>
                    <span>${Math.floor(min/60)}m</span>
                </div>
                <svg viewBox="0 0 ${w} ${h}" class="chart-svg" preserveAspectRatio="none"><polyline points="${points}"/></svg>
                <div class="absolute bottom-[-16px] left-8 right-0 flex justify-between text-[8px] text-[var(--sys-blue)] font-sys">
                    <span>${sDate}</span><span>${eDate}</span>
                </div>
            </div>`;
        }

        function exploreAbyss(tierLvl) {
            let allDone = s.dailies.length > 0 && s.dailies.every(d => d.done);
            if(!allDone) return toast("Requiere Diarias Completadas", "var(--sys-red)");
            if(s.dailySacrificed) return toast("Ya sacrificado hoy", "var(--sys-red)");
            
            s.dailySacrificed = true;
            let min = (tierLvl-1)*12; let max = min + 11;
            let lootText = "";
            for(let i=0; i<3; i++) {
                let mId = ALL_MATS[Math.floor(Math.random()*(max-min+1))+min];
                s.mats[mId[0]] += 2; lootText += `${mId[1]} 2x ${mId[2]}<br>`;
            }
            showModal("🎒 EXPLORACIÓN", `Has sacrificado tus Diarias.<br><br>Botín obtenido:<br>${lootText}`, "var(--sys-purple)");
            save(); render();
        }

        function attackBoss(bId, cost, namesArray) {
            let b = s.bosses[bId];
            let eq = getEquipStats();
            let finalCost = Math.max(1, cost * (1 - (eq.manaDiscount/100)));
            if(s.mana < finalCost) return toast("Maná Insuficiente", "var(--sys-red)");
            
            s.mana -= finalCost;
            b.hp -= (s.atk + eq.atk + (s.lvl*5));
            if(b.hp <= 0) {
                let e = cost * 1000; let g = cost * 5000;
                b.lvl++; b.maxHp = Math.floor(b.maxHp * 1.5); b.hp = b.maxHp;
                b.name = namesArray[Math.min(b.lvl-1, namesArray.length-1)] || namesArray[namesArray.length-1];
                showModal("☠️ JEFE DERROTADO", `+${e} EXP / +${g}G`, "var(--sys-red)");
                gain('exp', e); gain('gold', g);
            }
            save(); render();
        }

        function pullGacha(type) {
            if(s.diamonds < 160) return toast("Faltan 160 Diamantes", "var(--sys-red)");
            s.diamonds -= 160;
            
            let r = Math.random() * 100;
            let targetTier = 1; let color = ""; let rank = "";
            
            // Probabilidades: I(20), H(20), G(17), F(17), E(10), D(5), C(5), B(3), A(2), S(1)
            if(r < 20) targetTier = 1;
            else if(r < 40) targetTier = 2;
            else if(r < 57) targetTier = 3;
            else if(r < 74) targetTier = 4;
            else if(r < 84) targetTier = 5;
            else if(r < 89) targetTier = 6;
            else if(r < 94) targetTier = 7;
            else if(r < 97) targetTier = 8;
            else if(r < 99) targetTier = 9;
            else targetTier = 10;

            if(targetTier <= 5) { color = "var(--sys-blue)"; rank = "Común"; }
            else if(targetTier <= 9) { color = "var(--sys-purple)"; rank = "Épico"; }
            else { color = "var(--gold)"; rank = "Legendario"; }

            let pool = type === 'W' ? ALL_WEAPONS : ALL_ARMORS;
            let valid = pool.filter(x => x.reqTier === targetTier);
            if(valid.length === 0) valid = pool; 
            
            let item = Object.assign({}, valid[Math.floor(Math.random()*valid.length)]);
            item.id = `g_${Date.now()}`;
            if(type === 'W') s.weapons.push(item); else s.armors.push(item);
            
            showModal(`🔮 GACHA: ${rank}`, `Obtenido:<br><br><span style="color:${color}; font-size:16px; font-weight:bold; letter-spacing:2px;">${item.name}</span><br><br>Tier ${TIERS[item.reqTier]}`, color);
            save(); render();
        }

                }
                else if(t === 'dungeon') {
                    if(s.lvl < 3) { h = `<div class="glass-panel p-10 text-center"><span class="text-4xl opacity-50">🔒</span><p class="text-[var(--sys-red)] mt-2 text-xs uppercase tracking-widest">Requiere Tier G<br><span class="text-[8px] text-gray-500">(Eres Tier ${TIERS[s.lvl]})</span></p></div>`; } else {
                        const st = s.subTabs[t] || 'd1';
                        h += `<div class="flex gap-1 mb-4 bg-black/40 p-1 rounded-xl">
                            <button onclick="setSubTab('d1')" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='d1'?'bg-[var(--sys-blue)]/20 text-[var(--sys-blue)]':'opacity-50'}">Mazmorra</button>
                            <button onclick="${s.lvl>=5?`setSubTab('d2')`:`toast('Requiere Tier E', 'var(--sys-red)')`}" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='d2'?'bg-[var(--sys-red)]/20 text-[var(--sys-red)]':'opacity-50'}">Maldita</button>
                            <button onclick="${s.lvl>=7?`setSubTab('d3')`:`toast('Requiere Tier C', 'var(--sys-red)')`}" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='d3'?'bg-[var(--sys-purple)]/20 text-[var(--sys-purple)]':'opacity-50'}">Abismo</button>
                        </div>`;

                        let cfg = { id:'b1', arr: BOSSES_T1, mCost: 2, tLvl: 1, col: 'var(--sys-blue)' };
                        if(st==='d2') cfg = { id:'b2', arr: BOSSES_T2, mCost: 4, tLvl: 2, col: 'var(--sys-red)' };
                        if(st==='d3') cfg = { id:'b3', arr: BOSSES_T3, mCost: 6, tLvl: 3, col: 'var(--sys-purple)' };

                        let b = s.bosses[cfg.id]; let p = (b.hp / b.maxHp) * 100;
                        let eq = getEquipStats(); let finalCost = Math.max(1, cfg.mCost * (1 - (eq.manaDiscount/100)));

                        h += `<div class="glass-panel p-6 text-center border-[${cfg.col}]/30">
                            <div class="mb-8">
                                <h3 class="font-sys text-[${cfg.col}] text-xl font-bold uppercase mb-1 drop-shadow-[0_0_8px_${cfg.col}]">${b.name}</h3>
                                <p class="text-[9px] opacity-60 mb-4 uppercase tracking-widest text-[var(--lavender)]">Ataque Total: ${s.atk + eq.atk + (s.lvl*5)}</p>
                                <div class="h-8 w-full bg-black rounded-full border border-[${cfg.col}]/50 relative overflow-hidden mb-4 shadow-inner">
                                    <div class="progress-bar h-full bg-[${cfg.col}]/80" style="width: ${p}%"></div>
                                    <div class="absolute inset-0 flex items-center justify-center text-[10px] font-black uppercase text-white drop-shadow-md">HP: ${b.hp} / ${b.maxHp}</div>
                                </div>
                                <button onclick="attackBoss('${cfg.id}', ${cfg.mCost}, [${cfg.arr.map(x=>`'${x}'`).join(',')}])" class="w-full py-4 rounded-xl border border-[${cfg.col}]/50 bg-[${cfg.col}]/10 text-[${cfg.col}] font-bold uppercase tracking-widest shadow-[0_0_10px_rgba(0,0,0,0.5)]">⚔️ ATACAR (${finalCost.toFixed(1)} Maná)</button>
                            </div>
                            <hr class="border-gray-800 mb-6">
                            <div>
                                <h4 class="text-xs font-bold text-[var(--lavender)] mb-2 uppercase tracking-widest">Exploración Autónoma</h4>
                                <p class="text-[9px] text-[var(--lavender)] opacity-60 mb-4 leading-relaxed">No gasta Maná. Sacrifica TODAS tus Diarias creadas a cambio de 3 materiales aleatorios de este Tier.</p>
                                <button onclick="exploreAbyss(${cfg.tLvl})" class="w-full py-3 rounded-xl border border-gray-600 bg-gray-900 text-gray-300 text-[10px] font-bold uppercase tracking-widest ${(s.dailies.length>0 && s.dailies.every(d=>d.done)) && !s.dailySacrificed?'':'opacity-30'}">⛺ EXPLORAR (Req. Diarias Completadas)</button>
                            </div>
                        </div>`;
                    }
                }
                else if(t === 'forge') {
                    if(s.lvl < 4) { h = `<div class="glass-panel p-10 text-center"><span class="text-4xl opacity-50">🔒</span><p class="text-[var(--sys-red)] mt-2 text-xs uppercase tracking-widest">Requiere Tier F<br><span class="text-[8px] text-gray-500">(Eres Tier ${TIERS[s.lvl]})</span></p></div>`; } else {
                        const st = s.subTabs[t] || 'wep';
                        h += `<div class="flex gap-1 mb-4 bg-black/40 p-1 rounded-xl">
                            <button onclick="setSubTab('wep')" class="flex-1 py-2 rounded-lg text-[10px] uppercase font-bold ${st==='wep'?'bg-white/10 text-[var(--sys-blue)]':'opacity-50'}">Armas</button>
                            <button onclick="setSubTab('arm')" class="flex-1 py-2 rounded-lg text-[10px] uppercase font-bold ${st==='arm'?'bg-white/10 text-[var(--gold)]':'opacity-50'}">Armaduras</button>
                        </div>`;
                        
                        if(st === 'wep') {
                            let w1 = s.weapons.find(x=>x.id===s.activeWeps[0]); let w2 = s.weapons.find(x=>x.id===s.activeWeps[1]);
                            h += `<div class="glass-panel p-4 mb-4 border-[var(--sys-blue)]/30"><p class="text-[10px] text-[var(--sys-blue)] font-bold uppercase tracking-widest border-b border-[var(--sys-blue)]/30 pb-2 mb-2">Equipado (Máx 2)</p>
                            <div class="flex justify-between text-xs text-gray-300"><span class="truncate w-1/2">${w1?w1.name:'Vacio'}</span><span class="truncate w-1/2 text-right">${w2?w2.name:'Vacio'}</span></div></div>`;

                            h += `<div class="glass-panel p-4 max-h-[50vh] overflow-y-auto pr-2"><p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3 border-b border-gray-800 pb-2">Inventario de Armas</p>`;
                            s.weapons.forEach((w) => {
                                let isW1 = s.activeWeps[0] === w.id; let isW2 = s.activeWeps[1] === w.id; let active = isW1 || isW2;
                                h += `<div class="bg-black/60 border ${active?'border-[var(--sys-blue)] shadow-[0_0_8px_var(--sys-blue)]':'border-[var(--border-glass)]'} p-3 rounded-xl mb-3">
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="text-xs font-bold ${active?'text-[var(--sys-blue)]':'text-gray-300'}">${w.name}</p>
                                        <div class="flex gap-1">
                                            <button onclick="s.activeWeps[0]='${w.id}'; if(s.activeWeps[1]==='${w.id}') s.activeWeps[1]=null; save(); render();" class="text-[8px] font-bold border px-2 py-1 rounded ${isW1?'bg-[var(--sys-blue)] text-black border-[var(--sys-blue)]':'border-gray-600 text-gray-400'}">SLOT 1</button>
                                            <button onclick="s.activeWeps[1]='${w.id}'; if(s.activeWeps[0]==='${w.id}') s.activeWeps[0]=null; save(); render();" class="text-[8px] font-bold border px-2 py-1 rounded ${isW2?'bg-[var(--sys-blue)] text-black border-[var(--sys-blue)]':'border-gray-600 text-gray-400'}">SLOT 2</button>
                                        </div>
                                    </div>
                                    <p class="text-[9px] text-gray-400 uppercase tracking-widest">ATK: <span class="text-white">${w.atk}</span> | Tier ${TIERS[w.reqTier]}</p>
                                </div>`;
                            });
                            h += `</div>`;
                        } else {
                            let slots = [ {id:'head', n:'Casco', v:s.activeArmors.head}, {id:'chest', n:'Peto', v:s.activeArmors.chest}, {id:'legs', n:'Grebas', v:s.activeArmors.legs}, {id:'acc', n:'Amuleto', v:s.activeArmors.acc} ];
                            let eq = getEquipStats();
                            
                            h += `<div class="glass-panel p-4 mb-4 border-[var(--gold)]/30"><div class="flex justify-between text-[10px] text-[var(--gold)] font-bold uppercase tracking-widest border-b border-[var(--gold)]/30 pb-2 mb-2"><span>Equipado</span><span>Desc. Maná: <span class="text-white">${eq.manaDiscount}%</span></span></div>
                            <div class="grid grid-cols-2 gap-2 text-[9px] text-gray-300 text-center">`;
                            slots.forEach(sl => { let item = s.armors.find(x=>x.id===sl.v); h+=`<div class="bg-black/50 p-2 border border-gray-800 rounded"> <span class="block text-gray-500 mb-1">${sl.n}</span> <span class="truncate font-bold">${item?item.name:'Vacío'}</span></div>`; });
                            h += `</div>`;
                            
                            let setsActivos = Object.entries(eq.setCounts).filter(([_,c])=>c>0).map(([n,c])=>`<span class="${c===4?'text-[var(--gold)] font-bold':'text-gray-400'}">${n} ${c}/4 ${c===4?'(Bono x2)':''}</span>`).join(' | ');
                            if(setsActivos) h += `<div class="mt-3 text-[9px] uppercase tracking-widest text-center bg-black/30 py-2 border border-[var(--gold)]/20 rounded">${setsActivos}</div>`;
                            h += `</div>`;

                            h += `<div class="glass-panel p-4 max-h-[40vh] overflow-y-auto pr-2"><p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3 border-b border-gray-800 pb-2">Inventario de Armaduras</p>`;
                            s.armors.forEach((a) => {
                                let act = s.activeArmors[a.slot] === a.id;
                                h += `<div class="bg-black/60 border ${act?'border-[var(--gold)] shadow-[0_0_8px_var(--gold)]':'border-[var(--border-glass)]'} p-3 rounded-xl mb-3">
                                    <div class="flex justify-between items-center mb-2">
                                        <p class="text-xs font-bold ${act?'text-[var(--gold)]':'text-gray-300'}">${a.name}</p>
                                        <button onclick="s.activeArmors['${a.slot}']='${a.id}'; save(); render();" class="text-[9px] font-bold border px-3 py-1 rounded ${act?'bg-[var(--gold)] text-black border-[var(--gold)]':'border-gray-600 text-gray-400'} uppercase tracking-widest">${act?'Equipado':'Equipar'}</button>
                                    </div>
                                    <p class="text-[9px] text-gray-400 uppercase tracking-widest">Desc. Maná: <span class="text-[var(--lavender)]">${a.manaDiscount}%</span> | Tier ${TIERS[a.reqTier]}</p>
                                </div>`;
                            });
                            if(s.armors.length===0) h += `<p class="text-[10px] opacity-50 text-center py-6 border border-dashed border-gray-700 rounded-xl mt-2">Invoca armaduras en la tienda.</p>`;
                            h += `</div>`;
                        }
                    }
                }
                else if(t === 'shop') {
                    const st = s.subTabs[t] || 'base';
                    h += `<div class="flex gap-1 mb-4 bg-black/40 p-1 rounded-xl">
                        <button onclick="setSubTab('base')" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='base'?'bg-white/10 text-[var(--gold)]':'opacity-50'}">Tienda</button>
                        <button onclick="setSubTab('gacW')" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='gacW'?'bg-[var(--sys-blue)]/20 text-[var(--sys-blue)]':'opacity-50'}">Gacha Arma</button>
                        <button onclick="setSubTab('gacA')" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='gacA'?'bg-[var(--sys-purple)]/20 text-[var(--sys-purple)]':'opacity-50'}">Gacha Armor</button>
                        <button onclick="setSubTab('admin')" class="flex-1 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='admin'?'bg-[var(--sys-red)]/20 text-[var(--sys-red)]':'opacity-50'}">Hacker</button>
                    </div>`;

                    if(st === 'base') {
                        h += `<div class="glass-panel p-4 mb-4 border-[var(--gold)]/30"><div class="flex justify-between items-center border-b border-[var(--gold)]/30 pb-2 mb-3"><h2 class="text-[10px] uppercase font-sys text-[var(--gold)]">Ofertas</h2><span class="text-[8px] text-[var(--sys-red)] font-bold tracking-widest" id="shop-countdown">--:--:--</span></div><div class="space-y-2 max-h-[300px] overflow-y-auto pr-1">`;
                        s.dailyShopIds.forEach(id => {
                            let item = SHOP_POOL.find(x => x.id === id);
                            if(item) {
                                let mInfo = ALL_MATS.find(m => m[0] === item.mat);
                                h += `<div class="flex justify-between items-center text-[10px] bg-black/40 p-3 rounded border border-gray-800">
                                    <span class="text-gray-200 font-bold">${mInfo[1]} ${item.qty}x ${mInfo[2]}</span>
                                    <button onclick="if(s.gold>=${item.cost}){ s.gold-=${item.cost}; s.mats['${item.mat}']+=${item.qty}; save(); toast('Comprado', 'var(--gold)'); } else toast('Oro Insuficiente', 'var(--sys-red)')" class="text-[var(--gold)] font-bold border border-[var(--gold)]/50 px-3 py-1 rounded bg-[var(--gold)]/10 font-sys">${item.cost}G</button>
                                </div>`;
                            }
                        });
                        h += `</div></div>`;
                    } else if(st === 'gacW' || st === 'gacA') {
                        let isW = st === 'gacW';
                        let col = isW ? 'var(--sys-blue)' : 'var(--sys-purple)';
                        h += `<div class="glass-panel p-6 text-center border-[${col}]/30">
                            <span class="text-4xl block mb-4">🔮</span>
                            <h3 class="font-sys text-[${col}] text-lg font-bold uppercase tracking-widest mb-2">Invocación</h3>
                            <p class="text-[9px] text-[var(--lavender)] opacity-70 mb-6 border-b border-[${col}]/30 pb-4">Probabilidades: < Tier D (57%) | Tier D-A (42%) | Tier S (1%)</p>
                            <button onclick="pullGacha('${isW?'W':'A'}')" class="w-full py-5 rounded-xl border border-[${col}]/50 bg-[${col}]/10 text-[${col}] font-bold uppercase tracking-widest text-xs shadow-[0_0_15px_${col}]">TIRADA (160 💎)</button>
                        </div>`;
                    } else {
                        h += `<div class="border border-red-900/50 bg-black/80 rounded-xl p-4 shadow-inner mb-4"><p class="text-[9px] font-sys text-red-500 mb-3 text-center tracking-widest">HACKER MENU</p>
                        <div class="flex flex-col gap-2">
                            <button onclick="s.exp=EXP_NEEDED[9]; s.lvl=10; save(); render(); toast('Max Level', 'var(--sys-blue)');" class="bg-blue-900/40 py-3 rounded-lg text-[10px] border border-blue-500/30 text-blue-300 font-bold uppercase">Nivel 10 (Max)</button>
                            <button onclick="gain('exp', 50000);" class="bg-purple-900/40 py-3 rounded-lg text-[10px] border border-purple-500/30 text-purple-300 font-bold uppercase">+50,000 EXP</button>
                            <button onclick="gain('gold', 500000);" class="bg-yellow-900/40 py-3 rounded-lg text-[10px] border border-yellow-500/30 text-yellow-300 font-bold uppercase">+500,000 Oro</button>
                            <button onclick="gain('dia', 5000);" class="bg-[var(--dia)]/20 py-3 rounded-lg text-[10px] border border-[var(--dia)]/50 text-[var(--dia)] font-bold uppercase">+5000 Diamantes</button>
                            <button onclick="ALL_MATS.forEach(m => s.mats[m[0]]=999); save(); toast('Materiales Max', 'var(--sys-blue)');" class="bg-green-900/40 py-3 rounded-lg text-[10px] border border-green-500/30 text-green-300 font-bold uppercase">Materiales Máximos</button>
                            <div class="grid grid-cols-2 gap-2 mt-1">
                                <button onclick="s.timeOffset+=3600000; checkTime(); toast('Reloj: +1 Hora', 'var(--sys-red)')" class="bg-gray-800 py-3 rounded text-[9px] border border-gray-600 text-gray-300 font-bold uppercase">+1H Reloj</button>
                                <button onclick="if(confirm('¿BORRAR TODO EL PROGRESO?')){ localStorage.removeItem(DB_KEY); location.reload(); }" class="bg-red-900/50 py-3 rounded text-[9px] border border-red-500 text-red-300 font-bold uppercase">Hard Reset</button>
                            </div>
                        </div></div>`;
                    }

                    h += `<button onclick="if(s.lvl<10) { toast('Requiere Tier S (Eres Tier '+TIERS[s.lvl]+')', 'var(--sys-red)'); return; } if(confirm('¿Ascender?')){ s.prestige++; s.lvl=1; s.exp=0; s.gold=0; s.diamonds=0; s.weapons=[ALL_WEAPONS[0]]; s.armors=[]; s.activeWeps=['w_sys_1',null]; s.activeArmors={head:null,chest:null,legs:null,acc:null}; s.storyClaimed.fill(false); save(); render(); showModal('ASCENSIÓN', 'Has renacido', 'var(--sys-blue)'); }" class="w-full py-5 glass-panel text-xs tracking-widest font-bold uppercase transition-all mt-4 ${s.lvl>=10?'border-[var(--sys-blue)] text-[var(--sys-blue)] shadow-[0_0_15px_var(--sys-blue)]':'opacity-30 border-gray-800 text-gray-500'}">ASCENSIÓN PRESTIGIO</button>`;
                }
                mc.innerHTML = `<div class="active-tab">${h}</div>`;
            } catch(e) {
                // FALLBACK ABSOLUTO SI ALGO FALLA (Nunca te quedarás en la nada)
                mc.innerHTML = `<div class="p-6 m-4 text-center border-red-500 border bg-black/80 rounded-xl">
                    <p class="text-red-500 font-bold mb-4 font-sys">CRITICAL ERROR</p>
                    <p class="text-xs text-gray-400 mb-6">${e.message}</p>
                    <button onclick="localStorage.removeItem('${DB_KEY}'); location.reload();" class="btn-aaa w-full py-4 rounded text-xs font-bold uppercase tracking-widest">HARD RESET AHORA</button>
                </div>`;
                console.error(e);
            }
        }

        render(); checkTime();
    </script>
</body>
</html>
