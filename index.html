<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="apple-mobile-web-app-title" content="Nexo">
    <meta name="application-name" content="Nexo">

    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    
    <title>Nexo</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050914; color: white; font-family: 'Nunito', sans-serif; 
            height: 100dvh; margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
            box-sizing: border-box; overflow: hidden;
        }
        h1 { 
            color: #06b6d4; font-weight: 900; letter-spacing: 2px; 
            text-transform: uppercase; margin-bottom: 5px; 
            text-shadow: 0 0 15px rgba(6,182,212,0.5); font-size: 32px; text-align: center;
        }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 30px; text-align: center; }
        
        /* Cambiado a Grid 2x2 */
        .card-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            width: 100%; 
            max-width: 360px; 
        }
        
        .app-card { 
            background: #162032; border-radius: 20px; padding: 15px 10px; 
            text-align: center; cursor: pointer; transition: 0.1s; 
            position: relative; border: 2px solid #1e293b; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1 / 1.1; /* Cuadrados ligeramente altos para que quepa el texto */
            box-sizing: border-box;
        }
        .app-card:active { transform: translateY(8px); box-shadow: none !important; }
        
        /* Colores y sombras ajustadas para la cuadrícula */
        .card-estudio { border-color: #3b82f6; box-shadow: 0 8px 0 #1d4ed8; }
        .card-deporte { border-color: #10b981; box-shadow: 0 8px 0 #047857; }
        .card-dieta { border-color: #f59e0b; box-shadow: 0 8px 0 #b45309; }
        .card-examen { border-color: #ef4444; box-shadow: 0 8px 0 #b91c1c; } /* Nuevo color rojo para el examen */
        
        .icon { font-size: 42px; margin-bottom: 8px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .app-title { font-size: 18px; font-weight: 900; margin: 0; color: #e2e8f0; }
        
        /* Limitamos las líneas de la descripción para que no rompa el cuadrado */
        .app-desc { 
            font-size: 11px; color: #94a3b8; margin-top: 6px; font-weight: bold; 
            line-height: 1.3; 
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>EL NEXO</h1>
    <p class="subtitle">Selecciona tu misión actual</p>

    <div class="card-container">
        <div class="app-card card-estudio" onclick="window.location.href='estudio.html'">
            <div class="icon">📚</div>
            <h2 class="app-title">Estudiar</h2>
            <p class="app-desc">La paradoja de programar esto para no tener que estudiar.</p>
        </div>

        <div class="app-card card-deporte" onclick="window.location.href='deporte.html'">
            <div class="icon">🏋️‍♂️</div>
            <h2 class="app-title">Deporte</h2>
            <p class="app-desc">Subiendo los stats físicos en la vida real.</p>
        </div>

        <div class="app-card card-dieta" onclick="window.location.href='dieta.html'">
            <div class="icon">🥩</div>
            <h2 class="app-title">Dieta</h2>
            <p class="app-desc">No se si es triste o gracioso.</p>
        </div>

        <div class="app-card card-examen" onclick="window.location.href='examen.html'">
            <div class="icon">⚔️</div>
            <h2 class="app-title">Examen</h2>
            <p class="app-desc">Operación: Salvar el Mundo. Entrar al Plan de Batalla.</p>
        </div>
    </div>
</body>
</html>
