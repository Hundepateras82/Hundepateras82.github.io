            --sys-purple: #c084fc; 
            --gold: #fcd34d;       
            --dia: #2dd4bf;        
            --exotic: #facc15;

            --border-glass: rgba(255,255,255,0.12);

        body { 
            background: var(--bg-base); color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            padding-top: calc(env(safe-area-inset-top) + 5px);
            padding-bottom: calc(env(safe-area-bottom) + 80px);
        }
        .font-sys { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: linear-gradient(145deg, rgba(18,18,24,0.9) 0%, rgba(12,12,18,0.95) 100%);
            border: 1px solid var(--border-glass); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); border-radius: 16px;
        }
        .btn-aaa {
            background: linear-gradient(90deg, rgba(96,165,250,0.1), rgba(192,132,252,0.1));
            border: 1px solid var(--border-glass); color: var(--sys-blue); transition: all 0.2s;
        }
        .btn-aaa:active { transform: scale(0.97); }
        .progress-bar { transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .story-claimable { border: 1px solid #fff700 !important; box-shadow: 0 0 12px rgba(255, 247, 0, 0.5); cursor: pointer; animation: pulseGlow 2s infinite; }
        .quest-claimable { background-color: rgba(252, 211, 77, 0.2) !important; border-color: var(--gold) !important; color: var(--gold) !important; animation: pulseGlow 2s infinite; cursor: pointer; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        .editable-objective { border-bottom: 1px dashed var(--sys-blue); background: rgba(59,130,246,0.05); transition: 0.2s; padding: 6px; border-radius: 4px 4px 0 0; }
        .editable-objective:focus { background: rgba(59,130,246,0.15); outline: none; border-bottom-style: solid; }

        .chart-svg { width: 100%; height: 100%; stroke: var(--sys-blue); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        
        .art-icon { display: inline-flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.5)); border: 1px solid rgba(255,255,255,0.2); font-size: 24px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        document.body.addEventListener('click', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});

        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const STORY_TEXT = ["Tu hermano, el Rey Aric, consumió la magia del reino para volverse aparentemente inmortal. Cuando intentaste advertir al consejo de nobles sobre su locura tiránica, te silenció. Te arrebató tus títulos, quemó tu blasón familiar frente a todo el castillo y te exilió a los páramos oscuros, un lugar donde la muerte es la única certeza. Ahora vagas entre las sombras, alimentándote de la escasa vida que aún resiste en este yermo de ceniza, mientras tu mente solo alberga una idea: sobrevivir para cobrar tu venganza contra la corona que una vez juraste defender.", "Sobreviviendo en los páramos, descubriste pronto la cruda y terrorífica verdad. El Rey Aric no utilizaba magia arcana convencional para mantener su juventud. Había instaurado los 'Impuestos de Sangre'. En secreto, sus guardias drenaban la fuerza vital de los campesinos y las aldeas periféricas para canalizarla hacia la Ciudadela de Obsidiana. El reino entero se marchitaba, los cultivos se secaban y los niños nacían enfermos, todo para que tu hermano pudiera brillar con una salud eterna e impía en su trono inmaculado.", "Tras semanas huyendo de los horrores de la superficie, la tierra cedió bajo tus pies y caíste en las antiguas catacumbas de Aethelgard. Lo que parecía tu tumba resultó ser tu salvación. Allí abajo, entre ruinas de un mundo olvidado, habitaban los marginados, los monstruos desertores y los exiliados. Tras demostrar tu fuerza aniquilando a un Gólem de Hierro con tus manos desnudas, te nombraron su campeón. Por primera vez desde tu destierro, tenías aliados y un propósito: derrocar a la tiranía.", "Tu supervivencia no pasó desapercibida. Aric se enteró de tu nueva alianza subterránea y envió a su élite personal: Los Perros de Sangre. Asesinos despiadados imbuidos con magia roja. Durante semanas, la oscuridad de las catacumbas se llenó de emboscadas, veneno y hojas ocultas. Las peleas fueron brutales y estuviste a punto de morir docenas de veces. Pero con cada asesino que caía bajo tu filo, absorbías parte de su equipo y su maná residual, volviéndote exponencialmente más letal.", "Fue interrogando a uno de los Perros de Sangre agonizantes cuando la pieza final del rompecabezas encajó. El asesino, con sus últimos alientos y vomitando icor negro, confesó el origen del poder de Aric. No fue un hechizo, fue un trato directo con los Señores del Abismo Profundo. Tu hermano había vendido no solo su alma, sino el destino de todo el reino a entidades primigenias de puro caos. Ya no era un Rey, era un recipiente humano para la oscuridad más absoluta.", "El encuentro fue inevitable. En un intento desesperado por cortar una línea de suministros mágicos, fuiste emboscado por el mismísimo Aric. La batalla destrozó la montaña. La fuerza de tu hermano era antinatural; sus golpes rompían la barrera del sonido y su magia derretía la roca. En un último choque, su espada mágica perforó tu pecho, dejándote una espantosa cicatriz en el esternón. Sobreviviste de milagro al caer por un risco, pero esa herida ahora quema intensamente cada vez que canalizas tu maná.", "Arrastrándote, ensangrentado y al borde de la muerte, encontraste lo que los mitos llamaban la Forja Primigenia, el lugar donde los Primeros Reyes crearon las armas del mundo. Allí, soportando el dolor agónico de tu cicatriz y el calor infernal de la forja magmática, fundiste tus armas destrozadas y tu propia sangre para crear equipo de leyenda. Cuando saliste de esa cámara ardiente, el poder que irradiabas hacía temblar las paredes. Ya estabas listo para rivalizar con la monstruosidad de tu hermano.", "La noticia de tu supervivencia y tu nuevo poder se extendió como un incendio forestal. Los estandartes rotos de las casas nobles traicionadas se alzaron en la noche, uniéndose a las bestias y exiliados de las catacumbas. El ejército más extraño jamás visto en Aethelgard comenzó a marchar. El suelo temblaba con los pasos de tu rebelión. A lo lejos, la gigantesca e intimidante silueta de la Ciudadela de Obsidiana recortaba la luz de la luna. No habría negociaciones. Solo habría sangre.", "Las inmensas puertas de la capital fueron derribadas en cuestión de horas. Avanzaste por los pasillos de mármol que una vez llamaste hogar. Ahora, los tapices estaban rasgados, los muros supuraban magia negra y el hedor a muerte lo impregnaba todo. Los guardias reales caían ante ti como trigo ante la guadaña. Sin mirar atrás, abriste a patadas las gigantescas puertas de madera de roble negro de la Sala del Trono. Al fondo, sentado en la oscuridad y esperándote, estaba tu hermano.", "El choque final fue leyenda. La Ciudadela se desmoronaba alrededor vuestra mientras vuestras hojas colisionaban. Al final, usando un estallido de maná crudo que casi te desgarra por dentro, partiste su espada y lo arrodillaste. Aric cayó a tus pies, tosiendo ceniza negra. Mientras expiraba, la pesada corona de obsidiana rodó por el suelo hasta detenerse frente a ti. Al tocarla, sentiste que la corona no estaba fría... murmuraba tu nombre, ofreciéndote susurros de poder absoluto e inmortalidad. El reino era tuyo. Pero la pregunta permanecía: ¿Serías el salvador, o el próximo monstruo?"];

        const STORY_TEXT_2 = ["Años después de sentarte en el trono, encontraste el diario oculto de Aric en las mazmorras secretas. La primera página te heló la sangre. 'La grieta se está abriendo', decía su letra temblorosa. La verdad te golpeó como un mazo: Aric no consumió la magia del reino por avaricia ni por sed de poder. Descubrió una falla dimensional bajo el castillo por la que horrores cósmicos iban a devorar el mundo entero. Para sellarla, tuvo que absorber todo el maná disponible, convirtiéndose en el pilar que mantenía la realidad intacta.", "El diario detallaba la naturaleza del 'Abismo'. No era simplemente una dimensión paralela o un infierno terrenal, era una entidad viva. Un parásito interdimensional masivo que se alimentaba de la estabilidad de las realidades. Una vez que enganchaba sus tentáculos metafísicos a un mundo, drenaba sus leyes físicas y su vida. Aric, al darse cuenta de esto, intentó desesperadamente buscar un remedio arcano, pero se dio cuenta de que la única forma de frenarlo era alimentarlo con un recipiente infinito de poder: él mismo.", "Los temidos 'Impuestos de Sangre' que diezmaron las aldeas no fueron una tiranía egoísta. Aric descubrió que la Plaga del Abismo ya había infectado a los campesinos sin que lo supieran. Estaban incubando horrores invisibles en sus almas. El Rey ordenó a los Perros de Sangre extraer ese maná corrupto para purificar a los ciudadanos, asumiendo él todo el peso del pecado y la mala fama, y almacenando toda esa bilis oscura en su propia sangre para evitar una pandemia apocalíptica.", "Aric escribió sobre la noche de tu exilio. Las páginas estaban manchadas de lágrimas secas. 'Tuve que echarlo', escribió. 'Si se quedaba, el Abismo también lo habría consumido a él, o peor, me habría intentado detener. La única forma de salvar su vida era convertirlo en mi enemigo y alejarlo de la Ciudadela. Que el destino me perdone'. Tu destierro no fue un castigo, fue el último acto de amor de un hermano mayor intentando protegerte del infierno.", "El supuesto trato que Aric hizo con los Señores del Abismo también fue una mentira. Los Perros de Sangre te dijeron lo que Aric les ordenó que te dijeran. No hubo pacto, hubo una guerra silenciosa y solitaria. Tu hermano luchó batallas mentales diarias contra las entidades primigenias, manteniendo la puerta cerrada con su pura fuerza de voluntad. Cada día que pasaba en el trono, estaba siendo torturado desde el interior por voces incomprensibles.", "Recuerdas la cicatriz en tu pecho, la herida que Aric te hizo en vuestro primer encuentro. Según el diario, no intentaba matarte. Al apuñalarte, canalizó parte de su maná purificado hacia ti, creando un sello protector en tu alma. Esa cicatriz que te quemaba al usar magia no era una maldición, era un cortafuegos. Estaba evitando que el maná corrupto del Abismo fluyera hacia tu sistema cuando absorbías el poder de los enemigos derrotados en las catacumbas.", "El plan maestro de Aric fue brillante y suicida. Sabía que no podría retener al Abismo eternamente; su mente y su cuerpo eventualmente cederían. Neces Necesitaba un sucesor más fuerte, alguien forjado en la adversidad pura. Te exilió, te empujó al límite, te obligó a fortalecerte en las catacumbas y, finalmente, se dejó matar por ti en la Sala del Trono. Quería asegurarse de que cuando la corona cayera, la recogiera alguien capaz de soportar la carga que él ya no podía llevar.", "La Ciudadela de Obsidiana no era una fortaleza para proteger al Rey del pueblo; era una prisión para proteger al pueblo del Rey. Los muros estaban infundidos con magia negra no para intimidar, sino para contener la radiación del Abismo que Aric emanaba constantemente. Estuvo atrapado allí durante años, un prisionero de su propio sacrificio, mientras el reino entero lo odiaba y conspiraba contra él.", "En la última página del diario, había una oración silenciosa. Aric no pedía ser recordado como un héroe, ni pedía perdón por sus métodos brutales. Solo pedía que tú, su hermano, tuvieras la fuerza suficiente para terminar lo que él empezó. Él murió sabiendo que había salvado el mundo, sin esperar redención ni honor alguno.", "Cerraste el diario, temblando. Miraste la Corona de Obsidiana que ahora descansaba en tus sienes. El sacrificio de Aric fue monumental, pero la amenaza no había desaparecido. Al ponerte la corona, heredaste el sello. Las voces primigenias del Abismo comenzaron a susurrarte desde las sombras de la sala. El Rey está muerto, pero el parásito sigue hambriento, acechando bajo tus pies. Tu verdadero reinado no ha hecho más que empezar. La maldición de la corona ahora es tuya para soportarla."];

        function getEquipStats() {
            let eqAtk = 0; let mDisc = 0;
            s.activeWeps.forEach(wId => { if(wId) { let w = s.weapons.find(x => x.id === wId); if(w) eqAtk += w.atk; } });
            ['head','chest','legs','acc'].forEach(sl => {
                let aId = s.activeArmors[sl];
                if(aId) { let a = s.armors.find(x => x.id === aId); if(a) mDisc += a.manaDiscount; }
            });
            return { atk: eqAtk, manaDiscount: Math.min(90, mDisc) };
        }

            let now = new Date(Date.now() + s.timeOffset);
            let h = now.getHours(); let m = now.getMinutes(); let sec = now.getSeconds();
            let cTxt = document.getElementById('sys-countdown');
            if(cTxt) cTxt.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            
            let passedSecs = h*3600 + m*60 + sec; let totalSecs = 86400; let p = (passedSecs / totalSecs) * 100;
            let bar = document.getElementById('hud-time-bar'); if(bar) bar.style.width = `${p}%`;

            let strDate = now.toDateString();
            if(s.lastDate !== strDate) {
                s.racesToday = 0; s.labCraftsToday = 0;
                rollShop(); rollHerrero(); rollTrades(); rollQuests();
                s.lastDate = strDate; save();

        function generateLineChart() {

            let data = s.races.slice(-10).map(r => r.val);
            let max = Math.max(...data, 1); let min = Math.min(...data);
            if(max === min) max += 10;
            let w = 300; let h = 100;
            let points = data.map((v, i) => `${(i / Math.max(1, data.length - 1)) * w},${h - ((v - min) / (max - min)) * h}`).join(' ');
            let sDate = new Date(s.races[Math.max(0, s.races.length-10)].date).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});
            let eDate = new Date(s.races[s.races.length-1].date).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});
            return `
            <div class="relative w-full h-[120px] flex items-end mt-6 mb-6 border-l border-b border-[var(--sys-blue)]/50 pb-4 pl-8">
                <div class="absolute left-0 top-0 bottom-4 flex flex-col justify-between text-[8px] text-[var(--sys-blue)] font-sys"><span>${Math.ceil(max/60)}m</span><span>${Math.floor(min/60)}m</span></div>
                <svg viewBox="0 0 ${w} ${h}" class="chart-svg" preserveAspectRatio="none"><polyline points="${points}"/></svg>
                <div class="absolute bottom-[-16px] left-8 right-0 flex justify-between text-[8px] text-[var(--sys-blue)] font-sys"><span>${sDate}</span><span>${eDate}</span></div>
            </div>`;
        }

        function rollTrades() {
            s.dailyTrades = []; let p = s.prestige; let maxT = Math.min(10, s.lvl + (p*2));
            for(let i=0; i<3; i++) {
                let isSTier = Math.random() < 0.1;
                let gM = ALL_MATS[Math.floor(Math.random() * Math.min(ALL_MATS.length, maxT*6))][0];
                let rM = ALL_MATS[Math.floor(Math.random() * Math.min(ALL_MATS.length, maxT*6))][0];
                if(gM===rM) continue;
                s.dailyTrades.push({ giveM: gM, getM: rM, giveQ: Math.floor(Math.random()*10)+5, getQ: (Math.floor(Math.random()*5)+2) * (isSTier?3:1), isSTier: isSTier });
            }
        }
        function rollHerrero() {
            s.herreroItems = []; let maxT = Math.min(10, s.lvl + s.prestige);
            for(let i=0; i<3; i++) {
                let t = Math.floor(Math.random() * maxT) + 1;
                let w = ALL_WEAPONS.filter(x => x.reqTier === t);
                let wId = w[Math.floor(Math.random()*w.length)];
                let disc = DISCOUNT_TIERS.find(d => d.t === TIERS[t]);
                s.herreroItems.push({ w: wId, basePrice: t * 500, disc: disc });
            }
        }
        function rollShop() {
            s.dailyShopIds = []; let maxT = Math.min(10, s.lvl + s.prestige);
            for(let i=0; i<3; i++) {
                let itm = SHOP_POOL[Math.floor(Math.random()*SHOP_POOL.length)];
                let disc = DISCOUNT_TIERS.find(d => d.t === TIERS[maxT]);
                s.dailyShopIds.push({ id: itm.id, discP: disc ? disc.p : 0, discT: disc ? disc.t : 'I' });
            }
        }
        function rollQuests() {
            s.dailies = [];
            for(let i=0; i<3; i++) {
                let qt = QUEST_TYPES[Math.floor(Math.random()*QUEST_TYPES.length)];
                s.dailies.push({ id: `dq_${Date.now()}_${i}`, type: qt.type, desc: qt.desc, req: qt.req, prog: 0, done: false, claim: false, rExp: 100*s.lvl, rGold: 50*s.lvl });
            }
        }

        function updateQuest(type, amt=1) {
            let upd = false;
            s.dailies.forEach(q => { if(!q.done && q.type === type) { q.prog += amt; if(q.prog >= q.req) { q.prog = q.req; q.done = true; sfx.success(); toast('Misión Completada', 'var(--gold)'); } upd = true; } });
            if(upd) { save(); render(); }
        }

        // --- GACHA SYSTEM ---
        function gachaRoll(isMulti) {
            let rolls = isMulti ? 10 : 1;
            let cost = isMulti ? 900 : 100;
            if(s.dia < cost) { sfx.error(); return toast(`Faltan ${cost} Diamantes`, 'var(--sys-red)'); }
            s.dia -= cost; updateQuest('gacha', rolls); save(); updateHUD();
            
            pendingGachaResults = [];
            let maxT = Math.min(10, s.lvl + s.prestige);
            let pool = ALL_WEAPONS.filter(w => w.reqTier <= maxT).concat(ALL_ARMORS.filter(a => a.reqTier <= maxT));
            
            for(let i=0; i<rolls; i++) {
                let isLegendary = Math.random() < 0.05;
                let t = isLegendary ? Math.min(10, maxT+1) : Math.floor(Math.random() * maxT) + 1;
                let tierPool = pool.filter(x => x.reqTier === t);
                if(tierPool.length === 0) tierPool = pool;
                let item = tierPool[Math.floor(Math.random()*tierPool.length)];
                
                let inst = Object.assign({}, item, { id: `${item.type}_gacha_${Date.now()}_${i}` });
                if(inst.type === 'weapon') s.weapons.push(inst); else s.armors.push(inst);
                pendingGachaResults.push(inst);
            }
            save(); showGachaAnim(isMulti);
        }

        function showGachaAnim(isMulti) {
            let m = document.getElementById('gacha-modal');
            let art = document.getElementById('gacha-art');
            let t = document.getElementById('gacha-roulette-text');
            let grid = document.getElementById('gacha-results-grid');
            let btn = document.getElementById('gacha-close-btn');
            
            m.classList.remove('hidden'); m.style.display = 'flex';
            art.classList.remove('hidden'); grid.classList.add('hidden'); btn.classList.add('hidden');
            t.innerText = "TIRANDO..."; t.style.color = "white"; t.style.textShadow = "none";
            
            isGachaSpinning = true;
            let ticks = 0; let maxTicks = 30; let interval = 50;
            
            sfx.gachaSpin();
            
            gachaSpinInterval = setInterval(() => {
                ticks++;
                let rIcon = ['🔮','🗡️','🛡️','✨','🔥','💎'][Math.floor(Math.random()*6)];
                art.innerText = rIcon;
                
                if(ticks >= maxTicks) {
                    clearInterval(gachaSpinInterval);
                    isGachaSpinning = false;
                    
                    let best = pendingGachaResults.reduce((prev, current) => (prev.reqTier > current.reqTier) ? prev : current);
                    let c = getTierColor(best.reqTier);
                    
                    t.innerText = isMulti ? "¡TIRADA COMPLETADA!" : best.name.toUpperCase();
                    t.style.color = c; t.style.textShadow = `0 0 10px ${c}`;
                    art.innerText = best.ic || '🔮'; art.style.color = c; art.style.textShadow = `0 0 20px ${c}`;
                    
                    if(best.reqTier >= 8) sfx.gachaLegendary(); else sfx.gachaWin();
                    
                    btn.classList.remove('hidden');
                    btn.onclick = () => {
                        sfx.click();
                        if(isMulti) {
                            t.innerText = "RESULTADOS"; t.style.color = "white"; t.style.textShadow = "none";
                            art.classList.add('hidden'); grid.classList.remove('hidden');
                            btn.innerText = "CERRAR";
                            
                            pendingGachaResults.forEach(res => {
                                let c = getTierColor(res.reqTier);
                                grid.innerHTML += `<div class="bg-black/50 border border-[${c}]/30 p-2 rounded flex flex-col items-center">
                                    <span class="text-xl mb-1">${res.ic||'💎'}</span>
                                    <span class="text-[9px] font-bold text-center w-full truncate" style="color:${c}">${res.name}</span>
                                    <span class="text-[8px] text-gray-500 mt-1">Tier ${TIERS[res.reqTier]}</span>
                                </div>`;
                            });
                            
                            btn.onclick = () => { sfx.click(); closeGacha(); art.classList.remove('hidden'); };
                        } else {
                            closeGacha();
                        }
                    };
                }
            }, interval);
        }

            let m = document.getElementById('gacha-modal');
            m.classList.add('hidden'); m.style.display = '';
            render();
        }

                    ALL_MATS.forEach(m => {
                        let q = s.mats[m[0]] || 0;
                        if(q > 0) {
                            hasMat = true;
                            h += `<div onclick="sfx.click(); showModal('${m[1]} ${m[2]}', 'Cantidad: ${q}<br><br>${m[3]}', 'var(--gold)')" class="bg-black/50 border border-gray-800 p-3 rounded-xl text-center flex flex-col items-center justify-center cursor-pointer hover:border-gray-600 transition-colors">
                                <span class="text-2xl mb-1">${m[1]}</span>
                                <span class="text-[9px] font-bold text-gray-300 truncate w-full">${m[2]}</span>
                                <span class="text-[10px] font-sys text-[var(--gold)] mt-1">x${q}</span>
                            </div>`;
                        }
                    });
                    if(!hasMat) h += `<p class="col-span-2 sm:col-span-3 text-center text-xs opacity-50 py-10 border border-dashed border-gray-800 rounded-xl">Inventario vacío</p>`;
                    h += `</div>`;
                }
            } 
            else if(t === 'shop') {
                const st = s.subTabs[t] || 'merc';
                h += `<div class="flex gap-1 mb-4 bg-black/40 p-1 rounded-xl overflow-x-auto whitespace-nowrap">
                    <button onclick="setSubTab('merc')" class="px-4 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='merc'?'bg-[var(--sys-blue)]/20 text-[var(--sys-blue)]':'opacity-50'}">Mercado</button>
                    <button onclick="setSubTab('herr')" class="px-4 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='herr'?'bg-[var(--gold)]/20 text-[var(--gold)]':'opacity-50'}">Herrero</button>
                    <button onclick="setSubTab('mald')" class="px-4 py-2 rounded-lg text-[9px] uppercase font-bold ${st==='mald'?'bg-[var(--sys-red)]/20 text-[var(--sys-red)]':'opacity-50'}">Gremio Negro</button>
                </div>`;

                if(st === 'herr') {
                    h += `<div class="glass-panel p-5 mb-4">
                        <div class="flex justify-between items-center mb-3">
                            <h2 class="text-[10px] font-sys text-[var(--gold)] uppercase tracking-widest flex items-center gap-2"><span>⚒️ Herrero</span></h2>
                            <div class="flex gap-2 items-center">
                                <button onclick="if(s.dia>=50){ s.dia-=50; rollHerrero(); save(); render(); sfx.success(); toast('Herrero Renovado', 'var(--dia)');}else { sfx.error(); toast('Faltan 50💎','var(--sys-red)'); }" class="bg-[var(--dia)]/20 text-[var(--dia)] border border-[var(--dia)]/50 px-2 py-1 rounded text-[8px] font-bold uppercase tracking-widest">Reroll (50💎)</button>
                                <span class="text-[8px] text-[var(--sys-red)] font-bold tracking-widest" id="herr-countdown">--:--:--</span>
                            </div>
                        </div>
                        <div class="space-y-2 max-h-[300px] overflow-y-auto pr-1">`;
                    s.herreroItems.forEach((hi, idx) => {
                        let w = hi.w; let tCol = getTierColor(w.reqTier);
                        let finalPrice = hi.basePrice; let discBadge = "";
                        if(hi.disc && hi.disc.p > 0) {
                            finalPrice = Math.floor(hi.basePrice * (1 - (hi.disc.p/100)));
                            discBadge = `<span class="bg-[var(--sys-red)] text-white px-1 py-[2px] rounded text-[7px] ml-2 animate-pulse">-${hi.disc.p}% (Tier ${hi.disc.t})</span>`;
                        }
                        h += `<div class="flex flex-col text-[10px] bg-black/40 p-3 rounded border border-gray-800">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold flex items-center" style="color:${tCol}">⚔️ ${w.name} ${discBadge}</span>
                                <span class="text-[8px] text-gray-500">Tier ${TIERS[w.reqTier]}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] text-gray-400">ATK: <span class="text-white">${w.atk}</span></span>
                                <button onclick="sfx.click(); if(s.gold>=${finalPrice}){ s.gold-=${finalPrice}; s.weapons.push(Object.assign({}, ${JSON.stringify(w).replace(/"/g, "'")}, {id:'w_herr_'+Date.now()+'_${idx}'})); s.herreroItems.splice(${idx},1); save(); render(); toast('Arma Comprada', 'var(--gold)'); sfx.gachaWin(); } else { sfx.error(); toast('Oro Insuficiente', 'var(--sys-red)'); }" class="text-[var(--gold)] font-bold border border-[var(--gold)]/50 px-3 py-1 rounded bg-[var(--gold)]/10 font-sys">${finalPrice}G</button>
                            </div>
                        </div>`;
                    });
                    if(s.herreroItems.length===0) h += `<p class="text-[10px] opacity-50 text-center py-4">Todo comprado.</p>`;
                    h += `</div></div>`;
                } else if(st === 'mald') {
                    h += `<div class="glass-panel p-6 border-[var(--sys-purple)]/50 mb-4 flex flex-col items-center">
                        <div class="art-icon mb-4 scale-125 border-[var(--sys-purple)]/50 text-[var(--sys-purple)] shadow-[0_0_15px_var(--sys-purple)] animate-pulse">🔮</div>
                        <h2 class="text-sm font-sys text-[var(--sys-purple)] uppercase tracking-widest mb-1 text-center">Gremio de Invocadores</h2>
                        <p class="text-[9px] text-gray-400 text-center mb-6">Usa diamantes para invocar armas o armaduras arcanas aleatorias adaptadas a tu nivel.</p>
                        
                        <div class="w-full space-y-3">
                            <button onclick="gachaRoll(false)" class="w-full py-4 rounded-xl border border-[var(--sys-blue)]/50 bg-[var(--sys-blue)]/10 text-[var(--sys-blue)] font-bold uppercase tracking-widest flex justify-between items-center px-6">
                                <span>1 INVOCACIÓN</span>
                                <span class="text-[var(--dia)]">100 💎</span>
                            </button>
                            <button onclick="gachaRoll(true)" class="w-full py-4 rounded-xl border border-[var(--sys-purple)]/50 bg-[var(--sys-purple)]/10 text-[var(--sys-purple)] font-bold uppercase tracking-widest flex justify-between items-center px-6 relative overflow-hidden">
                                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-[var(--sys-purple)]/20 to-transparent translate-x-[-100%] animate-[shimmer_2s_infinite]"></div>
                                <span>10 INVOCACIONES <span class="text-[8px] bg-[var(--sys-red)] text-white px-1 py-0.5 rounded ml-1 animate-pulse">-10%</span></span>
                                <span class="text-[var(--dia)]">900 💎</span>
                            </button>
                        </div>
                    </div>`;
                } else if(st === 'merc') {
                    h += `<div class="glass-panel p-5 mb-4">
                        <div class="flex justify-between items-center mb-3">
                            <h2 class="text-[10px] font-sys text-[var(--sys-blue)] uppercase tracking-widest">Mercado Negro</h2>
                            <div class="flex gap-2 items-center">
                                <button onclick="if(s.dia>=50){ s.dia-=50; rollShop(); save(); render(); sfx.success(); toast('Tienda Renovada', 'var(--dia)');}else { sfx.error(); toast('Faltan 50💎','var(--sys-red)'); }" class="bg-[var(--dia)]/20 text-[var(--dia)] border border-[var(--dia)]/50 px-2 py-1 rounded text-[8px] font-bold uppercase tracking-widest">Reroll (50💎)</button>
                                <span class="text-[8px] text-[var(--sys-red)] font-bold tracking-widest" id="shop-countdown">--:--:--</span>
                            </div>
                        </div>
                        <div class="space-y-2 max-h-[300px] overflow-y-auto pr-1">`;
                    (s.dailyShopIds || []).forEach((itemObj, idx) => {
                        let item = SHOP_POOL.find(x => x.id === itemObj.id);
                        if(item) {
                            let mInfo = ALL_MATS.find(m => m[0] === item.mat);
                            let finalCost = item.cost; let discBadge = "";
                            if(itemObj.discT && itemObj.discP > 0) {
                                finalCost = Math.floor(item.cost * (1 - (itemObj.discP / 100)));
                                discBadge = `<span class="bg-[var(--sys-red)] text-white px-1 py-[2px] rounded text-[7px] ml-2 animate-pulse">-${itemObj.discP}% (Tier ${itemObj.discT})</span>`;
                            }
                            h += `<div class="flex justify-between items-center text-[10px] bg-black/40 p-3 rounded border border-[var(--border-glass)]">
                                <div class="flex items-center gap-3">
                                    <span class="text-xl">${mInfo[1]}</span>
                                    <div class="flex flex-col">
                                        <span class="text-gray-200 font-bold mb-1 flex items-center">${item.qty}x ${mInfo[2]} ${discBadge}</span>
                                        <span class="text-[8px] text-gray-500 w-32 truncate">${mInfo[3]}</span>
                                    </div>
                                </div>
                                <button onclick="sfx.click(); if(s['${item.costType}']>=${finalCost}){ s['${item.costType}']-=${finalCost}; s.mats['${item.mat}']=(s.mats['${item.mat}']||0)+item.qty; s.dailyShopIds.splice(${idx},1); save(); render(); toast('Compra Realizada', 'var(--gold)'); sfx.success(); } else { sfx.error(); toast('Fondos Insuficientes', 'var(--sys-red)'); }" class="text-[var(--${item.costType})] font-bold border border-[var(--${item.costType})]/50 px-3 py-2 rounded bg-[var(--${item.costType})]/10 uppercase tracking-widest">${finalCost} ${item.costType.toUpperCase()}</button>
                            </div>`;
                        }
                    });
                    if(s.dailyShopIds.length===0) h += `<p class="text-[10px] opacity-50 text-center py-4">Todo comprado.</p>`;
                    h += `</div></div>`;
                }
            }

            mc.innerHTML = h; updateHUD();
        }

        function submitWorkout() {
            let limitReached = (s.racesToday || 0) >= 4; 
            if(limitReached) { sfx.error(); return toast('Límite Diario (4/4)', 'var(--sys-red)'); }
            
            let sp = SPORTS[selectedSport];
            let v1 = document.getElementById('in-1')?.value;
            let v2 = document.getElementById('in-2')?.value;
            let val = sp.calc(v1, v2);
            if(val > 0) {
                s.races.push({ val: val, date: new Date().toISOString(), sp: selectedSport, desc: sp.txt(v1||0, v2||0) });
                s.racesToday++; sfx.success();
                addExp(val * 10); s.gold += val * 2;
                updateQuest('race'); save(); render(); toast('¡ENTRENAMIENTO COMPLETADO!', 'var(--sys-purple)');
            } else { sfx.error(); toast('Datos inválidos', 'var(--sys-red)'); }
        }

        function startPotionCraft(pId, n) {
            let p = POTIONS_DB[pId];
            for(let m in p.cost) { if((s.mats[m]||0) < p.cost[m]) { sfx.error(); return toast('Faltan Materiales', 'var(--sys-red)'); } }
            for(let m in p.cost) { s.mats[m] -= p.cost[m]; }
            s.activeCrafts[pId] = { time: 3600, maxTime: 3600, ready: false, ex: new Date(Date.now() + 3600000).toLocaleTimeString() };
            s.labCraftsToday++; updateQuest('pot'); save(); render(); sfx.click(); toast('Destilación Iniciada', 'var(--sys-purple)');
        }

        function checkActiveCrafts() {
            let upd = false;
            for(let pId in s.activeCrafts) {
                let c = s.activeCrafts[pId];
                if(!c.ready) {
                    c.time--;
                    let btn = document.getElementById(`craft-btn-${pId}`);
                    if(btn) btn.innerHTML = `⏳ ${c.time}s<br><span class="text-[7px]">${c.ex}</span>`;
                    if(c.time <= 0) { c.ready = true; upd = true; sfx.success(); toast('Poción Lista', 'var(--sys-purple)'); }
                }
            }
            if(upd) { save(); render(); }
            
            if(s.mana < MAX_MANA()) {
                if(!s.manaTicks) s.manaTicks = 0;
                s.manaTicks++;
                let t = document.getElementById('mana-regen-timer');
                if(t) t.innerText = `(${60 - s.manaTicks}s)`;
                if(s.manaTicks >= 60) {
                    s.manaTicks = 0; s.mana += 1;
                    if(s.mana > MAX_MANA()) s.mana = MAX_MANA();
                    save(); updateHUD();
                }
            } else {
                let t = document.getElementById('mana-regen-timer');
                if(t) t.innerText = `(MAX)`;
            }
        }

        function claimPotion(pId, n, isInstaMana=false) {
            delete s.activeCrafts[pId];
            if(isInstaMana) {
                s.mana += POTIONS_DB[pId].val; if(s.mana > MAX_MANA()) s.mana = MAX_MANA();
                sfx.success(); toast(`+${POTIONS_DB[pId].val} Maná`, 'var(--sys-blue)');
            } else {
                s.potionInv[n] = (s.potionInv[n] || 0) + 1; sfx.success(); toast('Poción Reclamada', 'var(--sys-purple)');
            }
            save(); render();
        }

        function usePotion(n, tKey, v) {
            if(s.potionInv[n] > 0) {
                s.potionInv[n]--;
                if(tKey === 'exp') s.potions.expB = v;
                else if(tKey === 'gold') s.potions.goldB = v;
                else if(tKey === 'dia') s.potions.diaB = v;
                sfx.success(); save(); render(); toast(`Efecto Activo`, 'var(--sys-purple)');
            }
        }

        function attackBoss(id, mCost, drops, matRange) {
            let eq = getEquipStats();
            let finalCost = Math.max(1, mCost * (1 - (eq.manaDiscount/100)));
            if(s.mana < finalCost) { sfx.error(); return toast('Maná Insuficiente', 'var(--sys-red)'); }
            s.mana -= finalCost;
            let dmg = s.atk + eq.atk + (s.lvl*5);
            let isCrit = Math.random() < 0.2; if(isCrit) dmg *= 2;
            let b = s.bosses[id];
            b.hp -= dmg;
            sfx.hit();
            if(b.hp <= 0) {
                b.hp = b.maxHp; b.name = drops[Math.floor(Math.random()*drops.length)];
                let rM = ALL_MATS[Math.floor(Math.random()*(matRange[1]-matRange[0]))+matRange[0]][0];
                s.mats[rM] = (s.mats[rM]||0) + Math.floor(Math.random()*3)+1;
                let diaDrop = Math.floor(Math.random()*10 * s.potions.diaB); s.dia += diaDrop;
                let gDrop = Math.floor(Math.random()*100 * s.potions.goldB); s.gold += gDrop;
                addExp(b.maxHp * s.potions.expB);
                updateQuest('boss'); updateQuest('boss3');
                sfx.success(); toast(isCrit ? `¡CRÍTICO! Jefe Derrotado` : `Jefe Derrotado`, 'var(--gold)');
            } else {
                toast(isCrit ? `¡CRÍTICO! -${dmg} HP` : `-${dmg} HP`, 'var(--sys-red)');
            }
            save(); render();
        }

        function exploreDungeon(matRange, mCost) {
            let eq = getEquipStats();
            let finalCost = Math.max(1, mCost * (1 - (eq.manaDiscount/100)));
            if(s.mana < finalCost) { sfx.error(); return toast('Maná Insuficiente', 'var(--sys-red)'); }
            s.mana -= finalCost;
            let rM = ALL_MATS[Math.floor(Math.random()*(matRange[1]-matRange[0]))+matRange[0]][0];
            let q = Math.floor(Math.random()*2)+1;
            s.mats[rM] = (s.mats[rM]||0) + q;
            addExp(50 * s.potions.expB);
            sfx.click(); toast(`Encontrado ${q}x ${getMatName(rM)}`, 'var(--sys-blue)');
            save(); render();
        }

        function claimQuest(id) {
            let q = s.dailies.find(x => x.id === id);
            if(q && q.done && !q.claim) {
                q.claim = true;
                addExp(q.rExp * s.potions.expB); s.gold += (q.rGold * s.potions.goldB);
                sfx.success(); toast('Recompensa Reclamada', 'var(--gold)');
                save(); render();
            }
        }

        function addExp(v) {
            s.exp += v;
            let req = getReqExp(s.lvl);
            if(s.exp >= req) {
                if(s.lvl < 10) { s.lvl++; s.exp = 0; sfx.success(); toast(`¡TIER SUBIDO A ${TIERS[s.lvl]}!`, 'var(--sys-purple)'); }
                else { s.exp = req; toast('MAX TIER ALCANZADO', 'var(--gold)'); }
            }
        }

        function tryPrestige() {
            if(s.lvl >= 10) {
                if(confirm("¿Ascender al siguiente nivel de Prestigio? Perderás oro, diamantes y pociones consumibles (no recetas), pero desbloquearás multiplicadores permanentes, acceso al mapa completo, mayores recompensas y más maná máximo.")) {
                    s.prestige++;
                    s.lvl = 1; s.exp = 0; s.gold = 0; s.dia = 0;
                    s.potionInv = {}; s.potions = { expB: 1.0, goldB: 1.0, diaB: 1.0 };
                    s.mana = MAX_MANA();
                    sfx.gachaLegendary();
                    toast(`¡ASCENSIÓN ${s.prestige} COMPLETADA!`, 'var(--gold)');
                    save(); render();
                }
            } else {
                sfx.error(); toast('Requiere Tier S (10)', 'var(--sys-red)');
            }
        }
        
        function claimStory(idx, isReino2) {
            let UNL_arr = isReino2 ? s.story2Unlocks : s.storyUnlocks;
            if(!UNL_arr[idx]) {
                UNL_arr[idx] = true;
                s.gold += 10000;
                sfx.success();
                toast('10,000G Reclamados', 'var(--gold)');
                save(); render();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
