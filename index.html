<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030712">
    
    <meta name="apple-mobile-web-app-title" content="Nexo">
    <meta name="application-name" content="Nexo">

    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    
    <title>Nexo - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030712;
            --glass-bg: rgba(17, 24, 39, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Colores de misión */
            --c-estudio: #3b82f6;
            --c-deporte: #10b981;
            --c-dieta: #f59e0b;
            --c-cuartel: #e11d48;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 24px; 
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        /* --- FONDO ANIMADO FUTURISTA --- */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: float 12s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate;
        }
        .light-1 { width: 350px; height: 350px; background: rgba(59, 130, 246, 0.3); top: -100px; left: -100px; animation-delay: 0s; }
        .light-2 { width: 400px; height: 400px; background: rgba(225, 29, 72, 0.2); bottom: -150px; right: -100px; animation-delay: -4s; }
        .light-3 { width: 250px; height: 250px; background: rgba(16, 185, 129, 0.2); top: 40%; left: 30%; animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.1); }
            100% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        h1 { 
            font-weight: 900; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 38px; 
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.1));
        }

        .subtitle { 
            color: var(--text-muted); 
            font-size: 15px; 
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle span {
            display: inline-block;
            width: 8px; height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 10px #10b981;
            animation: pulse-dot 2s infinite;
        }

        /* --- GRID DE MISIONES --- */
        .card-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            width: 100%; 
            max-width: 380px; 
            z-index: 10;
        }

        /* --- TARJETAS GLASSMORPHISM --- */
        .app-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; 
            padding: 20px 14px; 
            text-align: center; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            aspect-ratio: 1 / 1.15;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            
            /* Animación de entrada escalonada */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s ease-out forwards;
        }

        .card-container .app-card:nth-child(1) { animation-delay: 0.1s; }
        .card-container .app-card:nth-child(2) { animation-delay: 0.2s; }
        .card-container .app-card:nth-child(3) { animation-delay: 0.3s; }
        .card-container .app-card:nth-child(4) { animation-delay: 0.4s; }

        /* Brillo de fondo específico por tarjeta */
        .app-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100%;
            background: radial-gradient(circle at center 0%, var(--card-color), transparent 60%);
            opacity: 0.05; transition: opacity 0.3s; z-index: 0;
            pointer-events: none;
        }

        .app-card.card-estudio { --card-color: var(--c-estudio); }
        .app-card.card-deporte { --card-color: var(--c-deporte); }
        .app-card.card-dieta { --card-color: var(--c-dieta); }
        .app-card.card-cuartel { --card-color: var(--c-cuartel); }

        /* Interacciones Nativas (Hover/Active) */
        @media (hover: hover) {
            .app-card:hover { 
                transform: translateY(-5px) scale(1.02); 
                border-color: rgba(255,255,255,0.15);
                box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            }
            .app-card:hover::before { opacity: 0.15; }
        }
        
        .app-card:active { 
            transform: scale(0.94) !important; 
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(0.8);
        }

        /* --- CONTENIDO DE TARJETA --- */
        .icon { 
            font-size: 46px; 
            margin-bottom: 12px; 
            z-index: 1;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }
        .app-card:active .icon { transform: scale(0.9); }

        .app-title { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--text-main);
            z-index: 1;
            letter-spacing: 0.5px;
        }
        
        .app-desc { 
            font-size: 12px; 
            color: var(--text-muted); 
            margin-top: 8px; 
            font-weight: 400; 
            line-height: 1.4; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden;
            z-index: 1;
            padding: 0 5px;
        }

        /* --- KEYFRAMES --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="ambient-light light-3"></div>

    <header>
        <h1>EL NEXO</h1>
        <p class="subtitle"><span></span>Sistemas en línea</p>
    </header>

    <div class="card-container">
        <div class="app-card card-estudio" onclick="window.location.href='estudio.html'">
            <div class="icon">📚</div>
            <h2 class="app-title">Estudiar</h2>
            <p class="app-desc">La paradoja de programar para no estudiar.</p>
        </div>

        <div class="app-card card-deporte" onclick="window.location.href='deporte.html'">
            <div class="icon">🏋️‍♂️</div>
            <h2 class="app-title">Deporte</h2>
            <p class="app-desc">Subiendo los stats físicos en la vida real.</p>
        </div>

        <div class="app-card card-dieta" onclick="window.location.href='dieta.html'">
            <div class="icon">🥩</div>
            <h2 class="app-title">Dieta</h2>
            <p class="app-desc">El combustible de la máquina.</p>
        </div>

        <div class="app-card card-cuartel" onclick="window.location.href='cuartel.html'">
            <div class="icon">🛠️</div>
            <h2 class="app-title">Cuartel General</h2>
            <p class="app-desc">El creador de niveles de tu vida.</p>
        </div>
    </div>

</body>
</html>
