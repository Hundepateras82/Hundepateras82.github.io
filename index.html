            background: var(--bg-base); 
            color: #e2e8f0; 
            font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;

            border: 1px solid var(--border-glass); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            border-radius: 16px; 
            transition: all 0.3s ease; 
        }

            background: linear-gradient(145deg, rgba(12,24,32,0.9) 0%, rgba(6,12,16,0.95) 100%);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;
        
        document.body.addEventListener('touchstart', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        document.body.addEventListener('click', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        
        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); 
            const gain = audioCtx.createGain();
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); 
            gain.connect(audioCtx.destination); 
            osc.start(); 
            osc.stop(audioCtx.currentTime + duration);
        }

            let tb = document.getElementById('hud-time-bar'); 
            if(tb) tb.style.width = `${(msSM / 86400000) * 100}%`;
            
            let rem = 86400000 - msSM;
            let h = Math.floor(rem/3600000).toString().padStart(2, '0'); 
            let m = Math.floor((rem%3600000)/60000).toString().padStart(2, '0'); 
            let sec = Math.floor((rem%60000)/1000).toString().padStart(2, '0');
            
            ['sys-countdown', 'shop-countdown', 'herrero-countdown', 'trade-countdown'].forEach(id => { 
                let el = document.getElementById(id); 
                if(el) el.innerText = `${h}:${m}:${sec}`; 
            });
            
            let cvH = Math.floor(nV / 3600000);
            if (cvH - s.lastManaHour > 0) { 
                if(s.mana < MAX_MANA()) s.mana = Math.min(MAX_MANA(), s.mana + (cvH - s.lastManaHour)); 
                s.lastManaHour = cvH;

            let mT = document.getElementById('mana-regen-timer');

        function generateLineChart(sportFilter = null, metricName = 'Unidades') {
            let filtered = sportFilter ? s.races.filter(r => r.sp === sportFilter) : s.races;
            
            if(!filtered || filtered.length < 2) {
                return `
                <div class="text-[10px] text-center opacity-50 py-10 uppercase tracking-widest border border-dashed border-gray-700 rounded-xl mt-4">
                    Requiere 2 registros
                </div>`;
            }
            
            let max = Math.max(...filtered.map(r => r.val));
            let min = Math.min(...filtered.map(r => r.val));
            let range = (max - min) || 1;
            let w = 100;
            let h = 60;
            
            let points = filtered.map((r, i) => {
                let x = (i / (filtered.length - 1)) * w;
                let y = h - ((r.val - min) / range * (h - 10) + 5);
                return `${x},${y}`;
            }).join(' ');
            
            let sDate = new Date(filtered[0].date).toLocaleDateString(undefined, {month: 'numeric', day: 'numeric'});
            let eDate = new Date(filtered[filtered.length - 1].date).toLocaleDateString(undefined, {month: 'numeric', day: 'numeric'});
            let col = s.activeZone === 2 ? 'var(--z2-cyan)' : 'var(--sys-blue)';
            
            return `
            <div class="relative w-full h-[120px] flex items-end mt-6 mb-6 border-l border-b pb-4 pl-8" style="border-color:${col}50">
                <span class="absolute -top-4 left-0 text-[8px] font-bold uppercase tracking-widest px-2 py-1 rounded" style="color:${col}; background-color:${col}10">
                    ${metricName}
                </span>
                <div class="absolute left-0 top-0 bottom-4 flex flex-col justify-between text-[8px] font-sys" style="color:${col}">
                    <span>${Math.ceil(max)}</span>
                    <span>${Math.floor(min)}</span>
                </div>
                <svg viewBox="0 0 ${w} ${h}" class="chart-svg" preserveAspectRatio="none" style="color:${col}">
                    <polyline points="${points}"/>
                </svg>
                <div class="absolute bottom-[-16px] left-8 right-0 flex justify-between text-[8px] font-sys" style="color:${col}">
                    <span>${sDate}</span>
                    <span>${eDate}</span>
                </div>
            </div>`;
        }

        function attackBoss(bId, cost, namesArray, matRange) {
            sfx.click();
            let b = s.bosses[bId];
            let eq = getEquipStats();
            let finalCost = Math.max(1, cost * (1 - (eq.manaDiscount / 100)));
            
            if(s.mana < finalCost) {
                sfx.error();
                return toast("Maná Insuficiente", "var(--sys-red)");
            }
            
            s.mana -= finalCost;
            sfx.hit();
            b.hp -= (s.atk + eq.atk + (s.lvl * 5));
            
            if(b.hp <= 0) {
                hookQuest('boss');
                let e = cost * 1000;
                let g = cost * 5000;
                let diaDrop = Math.floor(Math.random() * 41) + 10;
                
                if(bId === 'b4') {
                    e = 100000;
                    g = 1000000;
                    diaDrop += 2000;
                }
                
                b.lvl++;
                b.maxHp = Math.floor(b.maxHp * 1.5);
                b.hp = b.maxHp;
                b.name = namesArray[Math.min(b.lvl - 1, namesArray.length - 1)] || namesArray[namesArray.length - 1];
                
                let dropCount = Math.floor(Math.random() * 5) + 1;
                let dropsMap = {};
                
                for(let i = 0; i < dropCount; i++) {
                    let m = ALL_MATS[Math.floor(Math.random() * (matRange[1] - matRange[0] + 1)) + matRange[0]];
                    dropsMap[m[0]] = (dropsMap[m[0]] || 0) + 1;

            }

        let pendingGachaResults = [];
        
        function pullGacha(type, amount, isMaldita = false) {
            sfx.click();
            let cost = (isMaldita ? 800 : 160) * amount;
            
            if(s.diamonds < cost) {
                sfx.error();
                return toast(`Faltan ${cost} 💎`, "var(--sys-red)");
            }
            
            s.diamonds -= cost;
            hookQuest('gacha');
            save();
            updateHUD();
            
            let pool = type === 'W' ? ALL_WEAPONS : ALL_ARMORS;
            pendingGachaResults = [];

            for(let i = 0; i < amount; i++) {
                let r = Math.random() * 100;
                let t = 1;
                
                if(!isMaldita) {
                    if(r < 20) t = 1;
                    else if(r < 40) t = 2;
                    else if(r < 57) t = 3;
                    else if(r < 74) t = 4;
                    else if(r < 84) t = 5;
                    else if(r < 89) t = 6;
                    else if(r < 94) t = 7;
                    else if(r < 97) t = 8;
                    else if(r < 99) t = 9;
                    else t = 10;
                } else {
                    if(r < 40) t = 6;
                    else if(r < 70) t = 7;
                    else if(r < 85) t = 8;
                    else if(r < 95) t = 9;
                    else t = 10;
                }

                let valid = pool.filter(x => x.reqTier === t);
                if(valid.length === 0) valid = pool;
                
                let item = Object.assign({}, valid[Math.floor(Math.random() * valid.length)]);
                item.id = `g_${Date.now()}_${i}`;
                item.ic = type === 'W' ? '⚔️' : (item.ic || '🛡️');
                
                if(type === 'W') s.weapons.push(item);
                else s.armors.push(item);
                
                pendingGachaResults.push(item);
            }
            
            save();
            let bestItem = pendingGachaResults.reduce((prev, current) => (prev.reqTier > current.reqTier) ? prev : current);
            playGachaRoulette(bestItem, type, amount > 1);
        }

        function playGachaRoulette(bestItem, type, isMulti) {
            let m = document.getElementById('gacha-modal');
            m.classList.remove('hidden');
            m.style.display = 'flex';
            
            let t = document.getElementById('gacha-roulette-text');
            let btn = document.getElementById('gacha-close-btn');
            let grid = document.getElementById('gacha-results-grid');
            let art = document.getElementById('gacha-art');
            
            btn.classList.add('hidden');
            grid.classList.add('hidden');
            grid.innerHTML = '';
            
            let itemsToFlash = type === 'W' ? ALL_WEAPONS : ALL_ARMORS;
            let duration = 2000;
            let interval = 60;
            let elapsed = 0;
            
            let timer = setInterval(() => {
                elapsed += interval;
                let rItem = itemsToFlash[Math.floor(Math.random() * itemsToFlash.length)];
                t.innerText = rItem.name;
                t.style.color = getTierColor(rItem.reqTier);
                art.innerText = type === 'W' ? '⚔️' : (rItem.ic || '🛡️');
                sfx.gachaSpin();
                
                if (elapsed >= duration) {
                    clearInterval(timer);
                    t.innerText = bestItem.name + `\n(Tier ${TIERS[bestItem.reqTier]})`;
                    t.style.color = getTierColor(bestItem.reqTier);
                    t.style.textShadow = `0 0 20px ${getTierColor(bestItem.reqTier)}`;
                    art.innerText = bestItem.ic || '💎';
                    art.style.borderColor = getTierColor(bestItem.reqTier);
                    
                    if(bestItem.reqTier >= 8) sfx.gachaLegendary();
                    else sfx.gachaWin();
                    
                    btn.classList.remove('hidden');
                    btn.onclick = () => {
                        sfx.click();
                        if(isMulti) {
                            t.innerText = "RESULTADOS";
                            t.style.color = "white";
                            t.style.textShadow = "none";
                            art.classList.add('hidden');
                            grid.classList.remove('hidden');
                            btn.innerText = "CERRAR";
                            
                            pendingGachaResults.forEach(res => {
                                let c = getTierColor(res.reqTier);
                                grid.innerHTML += `
                                <div class="bg-black/50 border border-[${c}]/30 p-3 rounded-xl flex flex-col items-center shadow-inner">
                                    <span class="text-2xl mb-2">${res.ic || '💎'}</span>

                            btn.onclick = () => {
                                sfx.click();

                            };

                        }
                    };
                }
            }, interval);
        }

        function closeGacha() {
            let m = document.getElementById('gacha-modal');
            m.classList.add('hidden');
            m.style.display = '';
            render();
        }

        // ==========================================
        // LÓGICA DE TIENDA Y TRUEQUES
        // ==========================================
        function buyShop(idx) {
            sfx.click();
            let itemObj = s.dailyShopIds[idx];
            let item = SHOP_POOL.find(x => x.id === itemObj.id);
            
            if(!item) return;
            
            let finalCost = itemObj.discT && itemObj.discP > 0 ? Math.floor(item.cost * (1 - (itemObj.discP / 100))) : item.cost;
            
            if(s.gold >= finalCost) {
                s.gold -= finalCost;
                s.mats[item.mat] += item.qty;
                
                if(itemObj.discT) {
                    itemObj.purchases = (itemObj.purchases || 0) + 1;
                    if(itemObj.purchases === 1) itemObj.discP = Math.floor(itemObj.discP / 2);
                    else if(itemObj.purchases >= 2) itemObj.discP = 0;
                }
                
                save();
                toast('Comprado', 'var(--gold)');
                sfx.gachaWin();
                render();
            } else {
                sfx.error();
                toast('Oro Insuficiente', 'var(--sys-red)');
            }
        }

        // ==========================================
        // LÓGICA DE ZONA 2 (CUEVAS DE CRISTAL)
        // ==========================================
        function z2_refine() {
            sfx.click();
            let cost = 10;
            
            if(s.mats['m1'] >= cost && s.mats['m10'] >= cost) {
                s.mats['m1'] -= cost;
                s.mats['m10'] -= cost;
                let yieldAmount = 5 * (s.prestige + 1);
                s.z2_dust += yieldAmount;
                
                sfx.success();
                save();
                render();
                toast(`+${yieldAmount} Polvo Prismático`, 'var(--z2-cyan)');
            } else {
                sfx.error();
                toast('Faltan Materiales (Acero y Madera)', 'var(--sys-red)');
            }
        }

        function z2_craftCore() {
            sfx.click();
            if(s.z2_dust >= 50) {
                s.z2_dust -= 50;
                s.z2_cores += 1;
                sfx.gachaWin();
                save();
                render();
                toast('+1 Núcleo Resonante', 'var(--sys-purple)');
            } else {
                sfx.error();
                toast('Faltan 50 Polvo Prismático', 'var(--sys-red)');
            }
        }

        function z2_step() {
            sfx.click();
            
            if(s.mana < 2) return toast('Falta Maná', 'var(--sys-red)');
            
            s.mana -= 2;
            s.z2_run.depth += 1;
            
            let r = Math.random();
            
            if(r < 0.4) {
                // Combate contra Gólem
                let dmg = Math.floor(Math.random() * 20) + (s.z2_run.depth * 5);
                let eq = getEquipStats();
                dmg = Math.max(1, dmg - Math.floor(eq.atk / 100)); // Armadura base mitigando daño
                s.z2_run.hp -= dmg;
                toast(`¡Gólem Prismático! -${dmg} HP`, 'var(--sys-red)');
                sfx.hit();
            } else if(r < 0.8) {
                // Evento de Botín
                let g = 1000 * s.z2_run.depth * (1 + getZ2Multiplier('gold') / 100);
                s.z2_run.loot.gold = (s.z2_run.loot.gold || 0) + g;
                s.z2_run.loot.dust = (s.z2_run.loot.dust || 0) + s.z2_run.depth;
                toast('Vena de Cristal Encontrada', 'var(--z2-teal)');
                sfx.success();
            } else {
                // Nada
                toast('La cueva está en silencio...', 'gray');
            }
            
            if(s.z2_run.hp <= 0) {
                sfx.error();
                showModal('☠️ COLAPSO', 'El Gólem Prismático te ha aplastado. Pierdes todo el botín de esta expedición.', 'var(--sys-red)');
                s.z2_run = { active: false, depth: 0, hp: 100, maxHp: 100, loot: {} };
            }
            
            save();
            render();
        }

        function z2_flee() {
            sfx.success();
            let tg = Math.floor(s.z2_run.loot.gold || 0);
            let td = Math.floor(s.z2_run.loot.dust || 0);
            
            gain('gold', tg);
            s.z2_dust += td;
            
            showModal(
                '🏃 ESCAPE CON ÉXITO',
                `Lograste salir vivo de la Profundidad ${s.z2_run.depth}.<br><br>Botín asegurado:<br>+${tg} Oro<br>+${td} Polvo Prismático`,
                'var(--z2-teal)'
            );
            
            s.z2_run = { active: false, depth: 0, hp: 100, maxHp: 100, loot: {} };
            save();
            render();
        }

        // ==========================================
        // MOTOR DE NAVEGACIÓN
        // ==========================================
        function nav(tab) {
            let reqP = 0;
            if (tab === 'map') reqP = 1;
            else if (tab === 'forge' && s.activeZone === 1) { 
                if (s.lvl < 2 && s.prestige === 0) return showLockMsg(2, true); 
            }
            else if (tab === 'dungeon' && s.activeZone === 1) { 
                if (s.lvl < 3 && s.prestige === 0) return showLockMsg(3, true); 
            }
            else if (tab === 'lab' && s.activeZone === 1) { 
                if (s.lvl < 4 && s.prestige === 0) return showLockMsg(4, true); 
            }
            
            if (tab === 'map' && s.prestige < reqP) return showLockMsg(reqP);

            sfx.click();
            s.currentTab = tab;
            save();
            render();
        }

        function setSubTab(st) {
            sfx.click();
            s.subTabs[s.currentTab] = st;
            save();
            render();

                                <button onclick="sfx.error(); if(confirm('¿ESTÁS SEGURO DE BORRAR TODO EL PROGRESO DEFINITIVAMENTE? ESTA ACCIÓN NO SE PUEDE DESHACER.')){ localStorage.removeItem(DB_KEY); location.reload(); }" class="w-full bg-red-900/40 hover:bg-red-600/60 py-4 rounded-xl text-xs border border-[var(--sys-red)] text-[var(--sys-red)] font-bold uppercase transition-colors mt-3 shadow-[0_0_15px_rgba(248,113,113,0.4)] tracking-widest">⚠️ HARD RESET TOTAL ⚠️</button>
                            </div>
                        </div>
                    </div>`;
                }
            }
            
            // Asignación final al DOM
            mc.innerHTML = h;
        }

        // ==========================================
        // ARRANQUE DEL SISTEMA
        // ==========================================
        render(); 
        
    </script>
</body>
