<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GamiQuest: Epic Learning</title>
    <style>
        :root {
            --bg-dark: #121212; --panel-bg: #1e1e1e; --text-light: #e0e0e0;
            --hp-red: #ff3333; --en-yellow: #ffcc00; --xp-blue: #3399ff;
            --gold: #ffd700; --accent: #8a2be2; --correct: #00cc66;
        }
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #app { width: 100%; max-width: 450px; height: 100%; background: var(--panel-bg); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-left: 2px solid #333; border-right: 2px solid #333; }
        
        /* HUD Superior */
        #hud { display: flex; flex-direction: column; padding: 10px; background: #000; border-bottom: 2px solid #333; z-index: 20;}
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; font-weight: bold;}
        .bar-container { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 2px; overflow: hidden;}
        .bar-fill { height: 100%; transition: width 0.3s ease; }
        #hp-bar { background: var(--hp-red); }
        #en-bar { background: var(--en-yellow); }
        #xp-bar { background: var(--xp-blue); }

        /* Vistas */
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 80px; }
        .view.active { display: block; }
        
        h1, h2, h3 { color: var(--accent); margin-bottom: 15px; text-shadow: 0 0 5px var(--accent); text-align: center; }
        p { line-height: 1.6; margin-bottom: 15px; }

        /* Mapa RPG */
        #map-container { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 30px 0; position: relative;}
        .node { width: 80px; height: 80px; border-radius: 10px; border: 3px solid #555; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; position: relative; z-index: 2; transform: rotate(45deg); }
        .node-content { transform: rotate(-45deg); text-align: center; }
        .node:active { transform: rotate(45deg) scale(0.9); }
        .node.completed { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 15px var(--gold); }
        .node.unlocked { border-color: var(--correct); background: rgba(0, 204, 102, 0.1); box-shadow: 0 0 15px var(--correct); animation: pulse 2s infinite;}
        .node.boss { border-color: var(--hp-red); background: rgba(255, 51, 51, 0.1); box-shadow: 0 0 20px var(--hp-red); }
        .node-icon { font-size: 24px; }
        .node-name { font-size: 10px; margin-top: 5px; font-weight: bold; }
        
        /* Botones y Opciones */
        .btn { width: 100%; padding: 15px; background: #333; color: white; border: 2px solid #555; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 10px; font-weight: bold; transition: 0.2s; text-transform: uppercase;}
        .btn:hover { background: #444; border-color: var(--accent); }
        .btn-action { background: var(--accent); border-color: #5a189a; }
        .btn-action:hover { background: #9d4edd; box-shadow: 0 0 10px var(--accent); }
        .option { text-align: left; background: #2a2a2a; }
        .option.correct { background: var(--correct); border-color: #00994c; color: #000; }
        .option.wrong { background: var(--hp-red); border-color: #cc0000; color: #000; }

        /* Inventario y Lore */
        .item-card { background: #111; border: 1px solid var(--accent); padding: 10px; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .lore-entry { border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 20px; font-style: italic; color: #ccc; background: rgba(255,215,0,0.05); padding: 10px;}

        /* Admin */
        textarea { width: 100%; height: 300px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-size: 12px; margin-bottom: 15px; resize: vertical; }

        /* Navbar */
        #navbar { position: absolute; bottom: 0; width: 100%; display: flex; background: #000; border-top: 2px solid #333; z-index: 20;}
        .nav-item { flex: 1; padding: 15px 0; text-align: center; cursor: pointer; font-size: 20px; transition: 0.2s; color: #666;}
        .nav-item.active { color: var(--accent); background: #111; border-top: 2px solid var(--accent); margin-top: -2px;}

        @keyframes pulse { 0% { box-shadow: 0 0 5px var(--correct); } 50% { box-shadow: 0 0 20px var(--correct); } 100% { box-shadow: 0 0 5px var(--correct); } }
        
        /* Efectos visuales de daño/cura */
        .damage-flash { animation: damageAnim 0.3s; }
        @keyframes damageAnim { 0% { background: var(--hp-red); } 100% { background: var(--panel-bg); } }
    </style>
</head>
<body>

<div id="app">
    <div id="hud">
        <div class="hud-row">
            <span>Nvl <span id="ui-lvl">1</span> | 🟡 <span id="ui-gold">0</span></span>
            <span>EXP <span id="ui-xp">0</span>/<span id="ui-max-xp">100</span></span>
        </div>
        <div class="bar-container"><div id="xp-bar" class="bar-fill" style="width: 0%;"></div></div>
        
        <div class="hud-row" style="margin-top: 8px;">
            <span>❤️ HP: <span id="ui-hp">100</span>/<span id="ui-max-hp">100</span></span>
            <span>⚡ EN: <span id="ui-en">50</span>/<span id="ui-max-en">50</span></span>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="bar-container"><div id="hp-bar" class="bar-fill" style="width: 100%;"></div></div>
            <div class="bar-container"><div id="en-bar" class="bar-fill" style="width: 100%;"></div></div>
        </div>
    </div>

    <div id="view-map" class="view active">
        <h2>Mapa del Reino</h2>
        <div id="map-container"></div>
    </div>

    <div id="view-node" class="view">
        <h2 id="node-title">Título</h2>
        <div id="node-content"></div>
        <div id="node-options" style="margin-top: 20px;"></div>
        <button id="btn-next" class="btn btn-action" style="display:none; margin-top: 20px;" onclick="closeNode()">Continuar Aventura</button>
    </div>

    <div id="view-profile" class="view">
        <h2>Códice y Botín</h2>
        <h3>📜 Fragmentos de Lore</h3>
        <div id="lore-container">Aún no has descubierto secretos del reino.</div>
        <h3 style="margin-top: 30px;">🎒 Inventario</h3>
        <div id="inventory-container">Tu mochila está vacía.</div>
    </div>

    <div id="view-admin" class="view">
        <h2>Forja del Creador</h2>
        <p>Aquí gestionas el universo. Pega tu JSON de campaña.</p>
        <textarea id="admin-json"></textarea>
        <button class="btn btn-action" onclick="loadCampaign()">Sobrescribir Mundo</button>
        <button class="btn" style="border-color: var(--hp-red); color: var(--hp-red);" onclick="hardReset()">Destruir Mundo (Reset Total)</button>
    </div>

    <div id="navbar">
        <div class="nav-item active" onclick="nav('map', this)">🗺️</div>
        <div class="nav-item" onclick="nav('profile', this)">📖</div>
        <div class="nav-item" onclick="nav('admin', this)">⚙️</div>
    </div>
</div>

<script>
    // --- ESTADO DEL JUEGO (Save Data) ---
    let player = {
        lvl: 1, xp: 0, maxXp: 100,
        hp: 100, maxHp: 100,
        en: 50, maxEn: 50,
        gold: 0,
        inventory: [], unlockedLore: [],
        completedNodes: [], unlockedNodes: ['n1']
    };

    // --- BASE DE DATOS DE LA CAMPAÑA ---
    let campaign = [];
    let currentNode = null;
    let selectedAns = null;

    // --- CORE ---
    function init() {
        const savedPlayer = localStorage.getItem('gq_player');
        const savedCampaign = localStorage.getItem('gq_campaign');
        
        if (savedPlayer) player = JSON.parse(savedPlayer);
        if (savedCampaign) campaign = JSON.parse(savedCampaign);
        
        updateHUD();
        renderMap();
        renderProfile();
    }

    function saveGame() {
        localStorage.setItem('gq_player', JSON.stringify(player));
        updateHUD();
    }

    // --- UI & NAV ---
    function nav(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if(viewId === 'map') renderMap();
        if(viewId === 'profile') renderProfile();
        if(viewId === 'admin') document.getElementById('admin-json').value = JSON.stringify(campaign, null, 2);
    }

    function updateHUD() {
        document.getElementById('ui-lvl').innerText = player.lvl;
        document.getElementById('ui-gold').innerText = player.gold;
        document.getElementById('ui-xp').innerText = player.xp;
        document.getElementById('ui-max-xp').innerText = player.maxXp;
        document.getElementById('xp-bar').style.width = (player.xp / player.maxXp * 100) + '%';

        document.getElementById('ui-hp').innerText = player.hp;
        document.getElementById('ui-max-hp').innerText = player.maxHp;
        document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';

        document.getElementById('ui-en').innerText = player.en;
        document.getElementById('ui-max-en').innerText = player.maxEn;
        document.getElementById('en-bar').style.width = (player.en / player.maxEn * 100) + '%';
    }

    // --- MAPA ---
    function renderMap() {
        const container = document.getElementById('map-container');
        if (campaign.length === 0) {
            container.innerHTML = '<p>El mundo está vacío. Ve a la Forja.</p>';
            return;
        }

        container.innerHTML = '';
        campaign.forEach((node, i) => {
            const isCompleted = player.completedNodes.includes(node.id);
            const isUnlocked = player.unlockedNodes.includes(node.id);
            
            let stateClass = '';
            let icon = '🔒';
            if (isCompleted) { stateClass = 'completed'; icon = node.type === 'boss' ? '👑' : '⭐'; }
            else if (isUnlocked) { stateClass = 'unlocked'; icon = node.type === 'reading' ? '📜' : (node.type === 'boss' ? '💀' : '⚔️'); }
            
            const isBoss = node.type === 'boss' ? 'boss' : '';
            const offset = i % 2 === 0 ? '-30px' : '30px';

            container.innerHTML += `
                <div class="node ${stateClass} ${isBoss}" style="transform: translateX(${offset}) rotate(45deg);" onclick="openNode('${node.id}')">
                    <div class="node-content">
                        <div class="node-icon">${icon}</div>
                        <div class="node-name">${node.title}</div>
                    </div>
                </div>
            `;
        });
    }

    // --- LÓGICA DE NODOS ---
    function openNode(nodeId) {
        if (!player.unlockedNodes.includes(nodeId) && !player.completedNodes.includes(nodeId)) {
            alert('Zona bloqueada. Supera la zona anterior.'); return;
        }

        currentNode = campaign.find(n => n.id === nodeId);
        const isCompleted = player.completedNodes.includes(nodeId);

        // Coste de entrada (solo si no está completado)
        if (!isCompleted && currentNode.energyCost > player.en) {
            alert(`Necesitas ${currentNode.energyCost}⚡ para entrar. Espera o usa pociones.`); return;
        }

        if (!isCompleted) {
            player.en -= currentNode.energyCost;
            saveGame();
        }

        // Preparar UI
        document.getElementById('view-map').classList.remove('active');
        document.getElementById('view-node').classList.add('active');
        document.getElementById('node-title').innerText = currentNode.title;
        document.getElementById('btn-next').style.display = 'none';
        
        const contentDiv = document.getElementById('node-content');
        const optionsDiv = document.getElementById('node-options');
        contentDiv.innerHTML = `<p>${currentNode.content}</p>`;
        optionsDiv.innerHTML = '';
        
        if(isCompleted) {
            contentDiv.innerHTML += `<p style="color:var(--correct);"><em>(Ya has superado esta zona)</em></p>`;
            document.getElementById('btn-next').style.display = 'block';
            return;
        }

        if (currentNode.type === 'reading') {
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('btn-next').innerText = "Comprender y Avanzar";
        } else if (currentNode.type === 'test' || currentNode.type === 'boss') {
            currentNode.options.forEach((opt, idx) => {
                optionsDiv.innerHTML += `<button class="btn option" onclick="checkAnswer(${idx}, this)">${opt}</button>`;
            });
        }
    }

    function checkAnswer(idx, btnElement) {
        if(selectedAns !== null) return; // Ya respondió
        selectedAns = idx;
        const isCorrect = idx === currentNode.correctAnswer;
        
        if (isCorrect) {
            btnElement.classList.add('correct');
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('btn-next').innerText = "Reclamar Botín";
        } else {
            btnElement.classList.add('wrong');
            player.hp -= currentNode.damagePenalization;
            document.getElementById('view-node').classList.add('damage-flash');
            setTimeout(() => document.getElementById('view-node').classList.remove('damage-flash'), 300);
            
            if(player.hp <= 0) {
                player.hp = 0; saveGame();
                alert('¡Has caído en batalla! Regresando a la posada para recuperarte...');
                player.hp = player.maxHp; player.en = player.maxEn; saveGame();
                closeNode(true); // Forzar cierre sin recompensa
                return;
            }
            saveGame();
            
            // Reintentar si sobrevive
            setTimeout(() => {
                selectedAns = null;
                btnElement.classList.remove('wrong');
            }, 1500);
        }
    }

    function closeNode(failed = false) {
        if (!failed && !player.completedNodes.includes(currentNode.id)) {
            // Dar Recompensas
            player.completedNodes.push(currentNode.id);
            gainXP(currentNode.rewardXp);
            player.gold += currentNode.rewardGold;
            
            // Lore Drop
            if (currentNode.loreDrop && !player.unlockedLore.includes(currentNode.loreDrop)) {
                player.unlockedLore.push(currentNode.loreDrop);
                alert('📜 ¡Has descubierto un nuevo fragmento de historia!');
            }

            // Item Drop
            if (currentNode.itemDrop && !player.inventory.includes(currentNode.itemDrop)) {
                player.inventory.push(currentNode.itemDrop);
                alert(`🎒 ¡Has encontrado: ${currentNode.itemDrop}!`);
            }

            // Desbloquear siguientes
            if (currentNode.unlocks) {
                currentNode.unlocks.forEach(id => {
                    if (!player.unlockedNodes.includes(id)) player.unlockedNodes.push(id);
                });
            }
            saveGame();
        }

        currentNode = null;
        selectedAns = null;
        document.getElementById('view-node').classList.remove('active');
        document.getElementById('view-map').classList.add('active');
        renderMap();
    }

    // --- SISTEMA RPG ---
    function gainXP(amount) {
        player.xp += amount;
        if (player.xp >= player.maxXp) {
            player.lvl++;
            player.xp -= player.maxXp;
            player.maxXp = Math.floor(player.maxXp * 1.5); // Escala de XP
            player.maxHp += 20; player.hp = player.maxHp;
            player.maxEn += 10; player.en = player.maxEn;
            alert(`🎉 ¡SUBES AL NIVEL ${player.lvl}! Estadísticas restauradas y aumentadas.`);
        }
    }

    function renderProfile() {
        const loreDiv = document.getElementById('lore-container');
        const invDiv = document.getElementById('inventory-container');
        
        loreDiv.innerHTML = player.unlockedLore.length ? '' : 'Aún no has descubierto secretos del reino.';
        player.unlockedLore.forEach(lore => {
            loreDiv.innerHTML += `<div class="lore-entry">${lore}</div>`;
        });

        invDiv.innerHTML = player.inventory.length ? '' : 'Tu mochila está vacía.';
        player.inventory.forEach(item => {
            invDiv.innerHTML += `<div class="item-card">🎁 <span>${item}</span></div>`;
        });
    }

    // --- ADMIN ---
    function loadCampaign() {
        try {
            const raw = document.getElementById('admin-json').value;
            campaign = JSON.parse(raw);
            localStorage.setItem('gq_campaign', raw);
            alert('¡Mundo forjado con éxito!');
        } catch (e) { alert('Error en el JSON. Revisa el código.'); }
    }

    function hardReset() {
        if(confirm('Esto borrará tu progreso y la campaña actual. ¿Seguro?')) {
            localStorage.clear(); location.reload();
        }
    }

    // Iniciar
    init();
</script>
</body>
</html>
