    <script>
        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        document.body.addEventListener('click', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});

        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        
        const sfx = {

            hit: () => playTone(200, 'square', 0.15, 0.1),

        function rollShop() {
            let available = SHOP_POOL.filter(x => x.reqLvl <= s.lvl);

            let shuffled = available.sort(() => 0.5 - Math.random());

            let dIndex = Math.floor(Math.random() * selected.length);
            let dType = DISCOUNT_TIERS[Math.floor(Math.random() * DISCOUNT_TIERS.length)];
            selected[dIndex].discT = dType.t; selected[dIndex].discP = dType.p;
            s.dailyShopIds = selected;
        }

        function rollHerrero() {
            s.herreroItems = [];
            let discIndex = Math.floor(Math.random() * 4);
            let dType = DISCOUNT_TIERS[Math.floor(Math.random() * DISCOUNT_TIERS.length)];
            for(let i=0; i<4; i++) {
                let r = Math.random()*100; let t = 1;
                if(r<20) t=1; else if(r<40) t=2; else if(r<57) t=3; else if(r<74) t=4; else if(r<84) t=5; else if(r<89) t=6; else if(r<94) t=7; else if(r<97) t=8; else if(r<99) t=9; else t=10;
                let pool = ALL_WEAPONS.filter(w=>w.reqTier === t);
                let w = pool[Math.floor(Math.random()*pool.length)];
                let bPrices = [0, 5000, 10000, 20000, 40000, 80000, 150000, 300000, 500000, 750000, 1000000];
                let disc = (i === discIndex) ? dType : {t: null, p: 0};
                s.herreroItems.push({ w: w, basePrice: bPrices[t], disc: disc });
            }
        }

        function rollTrades() {
            s.dailyTrades = [];
            for(let i=0; i<4; i++) {
                let isSTier = Math.random() < 0.15; 
                let giveM = ALL_MATS[Math.floor(Math.random()*10)][0]; 
                let getM = ALL_MATS[Math.floor(Math.random() * (s.prestige >= 2 ? 68 : 52))][0];
                let giveQ = isSTier ? 50 + Math.floor(Math.random()*50) : 5 + Math.floor(Math.random()*15);
                let getQ = isSTier ? 1 : 2 + Math.floor(Math.random()*3);
                if(isSTier) getM = ALL_MATS[Math.floor(Math.random()*16 + 52)][0] || 'm68'; 
                s.dailyTrades.push({ giveM, giveQ, getM, getQ, isSTier });
            }
        }

        function rollQuests() {
            s.sideQuests = [];

        }

        function hookQuest(type) {
            if(!s.sideQuests || s.prestige < 3) return;
            let changed = false;
            s.sideQuests.forEach(q => {
                if(q.type === type && q.progress < q.req) {
                    q.progress++; changed = true;
                    if(q.progress >= q.req) { q.done = true; sfx.gachaWin(); toast('Misión Secundaria Lista', 'var(--gold)'); }
                }
            });
            if(changed) save();
        }

        if(s.dailyShopIds.length === 0) rollShop();
        if(s.herreroItems.length === 0 && s.prestige >= 2) rollHerrero();
        if(s.dailyTrades.length === 0 && s.prestige >= 2) rollTrades();
        if(s.sideQuests.length === 0 && s.prestige >= 3) rollQuests();

        setInterval(() => {
            let nowVirtual = Date.now() + s.timeOffset;

            let tb = document.getElementById('hud-time-bar'); if(tb) tb.style.width = `${(msSinceMidnight / 86400000) * 100}%`;

            let rem = 86400000 - msSinceMidnight;
            let h = Math.floor(rem/3600000).toString().padStart(2, '0');
            let m = Math.floor((rem%3600000)/60000).toString().padStart(2, '0');
            let sec = Math.floor((rem%60000)/1000).toString().padStart(2, '0');
            let tStr = `${h}:${m}:${sec}`;
            
            ['sys-countdown', 'shop-countdown', 'herrero-countdown', 'trade-countdown'].forEach(id => {
                let el = document.getElementById(id); if(el) el.innerText = tStr;
            });

            let cvHour = Math.floor(nowVirtual / 3600000);
            if (cvHour - s.lastManaHour > 0) {
                if(s.mana < MAX_MANA()) s.mana = Math.min(MAX_MANA(), s.mana + (cvHour - s.lastManaHour));
                s.lastManaHour = cvHour; save();
            }

            let mTimer = document.getElementById('mana-regen-timer');
            if(mTimer) mTimer.innerText = s.mana < MAX_MANA() ? `(+1 en ${(59 - virtualTime.getMinutes()).toString().padStart(2,'0')}:${(59 - virtualTime.getSeconds()).toString().padStart(2,'0')})` : `(MAX)`;

            if(s.activeCrafts) {
                let domChanged = false;
                for(let k in s.activeCrafts) {
                    if(s.activeCrafts[k].time > 0) {
                        s.activeCrafts[k].time--; domChanged = true;
                        let el = document.getElementById(`craft-btn-${k}`);
                        if(el) el.innerHTML = `⏳ ${s.activeCrafts[k].time}s<br><span style="font-size:7px">${s.activeCrafts[k].ex}</span>`;
                    } else if (s.activeCrafts[k].time === 0 && !s.activeCrafts[k].ready) {
                        s.activeCrafts[k].ready = true; domChanged = true; sfx.success();
                        if(s.currentTab === 'lab') render(); 
                    }
                }
                if(domChanged) save();
            }

            const strDate = virtualTime.toLocaleDateString();

                s.dailies.forEach(d => d.done = false); s.labCraftsToday = 0;
                rollShop(); rollHerrero(); rollTrades(); rollQuests(); s.lastDate = strDate; save();

        }, 1000);

        function toast(msg, color="var(--sys-blue)") { 
            const t = document.getElementById('toast'); if(!t) return;

        function getTierColor(tierNum) {
            if(tierNum <= 5) return 'var(--sys-blue)';
            if(tierNum <= 9) return 'var(--sys-purple)';
            return 'var(--gold)';

        function getZ2Multiplier(type) {
            let mult = 0;
            s.z2_sockets.forEach(sk => { if(sk && sk.type === type) mult += sk.val; });
            return mult;
        }

        function getEquipStats() {
            let w1 = s.weapons.find(x => x.id === s.activeWeps[0]); let w2 = s.weapons.find(x => x.id === s.activeWeps[1]);
            let atk = (w1?w1.atk:0) + (w2?w2.atk:0); let md = 0;
            SLOTS.forEach(sl => { let a = s.armors.find(x => x.id === s.activeArmors[sl.id]); if(a) md += a.manaDiscount; });
            
            // Z2 Modifiers applied on top
            atk += (atk * (getZ2Multiplier('atk') / 100));
            md += getZ2Multiplier('mana');
            return { atk: Math.floor(atk), manaDiscount: Math.min(80, md) }; // Max 80% discount cap
        }

        function gain(type, amount) {
            let pMult = (s.prestige + 1);
            if(type === 'exp') {
                s.exp += amount * pMult * (s.potions.expB||1); s.potions.expB = 1.0; 
                let reqExp = getReqExp(s.lvl);
                while(s.exp >= reqExp && s.lvl < 10) { 
                    s.exp -= reqExp; s.lvl++; s.atk += 10; s.mana = MAX_MANA(); 
                    sfx.levelUp(); showModal("✨ TIER AUMENTADO", `TIER ${TIERS[s.lvl]} ALCANZADO`, "var(--sys-blue)"); 
                    reqExp = getReqExp(s.lvl); render(); 
                }
                if(s.lvl >= 10) { s.lvl = 10; s.exp = getReqExp(9); }
                toast(`+${Math.floor(amount)} EXP`, "var(--sys-purple)");
            }
            if(type === 'gold') { s.gold += amount * pMult * (s.potions.goldB||1); s.potions.goldB = 1.0; toast(`+${Math.floor(amount)} G`, "var(--gold)"); }
            if(type === 'dia') { s.diamonds += amount * pMult * (s.potions.diaB||1); s.potions.diaB = 1.0; toast(`+${amount} 💎`, "var(--dia)"); }
            save();
        }

                s.potionInv[pName]--; s.potions.goldB = val; toast('Efecto Oro Activado', 'var(--exotic)');
            } else if (type === 'dia') {
                if(s.potions.diaB > 1.0) { if(!confirm('Ya tienes un efecto de Diamante. ¿Reemplazar?')) return; }

        function z2_step() {
            sfx.click();
            if(s.mana < 2) return toast('Falta Maná', 'var(--sys-red)');
            s.mana -= 2; s.z2_run.depth += 1;
            
            let r = Math.random();
            if(r < 0.4) {
                let dmg = Math.floor(Math.random() * 20) + (s.z2_run.depth * 5);
                let eq = getEquipStats();
                dmg = Math.max(1, dmg - Math.floor(eq.atk / 100)); // Armadura en Z2 se basa en ATK/100
                s.z2_run.hp -= dmg;
                toast(`¡Gólem! -${dmg} HP`, 'var(--sys-red)'); sfx.hit();
            } else if(r < 0.8) {
                let g = 1000 * s.z2_run.depth * (1 + getZ2Multiplier('gold')/100);
                s.z2_run.loot.gold = (s.z2_run.loot.gold || 0) + g;
                s.z2_run.loot.dust = (s.z2_run.loot.dust || 0) + s.z2_run.depth;
                toast('Vena de Cristal Hallada', 'var(--z2-teal)'); sfx.success();
            } else {
                toast('Cueva Vacía...', 'gray');
            }

            if(s.z2_run.hp <= 0) {
                sfx.error(); showModal('☠️ COLAPSO', 'El Gólem Prismático te ha aplastado. Pierdes todo el botín de esta expedición.', 'var(--sys-red)');

            }
            save(); render();
        }

            s.z2_run = { active: false, depth: 0, hp: 100, maxHp: 100, loot: {} };
            save(); render();
        }

                                <button onclick="sfx.click(); s.prestige=Math.max(4, s.prestige); s.lvl=10; save(); render(); toast('Zona 2 Desbloqueada', 'var(--z2-cyan)');" class="w-full bg-[var(--z2-cyan)]/10 hover:bg-[var(--z2-cyan)]/30 py-3 rounded-lg text-[10px] border border-[var(--z2-cyan)]/50 text-[var(--z2-cyan)] font-bold uppercase transition-colors shadow-sm tracking-widest">Desbloquear Zona 2 (P4)</button>
                                <button onclick="sfx.click(); gain('exp', 50000);" class="w-full bg-purple-900/30 hover:bg-purple-900/50 py-3 rounded-lg text-[10px] border border-purple-500/40 text-purple-300 font-bold uppercase transition-colors shadow-sm tracking-widest">+50,000 EXP</button>
                                <button onclick="sfx.click(); s.z2_dust+=500; s.z2_cores+=5; ALL_MATS.forEach(m => s.mats[m[0]]=99); save(); render(); toast('Materiales Max', 'var(--z2-cyan)');" class="w-full bg-green-900/30 hover:bg-green-900/50 py-3 rounded-lg text-[10px] border border-green-500/40 text-green-300 font-bold uppercase transition-colors shadow-sm tracking-widest">Materiales Z1+Z2 Max</button>
                                <button onclick="sfx.error(); if(confirm('¿BORRAR TODO EL PROGRESO DEFINITIVAMENTE?')){ localStorage.removeItem(DB_KEY); location.reload(); }" class="w-full bg-red-900/40 hover:bg-red-600/60 py-3 rounded-lg text-[10px] border border-[var(--sys-red)] text-[var(--sys-red)] font-bold uppercase transition-colors mt-2 shadow-[0_0_10px_rgba(248,113,113,0.3)] tracking-widest">⚠️ HARD RESET ⚠️</button>
                            </div>
                        </div>
                    </div>`;
                }
            }
            mc.innerHTML = h;
        }

        // --- ARRANQUE ---
        render(); 
        
        // Finalizamos Script
    </script>
