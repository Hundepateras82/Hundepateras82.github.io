    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        document.body.addEventListener('click', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        
        const sfx = {
            click: () => playTone(600, 'sine', 0.1, 0.05),
            hit: () => playTone(200, 'square', 0.15, 0.1),

            locked: () => { playTone(150, 'square', 0.1, 0.1); setTimeout(()=>playTone(100, 'square', 0.15, 0.1), 100); },
            success: () => { playTone(400, 'sine', 0.1, 0.05); setTimeout(()=>playTone(600, 'sine', 0.2, 0.05), 100); },

                    h += `<div class="${pnlClass} p-8 text-center border-[${colLocal}]/30 relative overflow-hidden shadow-xl"><div class="absolute inset-0 bg-[${colLocal}]/5 blur-3xl z-0"></div><span class="text-6xl block mb-5 relative z-10 animate-pulse drop-shadow-[0_0_15px_${colLocal}]">🔮</span><h3 class="font-sys text-[${colLocal}] text-2xl font-bold uppercase tracking-widest mb-3 relative z-10">Invocación Astral</h3><p class="text-[10px] text-gray-400 uppercase tracking-widest mb-8 border-b border-gray-800 pb-4 relative z-10">Invoca equipamiento de los antiguos reyes caídos.</p><div class="flex gap-3 mb-8 relative z-10"><button onclick="pullGacha('${isW?'W':'A'}', 1)" class="w-1/2 py-5 rounded-xl border-2 border-[${colLocal}]/50 bg-black/80 hover:bg-[${colLocal}]/20 text-[${colLocal}] font-bold font-sys uppercase tracking-widest text-[11px] shadow-[0_0_15px_rgba(0,0,0,0.5)] transition-all active:scale-95">1 TIRADA<br><span class="text-[8px] text-gray-400 font-sans tracking-widest mt-1 block">(160 💎)</span></button><button onclick="pullGacha('${isW?'W':'A'}', 10)" class="w-1/2 py-5 rounded-xl border-2 border-[var(--gold)]/50 bg-black/80 hover:bg-[var(--gold)]/20 text-[var(--gold)] font-bold font-sys uppercase tracking-widest text-[11px] shadow-[0_0_15px_rgba(252,211,77,0.2)] transition-all active:scale-95">10 TIRADAS<br><span class="text-[8px] text-gray-400 font-sans tracking-widest mt-1 block">(1600 💎)</span></button></div><div class="text-[9px] text-[var(--lavender)] bg-black/60 border border-[${colLocal}]/20 rounded-xl p-4 text-left grid grid-cols-2 gap-2 relative z-10 shadow-inner"><span class="col-span-2 text-center mb-2 text-[${colLocal}] font-bold uppercase tracking-widest border-b border-gray-800 pb-2">Tabla de Probabilidades</span><span class="text-gray-400">Tier I: <span class="text-white">20%</span></span> <span class="text-[var(--sys-blue)]">Tier D: <span class="text-white">5%</span></span><span class="text-gray-400">Tier H: <span class="text-white">20%</span></span> <span class="text-[var(--sys-blue)]">Tier C: <span class="text-white">5%</span></span><span class="text-gray-400">Tier G: <span class="text-white">17%</span></span> <span class="text-[var(--sys-purple)]">Tier B: <span class="text-white">3%</span></span><span class="text-gray-400">Tier F: <span class="text-white">17%</span></span> <span class="text-[var(--sys-purple)]">Tier A: <span class="text-white">2%</span></span><span class="text-[var(--sys-blue)]">Tier E: <span class="text-white">10%</span></span> <span class="text-[var(--gold)] font-bold bg-[var(--gold)]/10 px-1 rounded inline-block text-center">Tier S: 1%</span></div></div>`;
                } else if (st === 'admin') {
                    h += `<div class="${pnlClass} p-6 mb-4 text-center"><p class="text-[10px] text-gray-500 uppercase tracking-widest mb-4">Herramientas de Desarrollador</p><div class="border-2 border-red-900/50 bg-black/90 rounded-xl p-5 shadow-2xl relative overflow-hidden"><div class="absolute inset-0 bg-[var(--sys-red)]/5 blur-xl"></div><p class="text-[11px] font-sys text-red-500 mb-5 text-center tracking-widest drop-shadow-md border-b border-red-900/50 pb-2 relative z-10">ADMIN ACCESS V2 ALPHA</p><div class="flex flex-col gap-3 relative z-10"><button onclick="sfx.click(); s.prestige=Math.max(4, s.prestige); s.lvl=10; save(); render(); toast('Zona 2 Desbloqueada', 'var(--z2-cyan)');" class="w-full bg-[var(--z2-cyan)]/10 hover:bg-[var(--z2-cyan)]/30 py-3 rounded-lg text-[10px] border border-[var(--z2-cyan)]/50 text-[var(--z2-cyan)] font-bold uppercase transition-colors shadow-sm tracking-widest">Desbloquear Zona 2 (P4)</button><button onclick="sfx.click(); gain('exp', 50000);" class="w-full bg-purple-900/30 hover:bg-purple-900/50 py-3 rounded-lg text-[10px] border border-purple-500/40 text-purple-300 font-bold uppercase transition-colors shadow-sm tracking-widest">+50,000 EXP</button><button onclick="sfx.click(); s.z2_dust+=500; s.z2_cores+=5; ALL_MATS.forEach(m => s.mats[m[0]]=99); save(); render(); toast('Materiales Max', 'var(--z2-cyan)');" class="w-full bg-green-900/30 hover:bg-green-900/50 py-3 rounded-lg text-[10px] border border-green-500/40 text-green-300 font-bold uppercase transition-colors shadow-sm tracking-widest">Materiales Z1+Z2 Max</button><button onclick="sfx.error(); if(confirm('¿BORRAR TODO EL PROGRESO DEFINITIVAMENTE?')){ localStorage.removeItem(DB_KEY); location.reload(); }" class="w-full bg-red-900/40 hover:bg-red-600/60 py-3 rounded-lg text-[10px] border border-[var(--sys-red)] text-[var(--sys-red)] font-bold uppercase transition-colors mt-2 shadow-[0_0_10px_rgba(248,113,113,0.3)] tracking-widest">⚠️ HARD RESET ⚠️</button></div></div></div>`;
                }
            }
            mc.innerHTML = h;
        }

        render(); 
        
    </script>
</body>
