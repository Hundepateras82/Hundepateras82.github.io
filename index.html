<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg-base: #0c0c12; 
            --sys-blue: #60a5fa;   
            --sys-red: #f87171;    
            --sys-purple: #c084fc; 
            --gold: #fcd34d;       
            --dia: #2dd4bf;        
            --exotic: #facc15; 
            --divine: #38bdf8; 
            --border-glass: rgba(255,255,255,0.12);
        }
        body { 
            background: var(--bg-base); color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            padding-top: calc(env(safe-area-inset-top) + 5px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
        }
        .font-sys { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: linear-gradient(145deg, rgba(18,18,24,0.9) 0%, rgba(12,12,18,0.95) 100%);
            border: 1px solid var(--border-glass); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); border-radius: 16px;
        }
        .btn-aaa {
            background: linear-gradient(90deg, rgba(96,165,250,0.1), rgba(192,132,252,0.1));
            border: 1px solid var(--border-glass); color: var(--sys-blue); transition: all 0.2s;
        }
        .btn-aaa:active { transform: scale(0.97); }
        .progress-bar { transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .story-claimable { border: 1px solid #fff700 !important; box-shadow: 0 0 12px rgba(255, 247, 0, 0.5); cursor: pointer; animation: pulseGlow 2s infinite; }
        .quest-claimable { background-color: rgba(252, 211, 77, 0.2) !important; border-color: var(--gold) !important; color: var(--gold) !important; animation: pulseGlow 2s infinite; cursor: pointer; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        .editable-objective { border-bottom: 1px dashed var(--sys-blue); background: rgba(59,130,246,0.05); transition: 0.2s; padding: 6px; border-radius: 4px 4px 0 0; }
        .editable-objective:focus { background: rgba(59,130,246,0.15); outline: none; border-bottom-style: solid; }

        .chart-svg { width: 100%; height: 100%; stroke: var(--sys-blue); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        
        .art-icon { display: inline-flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.5)); border: 1px solid rgba(255,255,255,0.2); font-size: 24px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

    <script>
        // --- AUDIO PROCEDURAL ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioUnlocked = false;
        document.body.addEventListener('touchstart', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});
        document.body.addEventListener('click', () => { if(!audioUnlocked && audioCtx.state === 'suspended') { audioCtx.resume(); audioUnlocked = true; } }, {once:true});

        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        
        const sfx = {

        const STORY_TITLES = ["El Exilio", "Impuestos de Sangre", "Alianza Subterránea", "Cazadores Reales", "El Pacto Abisal", "Sangre y Barro", "Ecos Antiguos", "El Asedio", "La Guardia Caída", "Sangre de mi Sangre"];
        const STORY_TEXT = ["Tu hermano, el Rey Aric, consumió la magia del reino para volverse aparentemente inmortal. Cuando intentaste advertir al consejo de nobles sobre su locura tiránica, te silenció. Te arrebató tus títulos, quemó tu blasón familiar frente a todo el castillo y te exilió a los páramos oscuros, un lugar donde la muerte es la única certeza. Ahora vagas entre las sombras, alimentándote de la escasa vida que aún resiste en este yermo de ceniza, mientras tu mente solo alberga una idea: sobrevivir para cobrar tu venganza contra la corona que una vez juraste defender.", "Sobreviviendo en los páramos, descubriste pronto la cruda y terrorífica verdad. El Rey Aric no utilizaba magia arcana convencional para mantener su juventud. Había instaurado los 'Impuestos de Sangre'. En secreto, sus guardias drenaban la fuerza vital de los campesinos y las aldeas periféricas para canalizarla hacia la Ciudadela de Obsidiana. El reino entero se marchitaba, los cultivos se secaban y los niños nacían enfermos, todo para que tu hermano pudiera brillar con una salud eterna e impía en su trono inmaculado.", "Tras semanas huyendo de los horrores de la superficie, la tierra cedió bajo tus pies y caíste en las antiguas catacumbas de Aethelgard. Lo que parecía tu tumba resultó ser tu salvación. Allí abajo, entre ruinas de un mundo olvidado, habitaban los marginados, los monstruos desertores y los exiliados. Tras demostrar tu fuerza aniquilando a un Gólem de Hierro con tus manos desnudas, te nombraron su campeón. Por primera vez desde tu destierro, tenías aliados y un propósito: derrocar a la tiranía.", "Tu supervivencia no pasó desapercibida. Aric se enteró de tu nueva alianza subterránea y envió a su élite personal: Los Perros de Sangre. Asesinos despiadados imbuidos con magia roja. Durante semanas, la oscuridad de las catacumbas se llenó de emboscadas, veneno y hojas ocultas. Las peleas fueron brutales y estuviste a punto de morir docenas de veces. Pero con cada asesino que caía bajo tu filo, absorbías parte de su equipo y su maná residual, volviéndote exponencialmente más letal.", "Fue interrogando a uno de los Perros de Sangre agonizantes cuando la pieza final del rompecabezas encajó. El asesino, con sus últimos alientos y vomitando icor negro, confesó el origen del poder de Aric. No fue un hechizo, fue un trato directo con los Señores del Abismo Profundo. Tu hermano había vendido no solo su alma, sino el destino de todo el reino a entidades primigenias de puro caos. Ya no era un Rey, era un recipiente humano para la oscuridad más absoluta.", "El encuentro fue inevitable. En un intento desesperado por cortar una línea de suministros mágicos, fuiste emboscado por el mismísimo Aric. La batalla destrozó la montaña. La fuerza de tu hermano era antinatural; sus golpes rompían la barrera del sonido y su magia derretía la roca. En un último choque, su espada mágica perforó tu pecho, dejándote una espantosa cicatriz en el esternón. Sobreviviste de milagro al caer por un risco, pero esa herida ahora quema intensamente cada vez que canalizas tu maná.", "Arrastrándote, ensangrentado y al borde de la muerte, encontraste lo que los mitos llamaban la Forja Primigenia, el lugar donde los Primeros Reyes crearon las armas del mundo. Allí, soportando el dolor agónico de tu cicatriz y el calor infernal de la forja magmática, fundiste tus armas destrozadas y tu propia sangre para crear equipo de leyenda. Cuando saliste de esa cámara ardiente, el poder que irradiabas hacía temblar las paredes. Ya estabas listo para rivalizar con la monstruosidad de tu hermano.", "La noticia de tu supervivencia y tu nuevo poder se extendió como un incendio forestal. Los estandartes rotos de las casas nobles traicionadas se alzaron en la noche, uniéndose a las bestias y exiliados de las catacumbas. El ejército más extraño jamás visto en Aethelgard comenzó a marchar. El suelo temblaba con los pasos de tu rebelión. A lo lejos, la gigantesca e intimidante silueta de la Ciudadela de Obsidiana recortaba la luz de la luna. No habría negociaciones. Solo habría sangre.", "Las inmensas puertas de la capital fueron derribadas en cuestión de horas. Avanzaste por los pasillos de mármol que una vez llamaste hogar. Ahora, los tapices estaban rasgados, los muros supuraban magia negra y el hedor a muerte lo impregnaba todo. Los guardias reales caían ante ti como trigo ante la guadaña. Sin mirar atrás, abriste a patadas las gigantescas puertas de madera de roble negro de la Sala del Trono. Al fondo, sentado en la oscuridad y esperándote, estaba tu hermano.", "El choque final fue leyenda. La Ciudadela se desmoronaba alrededor vuestra mientras vuestras hojas colisionaban. Al final, usando un estallido de maná crudo que casi te desgarra por dentro, partiste su espada y lo arrodillaste. Aric cayó a tus pies, tosiendo ceniza negra. Mientras expiraba, la pesada corona de obsidiana rodó por el suelo hasta detenerse frente a ti. Al tocarla, sentiste que la corona no estaba fría... murmuraba tu nombre, ofreciéndote susurros de poder absoluto e inmortalidad. El reino era tuyo. Pero la pregunta permanecía: ¿Serías el salvador, o el próximo monstruo?"];
        
        const STORY_TITLES_2 = ["La Verdad Oculta", "El Parásito", "La Cura Falsa", "El Sacrificio de un Hermano", "Los Señores Mienten", "La Cicatriz Sello", "El Plan Maestro", "Prisionero de Obsidiana", "La Oración Silenciosa", "La Maldición de la Corona"];
        const STORY_TEXT_2 = ["Años después de sentarte en el trono, encontraste el diario oculto de Aric en las mazmorras secretas. La primera página te heló la sangre. 'La grieta se está abriendo', decía su letra temblorosa. La verdad te golpeó como un mazo: Aric no consumió la magia del reino por avaricia ni por sed de poder. Descubrió una falla dimensional bajo el castillo por la que horrores cósmicos iban a devorar el mundo entero. Para sellarla, tuvo que absorber todo el maná disponible, convirtiéndose en el pilar que mantenía la realidad intacta.", "El diario detallaba la naturaleza del 'Abismo'. No era simplemente una dimensión paralela o un infierno terrenal, era una entidad viva. Un parásito interdimensional masivo que se alimentaba de la estabilidad de las realidades. Una vez que enganchaba sus tentáculos metafísicos a un mundo, drenaba sus leyes físicas y su vida. Aric, al darse cuenta de esto, intentó desesperadamente buscar un remedio arcano, pero se dio cuenta de que la única forma de frenarlo era alimentarlo con un recipiente infinito de poder: él mismo.", "Los temidos 'Impuestos de Sangre' que diezmaron las aldeas no fueron una tiranía egoísta. Aric descubrió que la Plaga del Abismo ya había infectado a los campesinos sin que lo supieran. Estaban incubando horrores invisibles en sus almas. El Rey ordenó a los Perros de Sangre extraer ese maná corrupto para purificar a los ciudadanos, asumiendo él todo el peso del pecado y la mala fama, y almacenando toda esa bilis oscura en su propia sangre para evitar una pandemia apocalíptica.", "Aric escribió sobre la noche de tu exilio. Las páginas estaban manchadas de lágrimas secas. Sabía que el parásito acabaría por devorar su mente y que tarde o temprano perdería el control y aniquilaría el reino él mismo. Te exilió, te despojó de todo y te humilló públicamente no por odio, sino para apartarte del radar del Abismo. Te obligó a sobrevivir en las peores condiciones para que, a través de la furia y la supervivencia extrema, te convirtieras en la única hoja afilada capaz de matarle cuando llegara el momento.", "Los Señores del Abismo no hicieron un trato de poder con él; le ofrecieron una trampa que Aric tuvo que aceptar sabiendo que estaba amañada. Prometieron no invadir el reino si él se convertía en el recipiente de su corrupción. Él aceptó ganar tiempo, sabiendo que mentirían. Cada día que pasó en el trono fue un infierno psicológico, luchando internamente contra millones de voces alienígenas que intentaban doblegar su voluntad, comprando valiosos años para que tú en los páramos te hicieras fuerte.", "Aquel encuentro en los páramos donde te emboscó... El diario reveló su verdadera intención. Aric sintió que el Abismo intentaba poseerte a distancia al detectar tu creciente poder. Se vio obligado a intervenir personalmente. La espantosa herida y cicatriz que te dejó en el pecho no fue un intento de asesinato, fue un intrincado sello arcano pintado a espada. Esa quemadura que sientes al usar maná es el sello bloqueando la corrupción del Abismo, protegiendo tu mente de la locura que a él lo consumió.", "Su plan maestro fue meticuloso y suicida. Orquestó su propia caída, sembrando rumores sobre sus atrocidades, enviando a los Perros de Sangre para entrenarte mediante el combate letal, y dejando pistas para que encontraras la Forja Primigenia. Construyó su papel de villano definitivo para unir a todo un reino fracturado bajo una sola bandera: la tuya. Sabía que el mundo solo sobreviviría si se unificaba contra un mal común.", "En sus últimos meses, Aric relató cómo perdió el control de su cuerpo. Relataba estar atrapado detrás de sus propios ojos, viendo cómo sus manos firmaban órdenes crueles de las que no era dueño. Se había convertido en un prisionero dentro de la armadura de obsidiana, gritando en silencio, rezando todos los días para que su plan hubiera funcionado y que el 'Héroe de los Exiliados' irrumpiera por las puertas para acabar con su tormento.", "El último párrafo del diario estaba escrito a escasos minutos de tu asalto final a la Sala del Trono. La tinta estaba manchada y errática. 'Escucho los tambores de guerra. Es mi hermano. Lo ha conseguido. Dioses, ruego que su hoja sea firme y no vacile por amor. Ruego que me mate rápido antes de que la Cosa que habita en mí tome el control total'. Aric murió sabiendo que había salvado el mundo, sin esperar redención ni honor alguno.", "Cerraste el diario, temblando. Miraste la Corona de Obsidiana que ahora descansaba en tus sienes. El sacrificio de Aric fue monumental, pero la amenaza no había desaparecido. Al ponerte la corona, heredaste el sello. Las voces primigenias del Abismo comenzaron a susurrarte desde las sombras de la sala. El Rey está muerto, pero el parásito sigue hambriento, acechando bajo tus pies. Tu verdadero reinado no ha hecho más que empezar. La maldición de la corona ahora es tuya para soportarla."];

        function getEquipStats() {
            let w1 = s.weapons.find(x => x.id === s.activeWeps[0]);
            let w2 = s.weapons.find(x => x.id === s.activeWeps[1]);
            let atk = (w1?w1.atk:0) + (w2?w2.atk:0);

            let counts = {}; let md = 0;
            SLOTS.forEach(sl => {
                let a = s.armors.find(x => x.id === s.activeArmors[sl.id]);
                if(a) { md += a.manaDiscount; counts[a.setName] = (counts[a.setName]||0) + 1; }
            });
            for(let setName in counts) {
                if(counts[setName] === 4) {
                    let sample = s.armors.find(x => x.setName === setName);
                    if(sample) md += (sample.manaDiscount * 4); 
                }
            }
            return { atk, manaDiscount: md, setCounts: counts };
        }

                let reqExp = getReqExp(s.lvl);
                while(s.exp >= reqExp && s.lvl < 10) {

                    sfx.gachaLegendary(); showModal("✨ TIER AUMENTADO", `TIER ${TIERS[s.lvl]} ALCANZADO`, "var(--sys-blue)"); 
                    reqExp = getReqExp(s.lvl); render(); 
                }
                if(s.lvl >= 10) { s.lvl = 10; s.exp = getReqExp(9); }
                toast(`+${Math.floor(amount)} EXP`, "var(--sys-purple)");
            }
            if(type === 'gold') { s.gold += amount * pMult * (s.potions.goldB||1); s.potions.goldB = 1.0; toast(`+${Math.floor(amount)} G`, "var(--gold)"); }
            if(type === 'dia') { s.diamonds += amount * pMult * (s.potions.diaB||1); s.potions.diaB = 1.0; toast(`+${amount} Diamantes`, "var(--dia)"); }

        function generateLineChart(sportName) {
            let filtered = (s.races || []).filter(r => r.sp === sportName);
            if(filtered.length < 2) return `<div class="text-[10px] text-center opacity-50 py-10 uppercase tracking-widest text-[var(--sys-blue)] border border-dashed border-[var(--sys-blue)]/30 rounded-xl mt-4">Aparece a partir de 2 entrenamientos de ${sportName}</div>`;
            
            let max = Math.max(...filtered.map(r => r.val)); 
            let min = Math.min(...filtered.map(r => r.val)); 
            let range = (max - min) || 1;
            let w = 100; let h = 60; 
            let points = filtered.map((r, i) => { 
                let x = (i / (filtered.length - 1)) * w; 
                let y = h - ((r.val - min) / range * (h-10) + 5); 
                return `${x},${y}`; 
            }).join(' ');
            
            let sDate = new Date(filtered[0].date).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});
            let eDate = new Date(filtered[filtered.length-1].date).toLocaleDateString(undefined, {month:'numeric', day:'numeric'});

            return `
            <div class="relative w-full h-[120px] flex items-end mt-6 mb-6 border-l border-b border-[var(--sys-blue)]/50 pb-4 pl-8">
                <div class="absolute left-0 top-0 bottom-4 flex flex-col justify-between text-[8px] text-[var(--sys-blue)] font-sys"><span>${Math.ceil(max)}</span><span>${Math.floor(min)}</span></div>
                <svg viewBox="0 0 ${w} ${h}" class="chart-svg" preserveAspectRatio="none"><polyline points="${points}"/></svg>
                <div class="absolute bottom-[-16px] left-8 right-0 flex justify-between text-[8px] text-[var(--sys-blue)] font-sys"><span>${sDate}</span><span>${eDate}</span></div>
            </div>`;
        }

        function pullGacha(type, amount, isMaldita=false) {
            sfx.click();
            let cost = (isMaldita ? 800 : 160) * amount;
            if(s.diamonds < cost) { sfx.error(); return toast(`Faltan ${cost} 💎`, "var(--sys-red)"); }
            s.diamonds -= cost; hookQuest('gacha'); save(); updateHUD();
            
            let pool = type === 'W' ? ALL_WEAPONS : ALL_ARMORS;
            pendingGachaResults = [];

            for(let i=0; i<amount; i++) {
                let r = Math.random() * 100; let t = 1;
                if(!isMaldita) {
                    if(r < 20) t = 1; else if(r < 40) t = 2; else if(r < 57) t = 3; else if(r < 74) t = 4;
                    else if(r < 84) t = 5; else if(r < 89) t = 6; else if(r < 94) t = 7;
                    else if(r < 97) t = 8; else if(r < 99) t = 9; else t = 10;
                } else {
                    if(r < 40) t = 6; else if(r < 70) t = 7; else if(r < 85) t = 8; else if(r < 95) t = 9; else t = 10;
                }

                let valid = pool.filter(x => x.reqTier === t);
                if(valid.length === 0) valid = pool; 
                let item = Object.assign({}, valid[Math.floor(Math.random()*valid.length)]);
                item.id = `g_${Date.now()}_${i}`;
                item.ic = type === 'W' ? '⚔️' : (item.ic || '🛡️');
                if(type === 'W') s.weapons.push(item); else s.armors.push(item);
                pendingGachaResults.push(item);
            }
            save();
            let bestItem = pendingGachaResults.reduce((prev, current) => (prev.reqTier > current.reqTier) ? prev : current);
            playGachaRoulette(bestItem, type, amount > 1);
        }

            let grid = document.getElementById('gacha-results-grid'); let art = document.getElementById('gacha-art');
            
            btn.classList.add('hidden'); grid.classList.add('hidden'); grid.innerHTML = '';
            
            let itemsToFlash = type === 'W' ? ALL_WEAPONS : ALL_ARMORS;
            let duration = 2000; let interval = 60; let elapsed = 0;
            
            let timer = setInterval(() => {
                elapsed += interval;
                let rItem = itemsToFlash[Math.floor(Math.random() * itemsToFlash.length)];
                t.innerText = rItem.name; t.style.color = getTierColor(rItem.reqTier);
                art.innerText = type==='W'?'⚔️':(rItem.ic||'🛡️'); sfx.gachaSpin();
                
                if (elapsed >= duration) {
                    clearInterval(timer);
                    t.innerText = bestItem.name + `\n(Tier ${TIERS[bestItem.reqTier]})`;
                    t.style.color = getTierColor(bestItem.reqTier); t.style.textShadow = `0 0 20px ${getTierColor(bestItem.reqTier)}`;

                    if(bestItem.reqTier >= 8) sfx.gachaLegendary(); else sfx.gachaWin();

                    btn.onclick = () => {

                            art.classList.add('hidden'); grid.classList.remove('hidden'); btn.innerText = "CERRAR";
