<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue.Fit - Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-hover: #111111;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border: #222222;
            
            --common: #888888;
            --uncommon: #4caf50;
            --rare: #2196f3;
            --epic: #9c27b0;
            --legendary: #ff9800;

            --font: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }

        body {
            background-color: var(--bg); color: var(--text-main);
            padding-bottom: 100px; -webkit-font-smoothing: antialiased;
        }

        /* TYPOGRAPHY */
        h1, h2, h3 { font-weight: 300; letter-spacing: -0.5px; }
        .muted { color: var(--text-muted); }
        .text-sm { font-size: 0.85rem; }

        /* LAYOUT */
        header {
            padding: 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 50;
        }

        .brand { font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        
        nav {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 20px 0; z-index: 50;
        }

        nav button {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: color 0.3s;
        }
        nav button.active { color: var(--text-main); font-weight: 600; }

        .section { display: none; padding: 40px 24px; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* MAP & DAILY EVENT */
        .map-container {
            border: 1px solid var(--border); padding: 30px; margin-bottom: 40px;
            text-align: center; border-radius: 4px;
        }
        .paths-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;
        }
        .path-btn {
            background: var(--surface); border: 1px solid var(--border);
            padding: 30px 15px; cursor: pointer; transition: all 0.2s;
            color: var(--text-main); font-weight: 300; letter-spacing: 1px; text-transform: uppercase;
        }
        .path-btn:hover { background: var(--surface-hover); border-color: var(--text-muted); }
        .event-display {
            background: var(--surface); border-left: 2px solid var(--text-main);
            padding: 20px; margin-top: 20px; text-align: left;
        }
        .event-title { font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}

        /* CARDS & GRIDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .card {
            border: 1px solid var(--border); padding: 24px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card-header { margin-bottom: 16px; }
        .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
        .card-tags { display: flex; gap: 8px; margin-bottom: 12px; }
        .tag { font-size: 0.7rem; padding: 2px 6px; background: var(--border); border-radius: 2px; }
        .tag.immune { background: transparent; border: 1px solid var(--text-main); }
        
        /* RAID BTN */
        .raid-zone { margin: 40px 0; text-align: center; padding: 40px; border: 1px dashed var(--border); }
        .btn-raid {
            background: var(--text-main); color: var(--bg); border: none;
            padding: 15px 40px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: transform 0.2s;
        }
        .btn-raid:active { transform: scale(0.98); }
        .btn-raid:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

        /* EDITOR */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea, select {
            width: 100%; background: transparent; border: 1px solid var(--border);
            color: var(--text-main); padding: 12px; font-family: var(--font); outline: none;
        }
        input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--text-main); }
        
        .days-selector { display: flex; gap: 10px; flex-wrap: wrap; }
        .day-label {
            display: flex; align-items: center; gap: 5px; cursor: pointer;
            font-size: 0.85rem; padding: 5px 10px; border: 1px solid var(--border);
        }
        .day-label input { display: none; }
        .day-label.selected { background: var(--text-main); color: var(--bg); }

        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; }
        
        .btn {
            background: transparent; color: var(--text-main); border: 1px solid var(--border);
            padding: 10px 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
        }
        .btn:hover { background: var(--surface); }
        .btn-primary { border-color: var(--text-main); }

        .list-item {
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .list-item:hover { background: var(--surface); }

        .variant-box { border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
        
        /* UTILS */
        .color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">Rogue.Fit</div>
        <div class="text-sm">XP: <span id="header-xp">0</span> | <span id="header-date"></span></div>
    </header>

    <main>
        <!-- DASHBOARD -->
        <section id="tab-dash" class="section active">
            <div class="map-container" id="map-section">
                <h2 style="margin-bottom: 10px;">Ruta Diaria</h2>
                <p class="muted text-sm">Selecciona tu camino. Un evento alterará tu entrenamiento de hoy.</p>
                <div class="paths-grid" id="map-choices">
                    <button class="path-btn" onclick="selectPath(0)">Sendero A</button>
                    <button class="path-btn" onclick="selectPath(1)">Sendero B</button>
                </div>
                <div id="active-event" style="display: none;"></div>
            </div>

            <div class="raid-zone" id="raid-zone" style="display: none;">
                <h2 style="margin-bottom: 10px;">Ascensión</h2>
                <p class="muted text-sm" style="margin-bottom: 20px;">Sábado detectado. Evoluciona un movimiento de tu arsenal.</p>
                <button id="btn-raid" class="btn-raid" onclick="executeRaid()">Mejorar Ejercicio</button>
            </div>

            <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Entrenamiento de Hoy</h3>
            <div class="grid" id="today-grid"></div>
        </section>

        <!-- PROFILE -->
        <section id="tab-profile" class="section">
            <h2 style="margin-bottom: 30px;">Perfil</h2>
            <div style="display: flex; gap: 40px; margin-bottom: 40px;">
                <div>
                    <div class="muted text-sm">EXPERIENCIA</div>
                    <div style="font-size: 2.5rem; font-weight: 300;" id="stat-xp">0</div>
                </div>
                <div>
                    <div class="muted text-sm">SÁBADOS COMPLETADOS</div>
                    <div style="font-size: 2.5rem; font-weight: 300;" id="stat-saturdays">0</div>
                </div>
            </div>
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Registro</h3>
            <div id="history-log" class="text-sm"></div>
        </section>

        <!-- EDITOR -->
        <section id="tab-editor" class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Arsenal</h2>
                <button class="btn btn-primary" onclick="createExercise()">+ Nuevo</button>
            </div>
            
            <div id="editor-list"></div>

            <div id="editor-form" style="display: none; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
                <h3 style="margin-bottom: 20px;">Editando Ejercicio</h3>
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="edit-name" onchange="saveBasicInfo()">
                </div>

                <div class="form-group">
                    <label>Días Activos</label>
                    <div class="days-selector" id="edit-days">
                        <!-- Generado por JS -->
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="edit-immune" onchange="saveBasicInfo()">
                        Anular Castigos (Inmune a eventos negativos)
                    </label>
                </div>

                <div style="display: flex; justify-content: space-between; margin: 40px 0 20px;">
                    <label style="margin:0;">Fases de Evolución</label>
                    <button class="btn" onclick="addVariant()">+ Añadir Fase</button>
                </div>
                
                <div id="edit-variants"></div>
                
                <div style="margin-top: 40px; text-align: right;">
                    <button class="btn" style="color: #ff4444; border-color: #ff4444;" onclick="deleteExercise()">Eliminar Ejercicio</button>
                </div>
            </div>
        </section>
    </main>

    <nav>
        <button class="active" onclick="switchTab('dash', this)">Hoy</button>
        <button onclick="switchTab('profile', this)">Perfil</button>
        <button onclick="switchTab('editor', this)">Gestor</button>
    </nav>

    <script>
        const RARITIES = {
            common: { name: 'Común', hex: 'var(--common)', xp: 50 },
            uncommon: { name: 'Poco Común', hex: 'var(--uncommon)', xp: 100 },
            rare: { name: 'Raro', hex: 'var(--rare)', xp: 200 },
            epic: { name: 'Épico', hex: 'var(--epic)', xp: 400 },
            legendary: { name: 'Legendario', hex: 'var(--legendary)', xp: 1000 }
        };

        const DAYS = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

        const EVENTS_DB = [
            { type: 'buff', title: "Aceleración", desc: "Vas el doble de rápido en [X]." },
            { type: 'mixed', title: "Desequilibrio", desc: "Haz la mitad de reps en [X], pero el doble en [Y]." },
            { type: 'debuff', title: "Gravedad Aumentada", desc: "+50% de esfuerzo requerido en [X]." },
            { type: 'buff', title: "Furia Desatada", desc: "[X] no consume estamina hoy." },
            { type: 'debuff', title: "Amnesia Muscular", desc: "Debes ejecutar [X] con los ojos cerrados (o enfoque extremo)." },
            { type: 'neutral', title: "Intercambio Equivalente", desc: "Sustituye todo el volumen de [X] por [Y]." },
            { type: 'buff', title: "Bendición Ágil", desc: "-20% repeticiones requeridas en [X]." },
            { type: 'debuff', title: "Maldición Pesada", desc: "Obligatorio: Pausa isométrica de 3s en cada repetición de [X]." },
            { type: 'neutral', title: "Estado de Flujo", desc: "Combina [X] y [Y] en un superset sin descanso." },
            { type: 'buff', title: "Zona de Confort", desc: "Todas las penalizaciones anuladas hoy. Recuperación acelerada." }
        ];

        let state = {
            xp: 0,
            saturdaysCompleted: 0,
            lastRaidDate: null,
            lastMapDate: null,
            todayEventText: null,
            exercises: {
                "ex_1": {
                    name: "Dominadas", days: [1,3,5], immune: false,
                    levels: [
                        { name: "Asistidas", desc: "Banda elástica.", rarity: "common" },
                        { name: "Estrictas", desc: "Sin asistencia.", rarity: "rare" }
                    ]
                },
                "ex_2": {
                    name: "Flexiones Diamante", days: [1,2,4,5], immune: false,
                    levels: [
                        { name: "Rodillas", desc: "Apoyo en rodillas.", rarity: "common" },
                        { name: "Suelo", desc: "Tensión en tríceps.", rarity: "uncommon" }
                    ]
                },
                "ex_3": {
                    name: "Beat Saber (Recuperación)", days: [0,2,4,6], immune: true,
                    levels: [
                        { name: "Hard", desc: "Cardio ligero.", rarity: "common" },
                        { name: "Expert+", desc: "Cardio intenso.", rarity: "epic" }
                    ]
                }
            },
            progress: { "ex_1": 0, "ex_2": 0, "ex_3": 0 },
            history: []
        };

        let currentDayIdx = new Date().getDay();
        let currentDateStr = new Date().toDateString();

        function init() {
            const saved = localStorage.getItem('rogueFitMin');
            if (saved) state = JSON.parse(saved);
            
            document.getElementById('header-date').innerText = DAYS[currentDayIdx];
            
            updateUI();
            checkDailyMap();
            checkRaidAvailability();
        }

        function saveState() {
            localStorage.setItem('rogueFitMin', JSON.stringify(state));
            updateHeader();
        }

        // --- MAP & EVENTS ---
        function checkDailyMap() {
            const choices = document.getElementById('map-choices');
            const display = document.getElementById('active-event');
            
            if (state.lastMapDate === currentDateStr && state.todayEventText) {
                choices.style.display = 'none';
                display.style.display = 'block';
                display.innerHTML = state.todayEventText;
            } else {
                choices.style.display = 'grid';
                display.style.display = 'none';
            }
        }

        function getActiveExercises() {
            return Object.entries(state.exercises)
                .filter(([id, ex]) => ex.days.includes(currentDayIdx))
                .map(([id, ex]) => ({ id, ...ex }));
        }

        function getPenalizableExercises() {
            return getActiveExercises().filter(ex => !ex.immune);
        }

        function selectPath(pathIdx) {
            state.lastMapDate = currentDateStr;
            
            const eventTemplate = EVENTS_DB[Math.floor(Math.random() * EVENTS_DB.length)];
            const activeEx = getActiveExercises();
            const penEx = getPenalizableExercises();

            let finalDesc = eventTemplate.desc;
            let titleColor = "var(--text-main)";
            
            if (eventTemplate.type === 'buff') titleColor = "var(--uncommon)";
            if (eventTemplate.type === 'debuff') titleColor = "#ff4444";
            if (eventTemplate.type === 'mixed') titleColor = "var(--legendary)";

            // Replace [X] and [Y]
            if (activeEx.length === 0) {
                finalDesc = "Día de descanso absoluto. No hay ejercicios programados.";
                titleColor = "var(--rare)";
            } else {
                const getTarget = (isDebuff) => {
                    let pool = isDebuff ? penEx : activeEx;
                    if(pool.length === 0) return null;
                    return pool[Math.floor(Math.random() * pool.length)].name;
                };

                let x = getTarget(eventTemplate.type === 'debuff' || eventTemplate.type === 'mixed');
                let y = getTarget(false);

                if(!x && (eventTemplate.type === 'debuff' || eventTemplate.type === 'mixed')) {
                    // Fallback if all are immune
                    eventTemplate.title = "Aura Protectora";
                    finalDesc = "Tus ejercicios activos son inmunes. No sufres penalizaciones hoy.";
                    titleColor = "var(--rare)";
                } else {
                    if(!y) y = x; // Fallback
                    finalDesc = finalDesc.replace('[X]', `<strong style="color:var(--text-main)">${x}</strong>`);
                    finalDesc = finalDesc.replace('[Y]', `<strong style="color:var(--text-main)">${y}</strong>`);
                }
            }

            state.todayEventText = `
                <div class="event-title" style="color: ${titleColor}">${eventTemplate.title}</div>
                <div class="text-sm muted">${finalDesc}</div>
            `;
            
            saveState();
            checkDailyMap();
        }

        // --- DASHBOARD & RAID ---
        function checkRaidAvailability() {
            const raidZone = document.getElementById('raid-zone');
            const btn = document.getElementById('btn-raid');
            
            if (currentDayIdx === 6) { // Saturday
                raidZone.style.display = 'block';
                const available = getUpgradable();
                if (state.lastRaidDate === currentDateStr || available.length === 0) {
                    btn.disabled = true;
                    btn.innerText = available.length === 0 ? "Arsenal al Máximo" : "Ciclo Completado";
                } else {
                    btn.disabled = false;
                    btn.innerText = "Mejorar Ejercicio";
                }
            } else {
                raidZone.style.display = 'none';
            }
        }

        function getUpgradable() {
            return Object.keys(state.exercises).filter(id => {
                const lvl = state.progress[id] || 0;
                return lvl < state.exercises[id].levels.length - 1;
            });
        }

        function executeRaid() {
            const upg = getUpgradable();
            if(upg.length === 0) return;

            const targetId = upg[Math.floor(Math.random() * upg.length)];
            const ex = state.exercises[targetId];
            
            const currentLvl = state.progress[targetId];
            const nextLvl = currentLvl + 1;
            const variantData = ex.levels[nextLvl];
            const rarityInfo = RARITIES[variantData.rarity];
            
            state.progress[targetId] = nextLvl;
            state.xp += rarityInfo.xp;
            state.saturdaysCompleted++;
            state.lastRaidDate = currentDateStr;

            state.history.unshift({
                date: new Date().toLocaleDateString(),
                text: `[${rarityInfo.name}] ${ex.name} evolucionó a: ${variantData.name} (+${rarityInfo.xp}XP)`,
                color: rarityInfo.hex
            });

            saveState();
            updateUI();
            checkRaidAvailability();
            alert(`¡Mejora obtenida!\n\n${ex.name} ➔ ${variantData.name}\nRareza: ${rarityInfo.name} (+${rarityInfo.xp} XP)`);
        }

        // --- UI ---
        function updateUI() {
            updateHeader();
            renderToday();
            renderProfile();
            renderEditorList();
        }

        function updateHeader() {
            document.getElementById('header-xp').innerText = state.xp;
            document.getElementById('stat-xp').innerText = state.xp;
            document.getElementById('stat-saturdays').innerText = state.saturdaysCompleted;
        }

        function renderToday() {
            const grid = document.getElementById('today-grid');
            grid.innerHTML = '';
            
            const active = getActiveExercises();
            if(active.length === 0) {
                grid.innerHTML = '<div class="muted">No hay ejercicios programados para hoy.</div>';
                return;
            }

            active.forEach(ex => {
                const lvlIdx = state.progress[ex.id] || 0;
                const variant = ex.levels[lvlIdx];
                const r = RARITIES[variant.rarity];
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-tags">
                                <span class="tag" style="color: ${r.hex}; border-color: ${r.hex}">${r.name}</span>
                                ${ex.immune ? '<span class="tag immune">Inmune</span>' : ''}
                            </div>
                            <div class="card-title">${ex.name}</div>
                            <div class="text-sm" style="color: ${r.hex};">${variant.name}</div>
                        </div>
                        <div class="muted text-sm">${variant.desc}</div>
                    </div>
                `;
            });
        }

        function renderProfile() {
            const log = document.getElementById('history-log');
            log.innerHTML = state.history.length === 0 ? '<div class="muted">Sin registros.</div>' : '';
            state.history.forEach(h => {
                log.innerHTML += `<div style="padding: 10px 0; border-bottom: 1px solid var(--border);">
                    <div style="color: var(--text-muted); font-size: 0.7rem;">${h.date}</div>
                    <div style="color: ${h.color}; margin-top: 4px;">${h.text}</div>
                </div>`;
            });
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            btn.classList.add('active');
        }

        // --- EDITOR LOGIC ---
        let editingId = null;

        function renderEditorList() {
            const list = document.getElementById('editor-list');
            list.innerHTML = '';
            Object.entries(state.exercises).forEach(([id, ex]) => {
                list.innerHTML += `
                    <div class="list-item" onclick="loadExercise('${id}')">
                        <div>
                            <div>${ex.name}</div>
                            <div class="text-sm muted">${ex.levels.length} Fases | Días: ${ex.days.length}</div>
                        </div>
                        <div class="muted">→</div>
                    </div>
                `;
            });
        }

        function createExercise() {
            const id = 'ex_' + Date.now();
            state.exercises[id] = {
                name: "Nuevo Ejercicio", days: [1,3,5], immune: false,
                levels: [{ name: "Base", desc: "...", rarity: "common" }]
            };
            state.progress[id] = 0;
            saveState();
            updateUI();
            loadExercise(id);
        }

        function loadExercise(id) {
            editingId = id;
            const ex = state.exercises[id];
            
            document.getElementById('editor-form').style.display = 'block';
            document.getElementById('edit-name').value = ex.name;
            document.getElementById('edit-immune').checked = ex.immune;
            
            const daysContainer = document.getElementById('edit-days');
            daysContainer.innerHTML = '';
            DAYS.forEach((d, idx) => {
                const checked = ex.days.includes(idx);
                daysContainer.innerHTML += `
                    <label class="day-label ${checked ? 'selected' : ''}">
                        <input type="checkbox" onchange="toggleDay(${idx}, this)" ${checked ? 'checked' : ''}>
                        ${d.substring(0,3)}
                    </label>
                `;
            });

            renderEditVariants();
        }

        function toggleDay(dayIdx, checkbox) {
            const ex = state.exercises[editingId];
            if (checkbox.checked) {
                if(!ex.days.includes(dayIdx)) ex.days.push(dayIdx);
            } else {
                ex.days = ex.days.filter(d => d !== dayIdx);
            }
            saveState();
            loadExercise(editingId); // reload to update UI classes
            renderToday();
        }

        function saveBasicInfo() {
            if(!editingId) return;
            const ex = state.exercises[editingId];
            ex.name = document.getElementById('edit-name').value;
            ex.immune = document.getElementById('edit-immune').checked;
            saveState();
            renderEditorList();
            renderToday();
        }

        function renderEditVariants() {
            const container = document.getElementById('edit-variants');
            container.innerHTML = '';
            const ex = state.exercises[editingId];
            
            let rarityOpts = '';
            for(let key in RARITIES) {
                rarityOpts += `<option value="${key}">${RARITIES[key].name} (+${RARITIES[key].xp} XP)</option>`;
            }

            ex.levels.forEach((lvl, idx) => {
                const r = RARITIES[lvl.rarity];
                container.innerHTML += `
                    <div class="variant-box">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span class="text-sm muted">FASE ${idx + 1}</span>
                            ${ex.levels.length > 1 ? `<button class="btn" style="padding:2px 8px; font-size:0.7rem;" onclick="removeVariant(${idx})">Eliminar</button>` : ''}
                        </div>
                        <input type="text" value="${lvl.name}" onchange="updateVariant(${idx}, 'name', this.value)" style="margin-bottom:10px;">
                        
                        <div style="display:flex; gap:10px; margin-bottom:10px;">
                            <select style="flex:1;" onchange="updateVariant(${idx}, 'rarity', this.value)">
                                ${rarityOpts.replace(`value="${lvl.rarity}"`, `value="${lvl.rarity}" selected`)}
                            </select>
                        </div>
                        
                        <textarea rows="2" onchange="updateVariant(${idx}, 'desc', this.value)">${lvl.desc}</textarea>
                    </div>
                `;
            });
        }

        function addVariant() {
            state.exercises[editingId].levels.push({ name: "Nueva Fase", desc: "", rarity: "common" });
            saveState();
            renderEditVariants();
        }

        function updateVariant(idx, field, val) {
            state.exercises[editingId].levels[idx][field] = val;
            saveState();
            renderToday();
        }

        function removeVariant(idx) {
            const ex = state.exercises[editingId];
            ex.levels.splice(idx, 1);
            if(state.progress[editingId] >= ex.levels.length) state.progress[editingId] = ex.levels.length - 1;
            saveState();
            renderEditVariants();
            renderToday();
        }

        function deleteExercise() {
            if(confirm("¿Eliminar ejercicio y perder progreso?")) {
                delete state.exercises[editingId];
                delete state.progress[editingId];
                editingId = null;
                document.getElementById('editor-form').style.display = 'none';
                saveState();
                updateUI();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
