<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calistenia Roguelike - Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141417;
            --surface-hover: #1f1f24;
            --text-main: #f0f0f0;
            --text-muted: #8a8a93;
            --border: #2a2a35;
            
            --accent: #d4af37; /* Gold */
            --accent-dim: rgba(212, 175, 55, 0.15);
            
            /* Rarities */
            --rarity-common: #a0a0a0;
            --rarity-uncommon: #4caf50;
            --rarity-rare: #2196f3;
            --rarity-epic: #9c27b0;
            --rarity-legendary: #ff9800;
            
            --font-ui: 'Inter', sans-serif;
            --font-head: 'Playfair Display', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-ui);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding-bottom: 90px;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .serif {
            font-family: var(--font-head);
            font-weight: 600;
        }

        /* HEADER */
        header {
            background: rgba(20, 20, 23, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .date-display {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* NAV */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(20, 20, 23, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 100;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav button.active {
            color: var(--accent);
        }

        /* SECTIONS */
        .section {
            display: none;
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RAID ZONE */
        .raid-zone {
            text-align: center;
            padding: 40px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .raid-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .raid-btn:hover:not(:disabled) {
            background: var(--accent-dim);
        }

        .raid-btn:disabled {
            border-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            background: transparent;
        }

        .status-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* GRIDS & CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .card .variant {
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .progress-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            height: 4px;
            flex-grow: 1;
            background: var(--border);
            border-radius: 2px;
        }

        .dot.filled {
            background: var(--accent);
        }

        /* GACHA MODAL (CHOICE) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .choice-container {
            text-align: center;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .choice-title {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .choice-card {
            background: var(--surface);
            border: 2px solid;
            border-radius: 12px;
            padding: 30px 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .choice-card:hover {
            transform: scale(1.05);
        }

        .rarity-badge {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.5);
        }

        /* EDITOR (CRUD) */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media(max-width: 768px) {
            .editor-container { grid-template-columns: 1fr; }
        }

        .list-panel, .edit-panel {
            background: var(--surface);
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            font-family: var(--font-ui);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            background: var(--bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn-primary { border-color: var(--accent); color: var(--accent); }
        .btn-danger { border-color: #f44336; color: #f44336; }
        
        .ex-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .ex-list-item:hover { background: var(--bg); }

        .variant-item {
            background: var(--bg);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* UTILS */
        .xp-text {
            font-family: var(--font-head);
            font-size: 1.2rem;
            margin-top: 15px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; text-align: center; border-radius: 8px;
        }
        .stat-val { font-size: 2rem; color: var(--accent); font-family: var(--font-head); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }

    </style>
</head>
<body>

    <header>
        <div class="brand serif">ROGUE.FIT</div>
        <div class="date-display">
            <div id="current-day" style="color: var(--text-main); font-weight: 600;"></div>
            <div id="current-date"></div>
        </div>
    </header>

    <main>
        <!-- DASHBOARD -->
        <section id="tab-dashboard" class="section active">
            <div class="raid-zone">
                <h2 class="serif" style="font-size: 2.2rem; margin-bottom: 10px;">La Forja</h2>
                <p style="color: var(--text-muted);">El entrenamiento intensivo solo se habilita al final del ciclo semanal.</p>
                <button id="btn-raid" class="raid-btn">Desatar Potencial</button>
                <div id="raid-status" class="status-text">Analizando parámetros temporales...</div>
            </div>
            
            <h3 class="serif" style="margin-bottom: 20px; color: var(--text-muted);">Arsenal Actual</h3>
            <div class="grid" id="exercises-grid"></div>
        </section>

        <!-- PROFILE -->
        <section id="tab-profile" class="section">
            <h2 class="serif" style="font-size: 2.5rem; text-align: center; margin-bottom: 30px; color: var(--accent);" id="rank-display">Rango: Iniciado</h2>
            
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-val" id="stat-xp">0</div>
                    <div class="stat-label">Experiencia</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="stat-saturdays">0</div>
                    <div class="stat-label">Ciclos Completados</div>
                </div>
            </div>

            <h3 class="serif" style="margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Bitácora</h3>
            <div id="history-list" style="font-size: 0.9rem;"></div>
        </section>

        <!-- EDITOR (CRUD) -->
        <section id="tab-editor" class="section">
            <h2 class="serif" style="margin-bottom: 20px;">Gestor de Arsenal</h2>
            <div class="editor-container">
                <div class="list-panel">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <h3>Ejercicios</h3>
                        <button class="btn btn-primary" onclick="createNewExercise()">+ Nuevo</button>
                    </div>
                    <div id="editor-exercise-list"></div>
                </div>
                
                <div class="edit-panel" id="edit-panel-content" style="display: none;">
                    <h3 style="margin-bottom: 15px; color: var(--accent);">Editando: <span id="edit-ex-title"></span></h3>
                    <input type="hidden" id="edit-ex-id">
                    
                    <div class="form-group">
                        <label>Nombre del Ejercicio</label>
                        <input type="text" id="edit-ex-name" onchange="saveBasicExerciseInfo()">
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px 0;">
                        <h4>Fases de Evolución</h4>
                        <button class="btn" onclick="addVariant()">+ Añadir Fase</button>
                    </div>
                    
                    <div id="edit-variants-list"></div>
                    
                    <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px; text-align: right;">
                        <button class="btn btn-danger" onclick="deleteCurrentExercise()">Eliminar Ejercicio Completo</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav>
        <button class="active" onclick="switchTab('dashboard', this)">Campamento</button>
        <button onclick="switchTab('profile', this)">Atleta</button>
        <button onclick="switchTab('editor', this)">Gestor</button>
    </nav>

    <!-- GACHA MODAL -->
    <div id="gacha-modal" class="modal-overlay">
        <div class="choice-container">
            <h2 class="choice-title serif">Elige tu Mejora</h2>
            <div class="choice-grid" id="choice-grid">
                <!-- Se inyectan las 3 cartas via JS -->
            </div>
        </div>
    </div>

    <script>
        // --- DEFAULT DATA ---
        const DEFAULT_EXERCISES = {
            "ex_1": {
                name: "Flexiones Diamante",
                levels: [
                    { name: "Inclinadas", desc: "Manos juntas sobre elevación. Adaptación articular." },
                    { name: "Suelo", desc: "El estándar. Tríceps bajo tensión." },
                    { name: "Pausa 2s", desc: "Elimina inercia. Tensión isométrica abajo." },
                    { name: "Declinadas", desc: "Pies elevados. Mayor carga sobre cadena anterior." }
                ]
            },
            "ex_2": {
                name: "Dominadas",
                levels: [
                    { name: "Asistidas (Banda)", desc: "Construyendo la vía neuronal de tracción." },
                    { name: "Estrictas", desc: "Barbilla sobre la barra. Sin balanceo." },
                    { name: "L-Sit Pull-up", desc: "Core activado al máximo. Fricción pura." }
                ]
            },
            "ex_3": {
                name: "Pistol Squat",
                levels: [
                    { name: "Asistida", desc: "Apoyo ligero en poste o marco." },
                    { name: "Al Cajón", desc: "Rompe el paralelo pero con seguridad abajo." },
                    { name: "Estricta", desc: "Rango completo. Equilibrio y fuerza bruta." },
                    { name: "Con Salto", desc: "Potencia pliométrica a una pierna." }
                ]
            }
        };

        const RARITIES = [
            { id: 'common', name: 'Común', color: 'var(--rarity-common)', chance: 50, xpMult: 1 },
            { id: 'uncommon', name: 'Poco Común', color: 'var(--rarity-uncommon)', chance: 25, xpMult: 1.5 },
            { id: 'rare', name: 'Raro', color: 'var(--rarity-rare)', chance: 15, xpMult: 2 },
            { id: 'epic', name: 'Épico', color: 'var(--rarity-epic)', chance: 9, xpMult: 3 },
            { id: 'legendary', name: 'Legendario', color: 'var(--rarity-legendary)', chance: 1, xpMult: 5 }
        ];

        let state = {
            exercises: null,
            progress: {}, // { ex_id: currentLevelIndex }
            xp: 0,
            saturdaysCompleted: 0,
            lastRaidDate: null,
            history: []
        };

        // --- INIT & TIME LOGIC ---
        function init() {
            loadState();
            setupDateDisplay();
            checkRaidAvailability();
            updateUI();
            
            document.getElementById('btn-raid').addEventListener('click', startRaid);
        }

        function loadState() {
            const saved = localStorage.getItem('rogueFitState');
            if (saved) {
                state = JSON.parse(saved);
                // Sync progress with exercises in case they were edited
                for (let key in state.exercises) {
                    if (state.progress[key] === undefined) state.progress[key] = 0;
                    if (state.progress[key] >= state.exercises[key].levels.length) {
                        state.progress[key] = state.exercises[key].levels.length - 1;
                    }
                }
            } else {
                state.exercises = JSON.parse(JSON.stringify(DEFAULT_EXERCISES));
                for (let key in state.exercises) {
                    state.progress[key] = 0;
                }
                saveState();
            }
        }

        function saveState() {
            localStorage.setItem('rogueFitState', JSON.stringify(state));
        }

        function setupDateDisplay() {
            const d = new Date();
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            document.getElementById('current-day').innerText = days[d.getDay()];
            document.getElementById('current-date').innerText = d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function checkRaidAvailability() {
            const d = new Date();
            const isSaturday = d.getDay() === 6;
            const dateStr = d.toDateString();
            
            const btn = document.getElementById('btn-raid');
            const status = document.getElementById('raid-status');

            if (!isSaturday) {
                btn.disabled = true;
                status.innerText = "Sistemas bloqueados. Esperando al Sábado para autorización.";
                return;
            }

            if (state.lastRaidDate === dateStr) {
                btn.disabled = true;
                status.innerText = "Ciclo de mejora completado por esta semana.";
                return;
            }

            // Check if there are exercises left to upgrade
            const upgradable = getUpgradableExercises();
            if (upgradable.length === 0) {
                btn.disabled = true;
                status.innerText = "Has alcanzado el límite genético en todo tu arsenal.";
                return;
            }

            btn.disabled = false;
            status.innerText = "Protocolo listo. Elige tu destino.";
        }

        function getUpgradableExercises() {
            return Object.keys(state.exercises).filter(key => {
                return state.progress[key] < state.exercises[key].levels.length - 1;
            });
        }

        // --- GACHA & RAID LOGIC ---
        function getRandomRarity() {
            const roll = Math.random() * 100;
            let cumulative = 0;
            for (let r of RARITIES) {
                cumulative += r.chance;
                if (roll <= cumulative) return r;
            }
            return RARITIES[0];
        }

        function startRaid() {
            const available = getUpgradableExercises();
            if(available.length === 0) return;

            // Shuffle and pick up to 3
            available.sort(() => 0.5 - Math.random());
            const options = available.slice(0, 3);

            const grid = document.getElementById('choice-grid');
            grid.innerHTML = '';

            options.forEach(exId => {
                const ex = state.exercises[exId];
                const currentLvlIdx = state.progress[exId];
                const nextVariant = ex.levels[currentLvlIdx + 1];
                const rarity = getRandomRarity();
                
                const baseXP = 100 * (currentLvlIdx + 1);
                const finalXP = Math.round(baseXP * rarity.xpMult);

                const card = document.createElement('div');
                card.className = 'choice-card';
                card.style.borderColor = rarity.color;
                card.innerHTML = `
                    <div class="rarity-badge" style="color: ${rarity.color}; border: 1px solid ${rarity.color};">${rarity.name}</div>
                    <h3 style="margin-top: 15px; color: #fff;">${ex.name}</h3>
                    <div style="color: var(--text-muted); font-size: 0.9rem;">Sube a Nivel ${currentLvlIdx + 2}</div>
                    <div style="margin: 15px 0; font-weight: 600; color: ${rarity.color};">${nextVariant.name}</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); min-height: 40px;">${nextVariant.desc}</div>
                    <div class="xp-text" style="color: ${rarity.color};">+${finalXP} XP</div>
                `;
                
                card.onclick = () => confirmChoice(exId, rarity, finalXP);
                grid.appendChild(card);
            });

            document.getElementById('gacha-modal').classList.add('show');
        }

        function confirmChoice(exId, rarity, xpGain) {
            const d = new Date();
            
            const exName = state.exercises[exId].name;
            const oldVariant = state.exercises[exId].levels[state.progress[exId]].name;
            
            state.progress[exId]++;
            const newVariant = state.exercises[exId].levels[state.progress[exId]].name;
            
            state.xp += xpGain;
            state.saturdaysCompleted++;
            state.lastRaidDate = d.toDateString();

            state.history.unshift({
                date: d.toLocaleDateString('es-ES'),
                exercise: exName,
                transition: `${oldVariant} → ${newVariant}`,
                rarity: rarity.name,
                color: rarity.color,
                xp: xpGain
            });

            saveState();
            document.getElementById('gacha-modal').classList.remove('show');
            
            updateUI();
            checkRaidAvailability();
        }

        // --- UI RENDERING ---
        function updateUI() {
            renderDashboard();
            renderProfile();
            renderEditorList();
        }

        function renderDashboard() {
            const grid = document.getElementById('exercises-grid');
            grid.innerHTML = '';
            
            for (let id in state.exercises) {
                const ex = state.exercises[id];
                const lvl = state.progress[id];
                const variant = ex.levels[lvl];
                const total = ex.levels.length;

                let dots = '';
                for(let i=0; i<total; i++) {
                    dots += `<div class="dot ${i <= lvl ? 'filled' : ''}"></div>`;
                }

                grid.innerHTML += `
                    <div class="card">
                        <h3>${ex.name}</h3>
                        <div class="variant">Fase ${lvl + 1}: ${variant.name}</div>
                        <div class="desc">${variant.desc}</div>
                        <div class="progress-dots">${dots}</div>
                    </div>
                `;
            }
        }

        function renderProfile() {
            document.getElementById('stat-xp').innerText = state.xp;
            document.getElementById('stat-saturdays').innerText = state.saturdaysCompleted;
            
            let rank = "Iniciado";
            if(state.xp > 1000) rank = "Discípulo";
            if(state.xp > 5000) rank = "Guerrero";
            if(state.xp > 15000) rank = "Maestro";
            document.getElementById('rank-display').innerText = `Rango: ${rank}`;

            const histContainer = document.getElementById('history-list');
            histContainer.innerHTML = '';
            state.history.forEach(h => {
                histContainer.innerHTML += `
                    <div style="padding: 15px 0; border-bottom: 1px solid var(--border);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span style="color: ${h.color}; font-weight:bold;">[${h.rarity}] ${h.exercise}</span>
                            <span style="color: var(--text-muted); font-size:0.8rem;">${h.date}</span>
                        </div>
                        <div style="color: #ccc;">${h.transition} <span style="color:${h.color}; font-size:0.85rem; float:right;">+${h.xp} XP</span></div>
                    </div>
                `;
            });
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            btn.classList.add('active');
        }

        // --- CRUD LOGIC ---
        let editingId = null;

        function renderEditorList() {
            const list = document.getElementById('editor-exercise-list');
            list.innerHTML = '';
            for (let id in state.exercises) {
                const ex = state.exercises[id];
                list.innerHTML += `
                    <div class="ex-list-item" onclick="loadExerciseForEdit('${id}')">
                        <span>${ex.name} <small style="color:var(--text-muted)">(${ex.levels.length} fases)</small></span>
                        <span style="color: var(--accent);">✎</span>
                    </div>
                `;
            }
        }

        function createNewExercise() {
            const newId = 'ex_' + Date.now();
            state.exercises[newId] = {
                name: "Nuevo Ejercicio",
                levels: [{ name: "Base", desc: "Descripción inicial" }]
            };
            state.progress[newId] = 0;
            saveState();
            renderEditorList();
            loadExerciseForEdit(newId);
            updateUI();
        }

        function loadExerciseForEdit(id) {
            editingId = id;
            const ex = state.exercises[id];
            
            document.getElementById('edit-panel-content').style.display = 'block';
            document.getElementById('edit-ex-title').innerText = ex.name;
            document.getElementById('edit-ex-name').value = ex.name;
            
            renderEditVariants();
        }

        function saveBasicExerciseInfo() {
            if(!editingId) return;
            const newName = document.getElementById('edit-ex-name').value;
            state.exercises[editingId].name = newName;
            document.getElementById('edit-ex-title').innerText = newName;
            saveState();
            renderEditorList();
            updateUI();
        }

        function renderEditVariants() {
            const list = document.getElementById('edit-variants-list');
            list.innerHTML = '';
            const levels = state.exercises[editingId].levels;
            
            levels.forEach((lvl, idx) => {
                list.innerHTML += `
                    <div class="variant-item">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <strong style="color: var(--text-muted);">Fase ${idx + 1}</strong>
                            ${levels.length > 1 ? `<button class="btn btn-danger" style="padding:2px 8px; font-size:0.7rem;" onclick="removeVariant(${idx})">Borrar</button>` : ''}
                        </div>
                        <input type="text" placeholder="Nombre de fase" value="${lvl.name}" onchange="updateVariant(${idx}, 'name', this.value)" style="margin-bottom:8px;">
                        <textarea placeholder="Descripción" rows="2" onchange="updateVariant(${idx}, 'desc', this.value)">${lvl.desc}</textarea>
                    </div>
                `;
            });
        }

        function addVariant() {
            state.exercises[editingId].levels.push({ name: "Nueva Fase", desc: "..." });
            saveState();
            renderEditVariants();
            updateUI();
        }

        function updateVariant(idx, field, value) {
            state.exercises[editingId].levels[idx][field] = value;
            saveState();
            updateUI();
        }

        function removeVariant(idx) {
            const levels = state.exercises[editingId].levels;
            if(levels.length <= 1) return;
            
            levels.splice(idx, 1);
            // Adjust progress if necessary
            if (state.progress[editingId] >= levels.length) {
                state.progress[editingId] = levels.length - 1;
            }
            saveState();
            renderEditVariants();
            updateUI();
        }

        function deleteCurrentExercise() {
            if(confirm('¿Eliminar este ejercicio y todo su progreso?')) {
                delete state.exercises[editingId];
                delete state.progress[editingId];
                editingId = null;
                document.getElementById('edit-panel-content').style.display = 'none';
                saveState();
                renderEditorList();
                updateUI();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
