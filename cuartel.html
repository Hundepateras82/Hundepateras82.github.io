<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuartel General - Creador</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: #050914; color: white;
            font-family: 'Nunito', sans-serif; display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
        }

        /* BARRA DE HERRAMIENTAS SUPERIOR */
        .toolbar {
            background: #162032; border-bottom: 2px solid #e11d48;
            padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; z-index: 100; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tools-left, .tools-right { display: flex; gap: 8px; align-items: center; }

        button {
            background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
            padding: 8px 12px; border-radius: 8px; font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        button:hover { background: #334155; }
        button:active { transform: scale(0.95); }
        
        .btn-nexo { background: transparent; border-color: transparent; font-size: 20px; padding: 5px; }
        .btn-primary { background: #e11d48; border-color: #be123c; color: white; }
        .btn-primary:hover { background: #f43f5e; border-color: #e11d48; }
        
        .btn-toggle.active { background: #10b981; border-color: #059669; color: white; }

        /* LIENZO DONDE SE DIBUJA EL HTML */
        .workspace {
            flex-grow: 1; background: #fff; width: 100%; position: relative;
        }
        iframe {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* MODAL PARA PEGAR CÓDIGO */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(5, 9, 20, 0.9);
            display: flex; flex-direction: column; z-index: 2000;
            padding: 20px; backdrop-filter: blur(5px);
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h2 { margin: 0; color: #06b6d4; font-weight: 900; text-transform: uppercase; }

        textarea {
            flex-grow: 1; background: #0f172a; color: #38bdf8;
            border: 2px solid #1e293b; border-radius: 12px; padding: 15px;
            font-family: monospace; font-size: 14px; resize: none; outline: none;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }
        textarea:focus { border-color: #06b6d4; }

        .modal-footer { margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px; }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #10b981; color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 14px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tools-left">
            <button class="btn-nexo" onclick="window.location.href='index.html'" title="Volver al Nexo">🔙</button>
            <button onclick="openModal()">📋 Pegar Código</button>
        </div>
        <div class="tools-right">
            <button id="btn-edit" class="btn-toggle" onclick="toggleEditMode()">✏️ Modo Edición</button>
            <button class="btn-primary" onclick="exportCode()">💾 Copiar Resultado</button>
        </div>
    </div>

    <div class="workspace">
        <iframe id="canvas"></iframe>
    </div>

    <div id="code-modal" class="modal-overlay">
        <div class="modal-header">
            <h2>🛠️ Cargar Plantilla HTML</h2>
            <button onclick="closeModal()">❌ Cerrar</button>
        </div>
        <textarea id="html-input" placeholder="Pega aquí todo el código HTML de tu plan de batalla..."></textarea>
        <div class="modal-footer">
            <button onclick="closeModal()">Cancelar</button>
            <button class="btn-primary" onclick="loadHTML()">⚡ Renderizar Misión</button>
        </div>
    </div>

    <div id="toast" class="toast">¡Copiado al portapapeles!</div>

    <script>
        const iframe = document.getElementById('canvas');
        const modal = document.getElementById('code-modal');
        const inputArea = document.getElementById('html-input');
        const btnEdit = document.getElementById('btn-edit');
        const toast = document.getElementById('toast');
        let isEditing = false;

        // Recuperar progreso de la última sesión si existe
        window.onload = () => {
            const savedHtml = localStorage.getItem('cuartel_html_save');
            if (savedHtml) {
                renderToIframe(savedHtml);
            } else {
                // Estado por defecto
                renderToIframe('<div style="font-family:sans-serif; text-align:center; padding:50px; color:#666;"><h3>Lienzo vacío.</h3><p>Haz clic en "Pegar Código" para cargar tu misión.</p></div>');
            }
        };

        function openModal() { modal.classList.add('show'); }
        function closeModal() { modal.classList.remove('show'); }

        function loadHTML() {
            const code = inputArea.value;
            if(code.trim() === '') return closeModal();
            
            renderToIframe(code);
            closeModal();
            inputArea.value = ''; // Limpiar tras cargar
            
            // Si el modo edición estaba activo, lo aplicamos al nuevo HTML
            if(isEditing) {
                iframe.contentDocument.designMode = "on";
            }
        }

        function renderToIframe(htmlString) {
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlString);
            doc.close();
            // Guardar en localstorage automáticamente
            saveToLocal();
        }

        // EL MODO MAGIA: designMode="on" convierte la web en un editor de texto libre
        function toggleEditMode() {
            isEditing = !isEditing;
            const doc = iframe.contentWindow.document;
            
            if (isEditing) {
                doc.designMode = "on";
                btnEdit.classList.add('active');
                btnEdit.innerHTML = '✅ Edición Activa';
            } else {
                doc.designMode = "off";
                btnEdit.classList.remove('active');
                btnEdit.innerHTML = '✏️ Modo Edición';
                saveToLocal(); // Guarda al salir del modo edición
            }
        }

        function saveToLocal() {
            const currentHtml = `<html lang="es">\n${iframe.contentDocument.documentElement.innerHTML}\n</html>`;
            localStorage.setItem('cuartel_html_save', currentHtml);
        }

        function exportCode() {
            // Desactiva el modo diseño momentáneamente si está activo para no exportarlo con errores raros
            const wasEditing = isEditing;
            if(wasEditing) iframe.contentDocument.designMode = "off";

            // Recoger el HTML completo del iframe
            let docType = "<!DOCTYPE html>\n";
            let rawHtml = docType + `<html lang="es">\n${iframe.contentDocument.documentElement.innerHTML}\n</html>`;

            // Restaurar el modo edición si estaba activo
            if(wasEditing) iframe.contentDocument.designMode = "on";

            // Copiar al portapapeles
            navigator.clipboard.writeText(rawHtml).then(() => {
                showToast("¡HTML final copiado al portapapeles! 💾");
            }).catch(err => {
                alert("Error al copiar. Puede que tu navegador no lo soporte.");
            });
            
            saveToLocal();
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        // Auto-guardado cada 10 segundos por si acaso estás editando mucho tiempo
        setInterval(saveToLocal, 10000);
    </script>
</body>
</html>
