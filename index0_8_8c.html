<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYSTEM V0.8.8: RE-CALIBRATED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg-base: #0c0c12; --lavender: #b4a8d4; --mint: #8abfcc;
            --pink: #c49090; --gold: #c8b98a; --border-glass: rgba(180,168,212,0.12);
        }
        body { 
            background: var(--bg-base); color: var(--lavender); font-family: 'Space Grotesk', sans-serif; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
            padding-top: calc(env(safe-area-inset-top) + 5px);
            padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
        }
        .font-sys { font-family: 'Orbitron', sans-serif; }
        .glass-panel {
            background: linear-gradient(145deg, rgba(18,18,24,0.9) 0%, rgba(12,12,18,0.95) 100%);
            border: 1px solid var(--border-glass); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); border-radius: 16px;
        }
        .btn-aaa {
            background: linear-gradient(90deg, rgba(180,168,212,0.1), rgba(138,191,204,0.1));
            border: 1px solid var(--border-glass); color: var(--mint); transition: all 0.2s;
        }
        .btn-aaa:active { transform: scale(0.97); }
        .progress-bar { transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .story-glow { box-shadow: 0 0 15px var(--gold); border-color: var(--gold) !important; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        /* Gráfica de líneas SVG */
        .chart-svg { width: 100%; height: 100px; stroke: var(--mint); stroke-width: 2; fill: none; stroke-linecap: round; }
        .record-highlight { background: #fff700; color: #000; font-weight: bold; padding: 0 4px; border-radius: 2px; box-shadow: 0 0 10px #fff700; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="px-4">

    <header class="glass-panel p-5 mb-6 relative overflow-hidden">
        <div class="flex justify-between items-start mb-4 relative z-10">
            <div>
                <h1 class="font-sys font-bold text-xl text-[var(--mint)] tracking-wider">SYS<span class="text-[var(--pink)] text-xs ml-1">v0.8.8</span></h1>
                <p class="text-[10px] font-bold mt-1 uppercase text-[var(--gold)]">💰 <span id="hud-gold">0</span>G</p>
                <div id="active-potion-hud" class="text-[8px] font-bold text-[var(--mint)] mt-1 animate-pulse hidden uppercase tracking-tighter"></div>
            </div>
            <div class="text-right">
                <p class="font-sys font-bold text-3xl text-[var(--lavender)]">Tier <span id="hud-tier" class="text-white">I</span></p>
                <p id="hud-next-tier" class="text-[9px] text-[var(--mint)] font-bold uppercase tracking-widest mt-1">Siguiente: H</p>
            </div>
        </div>

        <div class="space-y-3 relative z-10">
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-[var(--pink)]"><span>Ciclo Solar</span> <span id="sys-countdown">--:--:--</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full overflow-hidden border border-[var(--pink)]/30">
                    <div id="hud-time-bar" class="progress-bar h-full bg-[var(--pink)]/80" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-[var(--lavender)]"><span>EXP</span> <span id="hud-exp-txt">0%</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full overflow-hidden border border-[var(--lavender)]/30">
                    <div id="hud-exp-bar" class="progress-bar h-full bg-[var(--lavender)]/80" style="width: 0%"></div>
                </div>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-1 uppercase text-[var(--mint)]"><span>MANÁ</span> <span id="hud-mana-txt">10/10</span></div>
                <div class="h-1.5 w-full bg-black/50 rounded-full overflow-hidden border border-[var(--mint)]/30">
                    <div id="hud-mana-bar" class="progress-bar h-full bg-[var(--mint)]/80" style="width: 100%"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="min-h-[50vh] pb-10"></main>
    <div id="side-toasts" class="fixed right-4 top-24 flex flex-col gap-2 z-50 pointer-events-none items-end"></div>

    <nav class="fixed bottom-0 left-0 w-full glass-panel border-t-0 rounded-t-3xl rounded-b-none p-4 grid grid-cols-5 gap-1 z-40">
        <button onclick="nav('home')" class="flex flex-col items-center nav-btn" id="nav-home"><span>⛺</span><span class="text-[8px] uppercase mt-1">Refugio</span></button>
        <button onclick="nav('lab')" class="flex flex-col items-center nav-btn" id="nav-lab"><span>⚗️</span><span class="text-[8px] uppercase mt-1">Lab</span></button>
        <button onclick="nav('dungeon')" class="flex flex-col items-center nav-btn" id="nav-dungeon"><span>⛩️</span><span class="text-[8px] uppercase mt-1">Abismo</span></button>
        <button onclick="nav('forge')" class="flex flex-col items-center nav-btn" id="nav-forge"><span>⚒️</span><span class="text-[8px] uppercase mt-1">Forja</span></button>
        <button onclick="nav('shop')" class="flex flex-col items-center nav-btn" id="nav-shop"><span>⚖️</span><span class="text-[8px] uppercase mt-1">Tienda</span></button>
    </nav>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex-col justify-center items-center p-6 text-center">
        <div class="glass-panel w-full p-8">
            <h3 id="modal-title" class="font-sys text-[14px] font-bold tracking-[0.2em] mb-4"></h3>
            <p id="modal-desc" class="text-sm text-gray-300 mb-8"></p>
            <button id="modal-btn" onclick="closeModal()" class="btn-aaa w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest">
                Cerrar (<span id="modal-timer">5</span>)
            </button>
        </div>
    </div>

    <script>
        const DB_KEY = 'sys_v0_8_8_save';
        const TIERS = {1:'I', 2:'H', 3:'G', 4:'F', 5:'E', 6:'D', 7:'C', 8:'B', 9:'A', 10:'S'};
        
        // Curva de EXP calibrada: Tier I -> H (400), Tier A -> S (100,000)
        const EXP_NEEDED = [0, 400, 1000, 3000, 7500, 15000, 30000, 50000, 75000, 100000];

        let s = JSON.parse(localStorage.getItem(DB_KEY)) || {
            lvl: 1, exp: 0, gold: 0, mana: 10,
            dailies: [{name: "Entrenamiento", done: false}],
            storyClaimed: Array(10).fill(false),
            races: [], // Historial de segundos
            potionInv: {}, activePot: null,
            equipment: [{ id:'we_1', type:'weapon', name: "Daga Oxidada", atk: 5, reqTier: 1 }],
            activeWepId: 'we_1', activeArmId: null,
            bosses: { b1: { name: "Duende", hp: 100, maxHp: 100 } },
            currentTab: 'home', subTabs: {}
        };

        let modalInterval;

        function save() { 
            localStorage.setItem(DB_KEY, JSON.stringify(s)); 
            updateHUD(); render(); 
        }

        function updateHUD() {
            document.getElementById('hud-tier').innerText = TIERS[s.lvl];
            document.getElementById('hud-gold').innerText = Math.floor(s.gold);
            let nextExp = EXP_NEEDED[s.lvl] || 100000;
            document.getElementById('hud-exp-bar').style.width = `${(s.exp/nextExp)*100}%`;
            document.getElementById('hud-exp-txt').innerText = `${Math.floor((s.exp/nextExp)*100)}%`;
            let maxM = 10 + (s.lvl * 5);
            document.getElementById('hud-mana-bar').style.width = `${(s.mana/maxM)*100}%`;
            document.getElementById('hud-mana-txt').innerText = `${Math.floor(s.mana)}/${maxM}`;
            
            const potHud = document.getElementById('active-potion-hud');
            if(s.activePot) { potHud.innerText = `✨ ${s.activePot.name}`; potHud.classList.remove('hidden'); }
            else { potHud.classList.add('hidden'); }
        }

        function sideToast(msg, color="var(--mint)") {
            const container = document.getElementById('side-toasts');
            const el = document.createElement('div');
            el.className = `glass-panel px-3 py-2 text-[10px] font-bold uppercase flex items-center gap-2 border-l-4`;
            el.style.borderLeftColor = color; el.innerHTML = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function showModal(title, desc) {
            clearInterval(modalInterval);
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerHTML = desc;
            document.getElementById('modal').classList.remove('hidden');
            let timeLeft = 5;
            document.getElementById('modal-timer').innerText = timeLeft;
            modalInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('modal-timer').innerText = timeLeft;
                if(timeLeft <= 0) closeModal();
            }, 1000);
        }

        function closeModal() {
            clearInterval(modalInterval);
            document.getElementById('modal').classList.add('hidden');
        }

        function checkTime() {
            let now = new Date();
            let start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            let diff = now - start;
            let pct = (diff / 86400000) * 100;
            document.getElementById('hud-time-bar').style.width = `${pct}%`;
            
            let rem = 86400000 - diff;
            let h = Math.floor(rem/3600000).toString().padStart(2,'0');
            let m = Math.floor((rem%3600000)/60000).toString().padStart(2,'0');
            let sec = Math.floor((rem%60000)/1000).toString().padStart(2,'0');
            document.getElementById('sys-countdown').innerText = `${h}:${m}:${sec}`;
        }
        setInterval(checkTime, 1000);

        function gain(type, amt) {
            if(type === 'exp') {
                let mult = s.activePot ? s.activePot.mult : 1;
                s.exp += amt * mult;
                let nextExp = EXP_NEEDED[s.lvl];
                if(s.exp >= nextExp && s.lvl < 10) {
                    s.exp = 0; s.lvl++;
                    showModal("EVOLUCIÓN", `TIER ${TIERS[s.lvl]} DESBLOQUEADO`);
                }
            }
            if(type === 'gold') s.gold += amt;
            save();
        }

        function nav(tab) { s.currentTab = tab; render(); }
        function setSubTab(st) { s.subTabs[s.currentTab] = st; render(); }

        function generateLineChart() {
            if(s.races.length < 2) return `<div class="text-[9px] text-center opacity-40 py-8 uppercase">Datos insuficientes</div>`;
            let max = Math.max(...s.races.map(r => r.val));
            let points = s.races.map((r, i) => {
                let x = (i / (s.races.length - 1)) * 100;
                let y = 100 - (r.val / max * 80 + 10);
                return `${x},${y}`;
            }).join(' ');
            return `<svg viewBox="0 0 100 100" class="chart-svg"><polyline points="${points}"/></svg>`;
        }

        function render() {
            const mc = document.getElementById('main-content'); let h = ""; const t = s.currentTab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-[var(--mint)]'));
            document.getElementById(`nav-${t}`).classList.add('text-[var(--mint)]');

            if(t === 'home') {
                const st = s.subTabs[t] || 'camp';
                h += `<div class="flex gap-2 mb-4"><button onclick="setSubTab('camp')" class="flex-1 py-2 text-[10px] uppercase font-bold glass-panel ${st==='camp'?'text-[var(--mint)]':''}">Carrera</button><button onclick="setSubTab('story')" class="flex-1 py-2 text-[10px] uppercase font-bold glass-panel ${st==='story'?'text-[var(--gold)]':''}">Historia</button></div>`;
                
                if(st === 'camp') {
                    h += `<div class="glass-panel p-4 mb-4">
                        <div class="flex gap-2 mb-4">
                            <input id="rm" type="number" placeholder="Min" class="w-full bg-black/40 p-2 rounded text-xs outline-none">
                            <input id="rs" type="number" placeholder="Seg" class="w-full bg-black/40 p-2 rounded text-xs outline-none">
                            <button onclick="let v = (parseInt(document.getElementById('rm').value)||0)*60 + (parseInt(document.getElementById('rs').value)||0); if(v>0){ s.races.push({val:v, date:Date.now()}); gain('exp', 150); gain('gold', 25); save(); }" class="btn-aaa px-4 rounded font-bold">ADD</button>
                        </div>
                        <div class="mb-4">${generateLineChart()}</div>
                        <div class="text-[10px] space-y-1">
                            <p class="text-gray-500 uppercase mb-2">Historial 7 días</p>`;
                            let maxV = s.races.length > 0 ? Math.max(...s.races.map(r => r.val)) : 0;
                            s.races.slice(-7).reverse().forEach(r => {
                                let isRecord = r.val === maxV;
                                h += `<div class="flex justify-between border-b border-white/5 py-1 ${isRecord?'record-highlight':''}">
                                    <span>${new Date(r.date).toLocaleDateString()}</span>
                                    <span>${Math.floor(r.val/60)}m ${r.val%60}s</span>
                                </div>`;
                            });
                    h += `</div></div>`;

                    h += `<div class="glass-panel p-4"><h3 class="text-[10px] uppercase mb-3">Misiones Diarias</h3>`;
                    s.dailies.forEach((d, i) => {
                        h += `<div class="flex items-center gap-2 mb-2 bg-black/20 p-2 rounded border border-white/5">
                            <span class="text-xs flex-1 ${d.done?'line-through opacity-50':''}">${d.name}</span>
                            ${!d.done ? `<button onclick="s.dailies[${i}].done=true; gain('exp', 100); gain('gold', 50); save();" class="text-[var(--mint)] text-[10px] font-bold">✔️</button>` : ''}
                            <button onclick="if(s.dailies[${i}].done) { sideToast('Solo reinicio', 'var(--pink)'); } else { s.dailies.splice(${i},1); save(); }" class="text-[var(--pink)] text-[10px]">❌</button>
                        </div>`;
                    });
                    if(s.dailies.length < 3) h += `<button onclick="s.dailies.push({name:'Misión nueva', done:false}); save();" class="w-full text-[10px] opacity-50 py-1">+</button>`;
                    h += `</div>`;
                } else {
                    const STORY_TX = ["El exilio...", "El encuentro...", "La primera sangre...", "El abismo...", "La corona de sombras..."];
                    STORY_TX.forEach((tx, i) => {
                        let can = s.lvl > i;
                        let claimed = s.storyClaimed[i];
                        h += `<div onclick="if(${can} && !${claimed}){ s.storyClaimed[${i}]=true; gain('gold',100); save(); }" class="glass-panel p-4 mb-3 border-l-4 ${can && !claimed ? 'story-glow border-[var(--gold)]' : 'border-gray-800'}">
                            <p class="text-[9px] font-bold text-[var(--gold)]">CAPÍTULO ${i+1}</p>
                            <p class="text-xs italic ${!can?'blur-sm':''}">${tx}</p>
                            ${can && !claimed ? '<p class="text-[8px] mt-2 animate-bounce text-[var(--gold)]">RECLAMAR 100G</p>':''}
                        </div>`;
                    });
                }
            }
            else if(t === 'lab') {
                h += `<div class="glass-panel p-4 mb-4 ${s.storyClaimed[0]?'':'story-glow'}">
                    <p class="text-[10px] text-[var(--mint)] font-bold">Mago del Reino:</p>
                    <p class="text-xs italic text-gray-300">"Ten cuidado con lo que mezclas, cazador. El equilibrio es frágil."</p>
                </div>`;
                h += `<div class="glass-panel p-4 text-center">
                    <p class="text-[10px] uppercase mb-4">Destilación</p>
                    <button onclick="s.potionInv['Poción EXP'] = (s.potionInv['Poción EXP']||0)+1; sideToast('Poción Creada'); save();" class="btn-aaa w-full py-3 rounded text-[10px] font-bold">CREAR POCIÓN EXP (x1.5)</button>
                    <div class="mt-4 space-y-2">`;
                    for(let p in s.potionInv) {
                        if(s.potionInv[p]>0) h += `<div class="flex justify-between items-center text-[10px] bg-black/40 p-2 rounded"><span>${p} (${s.potionInv[p]})</span><button onclick="s.activePot={name:'${p}', mult:1.5}; s.potionInv['${p}']--; save(); sideToast('Efecto Activado');" class="text-[var(--mint)]">USAR</button></div>`;
                    }
                h += `</div></div>`;
            }
            else if(t === 'dungeon') {
                let b = s.bosses.b1;
                let atk = s.equipment.find(e => e.id === s.activeWepId).atk + (s.lvl*2);
                h += `<div class="glass-panel p-6 text-center">
                    <h3 class="font-sys text-sm mb-4">${b.name}</h3>
                    <div class="h-4 w-full bg-black/50 rounded mb-6 border border-white/10 overflow-hidden">
                        <div class="h-full bg-red-500 progress-bar" style="width: ${(b.hp/b.maxHp)*100}%"></div>
                    </div>
                    <button onclick="if(s.mana>=2){ s.mana-=2; s.bosses.b1.hp-=${atk}; if(s.bosses.b1.hp<=0){ s.bosses.b1.hp=100; gain('exp',200); gain('gold',50); } save(); } else { sideToast('Sin Maná', 'var(--pink)'); }" class="btn-aaa w-full py-4 rounded-xl font-bold">ATACAR (2 MANÁ)</button>
                </div>`;
            }
            else if(t === 'forge') {
                h += `<div class="glass-panel p-4 h-[60vh] overflow-y-auto">
                    <p class="text-[10px] uppercase mb-4 text-gray-500 tracking-widest">Inventario de Armas</p>`;
                s.equipment.forEach(e => {
                    let active = s.activeWepId === e.id;
                    h += `<div class="flex justify-between items-center p-3 mb-2 rounded-xl bg-black/40 border ${active?'border-[var(--mint)]':'border-white/5'}">
                        <div><p class="text-xs font-bold">${e.name}</p><p class="text-[10px] opacity-50">ATK: ${e.atk}</p></div>
                        <button onclick="s.activeWepId='${e.id}'; save();" class="text-[10px] font-bold ${active?'text-[var(--mint)]':'opacity-40'}">${active?'EQUIPADO':'EQUIPAR'}</button>
                    </div>`;
                });
                h += `</div>`;
            }
            else if(t === 'shop') {
                h += `<div class="glass-panel p-4">
                    <p class="text-[10px] uppercase mb-4 text-center">Cofre de Armas (E-Tier)</p>
                    <button onclick="if(s.gold>=200){ gain('gold',-200); let id=Date.now(); s.equipment.push({id:id, name:'Espada Dragón', atk:20, type:'weapon'}); save(); showModal('COMPRA', 'Has obtenido: Espada Dragón'); } else { sideToast('Oro insuficiente', 'var(--pink)'); }" class="btn-aaa w-full py-4 rounded-xl font-bold">COMPRAR (200G)</button>
                </div>`;
            }

            mc.innerHTML = h;
        }

        render();
        updateHUD();
    </script>
</body>
</html>
