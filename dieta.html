<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexo Dieta Titán</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #050505; --bg-surface: #121212; --bg-card: #1e1e1e; --border: #333;
            --text-pri: #f5f5f5; --text-sec: #a0a0a0;
            --c-kcal: #fbbf24; --c-prot: #ef4444; --c-carb: #3b82f6; --c-fat: #22c55e;
            --c-nexo: #8b5cf6; --c-danger: #f43f5e; --c-shop: #eab308; --c-xp: #06b6d4;
            --safe-top: env(safe-area-inset-top, 40px);
            --safe-bot: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-base); color: var(--text-pri); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* HEADER NEXO Y BARRA XP */
        header { background: var(--bg-surface); padding: calc(var(--safe-top) + 10px) 20px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10;}
        .brand { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .lvl-badge { background: var(--c-nexo); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 900; box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
        
        .xp-container { background: var(--bg-surface); padding: 0 20px 15px; border-bottom: 1px solid var(--border); }
        .xp-bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 5px; }
        .xp-bar-fill { height: 100%; background: var(--c-xp); border-radius: 2px; transition: width 0.4s ease, background 0.3s; box-shadow: 0 0 8px var(--c-xp); }
        .xp-text { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-sec); font-weight: 800; text-transform: uppercase; }

        /* CONTENEDOR PRINCIPAL */
        .container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: calc(90px + var(--safe-bot)); }
        .view { display: none; animation: fadeIn 0.2s ease; } .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* TARJETAS Y UI */
        .card { background: var(--bg-card); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .card-title { font-size: 13px; font-weight: 800; color: var(--text-sec); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center;}
        
        input, select { width: 100%; background: var(--bg-base); border: 1px solid var(--border); color: var(--text-pri); padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--c-nexo); }
        .row { display: flex; gap: 10px; } .row > * { flex: 1; margin-bottom: 0;}
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 14px; font-weight: 800; border: none; cursor: pointer; text-align: center; margin-bottom: 10px; transition: 0.1s;}
        .btn:active { transform: scale(0.98); }
        .btn-pri { background: var(--text-pri); color: var(--bg-base); }
        .btn-sec { background: var(--bg-surface); color: var(--text-pri); border: 1px solid var(--border); }
        .btn-nexo-bg { background: var(--c-nexo); color: white; }
        .btn-icon { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 6px; width: 32px; height: 32px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* BARRAS DE PROGRESO 14 STATS */
        .macro-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px;}
        .m-box { background: var(--bg-surface); padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        .m-head { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; margin-bottom: 5px; color: var(--text-sec); text-transform: uppercase;}
        .m-bar-bg { height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; overflow: hidden; }
        .m-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

        .micro-list { display: flex; flex-direction: column; gap: 8px; }
        .micro-item { display: flex; align-items: center; justify-content: space-between; font-size: 11px; background: var(--bg-surface); padding: 6px 10px; border-radius: 6px; }
        .micro-bar-bg { width: 50%; height: 4px; background: rgba(0,0,0,0.5); border-radius: 2px; }
        .micro-bar-fill { height: 100%; border-radius: 2px; background: var(--c-nexo); transition: width 0.3s; }

        /* LISTAS */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-surface); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
        .item-info { flex: 1; }
        .item-name { font-size: 14px; font-weight: 800; }
        .item-sub { font-size: 11px; color: var(--text-sec); margin-top: 4px; }

        /* MISIONES RPG */
        .mission-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg-surface); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); transition: 0.3s;}
        .mission-item.done { border-color: var(--c-fat); background: rgba(34, 197, 94, 0.1); }
        .mission-icon { font-size: 20px; margin-right: 12px; }
        .mission-text { flex: 1; }
        .mission-xp { font-weight: 900; color: var(--c-xp); font-size: 12px; }

        /* TOAST NOTIFICATIONS */
        #toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(18, 18, 18, 0.95); border: 1px solid var(--c-xp); color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 800; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 5px var(--safe-bot); z-index: 100; }
        .nav-btn { flex: 1; background: none; border: none; color: var(--text-sec); font-size: 10px; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-btn.active { color: var(--c-nexo); }
        .nav-icon { font-size: 18px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="brand">Nexo Dieta</div>
        <div class="lvl-badge" id="ui-lvl">LVL 1</div>
    </header>
    <div class="xp-container">
        <div class="xp-text">
            <span id="ui-rank">Novato</span>
            <span><span id="ui-xp">0</span> / <span id="ui-xp-max">100</span> XP</span>
        </div>
        <div class="xp-bar-bg"><div id="ui-xp-bar" class="xp-bar-fill" style="width: 0%;"></div></div>
    </div>

    <div class="container">
        
        <div id="view-dash" class="view active">
            
            <div class="card">
                <div class="card-title">Balance Energético</div>
                <div class="macro-grid">
                    <div class="m-box">
                        <div class="m-head"><span style="color:var(--c-kcal)">KCAL</span> <span id="t-kcal">0</span></div>
                        <div class="m-bar-bg"><div id="b-kcal" class="m-bar-fill" style="background:var(--c-kcal)"></div></div>
                    </div>
                    <div class="m-box">
                        <div class="m-head"><span style="color:var(--c-prot)">PROT</span> <span id="t-prot">0g</span></div>
                        <div class="m-bar-bg"><div id="b-prot" class="m-bar-fill" style="background:var(--c-prot)"></div></div>
                    </div>
                    <div class="m-box">
                        <div class="m-head"><span style="color:var(--c-carb)">CARB</span> <span id="t-carb">0g</span></div>
                        <div class="m-bar-bg"><div id="b-carb" class="m-bar-fill" style="background:var(--c-carb)"></div></div>
                    </div>
                    <div class="m-box">
                        <div class="m-head"><span style="color:var(--c-fat)">GRASA</span> <span id="t-fat">0g</span></div>
                        <div class="m-bar-bg"><div id="b-fat" class="m-bar-fill" style="background:var(--c-fat)"></div></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Registro Rápido</div>
                <div class="row" style="margin-bottom: 10px;">
                    <select id="food-select" style="flex: 2; margin-bottom:0;"></select>
                    <input type="number" id="food-qty" placeholder="Gramos" value="100" style="margin-bottom:0;">
                </div>
                <button class="btn btn-nexo-bg" onclick="logFood()">Consumir (+10 XP)</button>
            </div>

            <div class="card">
                <div class="card-title">Historial de Hoy</div>
                <div id="today-log"></div>
            </div>

            <button class="btn" style="background: var(--border); color: white;" onclick="endDay()">🌙 CERRAR DÍA (+50 XP)</button>
        </div>

        <div id="view-rpg" class="view">
            <div class="card" style="text-align: center; padding: 30px 20px;">
                <div style="font-size: 50px; margin-bottom: 10px;">🔥</div>
                <div style="font-size: 24px; font-weight: 900; color: var(--c-kcal);" id="rpg-streak">0 DÍAS</div>
                <div style="font-size: 12px; color: var(--text-sec); text-transform: uppercase;">Racha Activa</div>
            </div>

            <div class="card">
                <div class="card-title">Misiones Diarias</div>
                <div id="mission-list">
                    </div>
            </div>
            
            <div class="card">
                <div class="card-title">Estadísticas de Jugador</div>
                <div class="list-item"><div class="item-info"><div class="item-name">Total XP Ganada</div></div> <div id="stat-xp">0</div></div>
                <div class="list-item"><div class="item-info"><div class="item-name">Días Completados</div></div> <div id="stat-days">0</div></div>
            </div>
        </div>

        <div id="view-db" class="view">
            <div class="card">
                <div class="card-title">Buscador Base de Datos</div>
                <input type="text" id="search-db" placeholder="Buscar..." onkeyup="renderDB()">
                <div id="db-render-list" style="max-height: 300px; overflow-y: auto; margin-top: 10px;"></div>
            </div>
        </div>

        <div id="view-stats" class="view">
             <div class="card">
                <div class="card-title">Backup Local (Seguridad)</div>
                <button class="btn btn-sec" onclick="exportData()">Exportar Partida (JSON)</button>
                <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
                <button class="btn btn-sec" onclick="document.getElementById('import-file').click()">Cargar Partida (JSON)</button>
            </div>
        </div>

    </div>

    <nav>
        <button class="nav-btn active" onclick="switchTab('dash', this)"><span class="nav-icon">📊</span>Dash</button>
        <button class="nav-btn" onclick="switchTab('rpg', this)"><span class="nav-icon">🎮</span>Perfil</button>
        <button class="nav-btn" onclick="switchTab('db', this)"><span class="nav-icon">📖</span>Base</button>
        <button class="nav-btn" onclick="switchTab('stats', this)"><span class="nav-icon">⚙️</span>Ajustes</button>
    </nav>

    <script>
        // ==========================================================
        // ##########################################################
        // #                                                        #
        // #          AQUI EMPIEZA LA BASE DE DATOS GIGANTE         #
        // #                                                        #
        // ##########################################################
        // ==========================================================
        
        const rawDB = {
            "Pechuga de Pollo": [165, 31, 0, 3.6, 0, 0, 0, 0, 0, 15, 1, 256, 29, 74],
            "Arroz Blanco (Crudo)": [353, 7, 79, 0.6, 1.3, 0.1, 0, 0, 0, 10, 1.2, 115, 25, 1],
            "Aceite de Oliva Virgen Extra": [884, 0, 0, 100, 0, 0, 0, 0, 0, 1, 0.6, 1, 0, 2],
            "Huevo Entero (Unidad 60g)": [93, 7.5, 0.5, 6.5, 0, 0.5, 85, 0, 1.2, 30, 1.1, 80, 7, 85],
            "Avena Copos": [389, 16.9, 66, 6.9, 10.6, 0.8, 0, 0, 0, 54, 4.7, 429, 177, 2],
            "Plátano": [89, 1.1, 22.8, 0.3, 2.6, 12.2, 3, 8.7, 0, 5, 0.3, 358, 27, 1],
            "Queso Fresco Batido 0%": [46, 8, 3.5, 0.1, 0, 3.5, 0, 0, 0, 120, 0, 150, 12, 40],
            "Whey Protein (Cazo 30g aprox)": [375, 80, 5, 4, 0, 3, 0, 0, 0, 450, 1.5, 500, 60, 150]
            // He dejado solo unas pocas para no saturar, ¡Pega tu bloque de 100 original aquí dentro!
        };

        // ==========================================================
        // ##########################################################
        // #                  FIN DE LA BASE DE DATOS               #
        // ##########################################################
        // ==========================================================

        const coreDB = Object.keys(rawDB).map((name, i) => {
            let v = rawDB[name];
            return { id: i+1, name, k:v[0], p:v[1], c:v[2], f:v[3], fib:v[4], sug:v[5], va:v[6], vc:v[7], vd:v[8], ca:v[9], fe:v[10], po:v[11], mg:v[12], na:v[13] };
        });

        // ================= 2. ESTADO =================
        const getDay = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        const today = getDay();
        
        let state = JSON.parse(localStorage.getItem('nexo_dieta_titan_rpg')) || {
            targets: { kcal: 2200, prot: 150, carb: 200, fat: 70, fib: 30, sug: 50 },
            customDB: [], history: {},
            // NUEVO SISTEMA RPG
            gamify: { xp: 0, level: 1, streak: 0, totalDays: 0, lastLogin: today }
        };
        
        // Misiones del día actual
        if(!state.history[today]) {
            // Comprobación de racha de conexión
            let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
            let yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
            if(state.gamify.lastLogin !== today && state.gamify.lastLogin !== yStr) {
                state.gamify.streak = 0; // Rompiste la racha
            }
            state.gamify.lastLogin = today;

            state.history[today] = { 
                log: [], burn: 0, done: false,
                missions: { m1: false, m2: false, m3: false } 
            };
        }
        
        let fullDB = [...coreDB, ...state.customDB].sort((a,b)=>a.name.localeCompare(b.name));

        function save() { localStorage.setItem('nexo_dieta_titan_rpg', JSON.stringify(state)); updateDash(); updateRPG(); }

        // ================= TOASTS (NOTIFICACIONES) =================
        function showToast(text, icon="🌟") {
            let box = document.getElementById('toast-container');
            let t = document.createElement('div');
            t.className = 'toast'; t.innerHTML = `<span>${icon}</span> <span>${text}</span>`;
            box.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(), 300); }, 3000);
        }

        // ================= SISTEMA XP Y NIVELES =================
        const getRank = (lvl) => {
            if(lvl < 5) return "Novato de Hierro";
            if(lvl < 10) return "Guerrero Metabólico";
            if(lvl < 20) return "Berserker de Macros";
            if(lvl < 50) return "Titán Nutricional";
            return "Dios del Olimpo";
        };

        function gainXP(amount, reason) {
            state.gamify.xp += amount;
            let reqXP = state.gamify.level * 100; // 100xp para lvl 2, 200xp para lvl 3...
            
            showToast(`${reason} (+${amount} XP)`, "⚡");

            if(state.gamify.xp >= reqXP) {
                state.gamify.xp -= reqXP;
                state.gamify.level++;
                setTimeout(() => showToast(`¡NIVEL AUMENTADO A ${state.gamify.level}!`, "🏆"), 1000);
            }
            save();
        }

        // ================= 3. NAVEGACIÓN =================
        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');
            btn.classList.add('active');
            if(id === 'db') renderDB();
            if(id === 'rpg') updateRPG();
        }

        // ================= 4. DASHBOARD Y CHECK MISIONES =================
        function getSums() {
            let log = state.history[today].log;
            let t = { k:0, p:0, c:0, f:0, fib:0 };
            log.forEach(i => {
                let m = i.name.includes('Unidad') || i.name.includes('Cazo') ? i.qty : i.qty/100;
                for(let key in t) t[key] += (i[key] || 0) * m;
            });
            return t;
        }

        function checkMissions(t) {
            let m = state.history[today].missions;
            let T = state.targets;
            
            // Misión 1: Berserker (Llegar a la proteína)
            if(!m.m1 && t.p >= T.prot) {
                state.history[today].missions.m1 = true;
                gainXP(50, "Misión: Berserker");
            }
            // Misión 2: Fibra Escudo (Llegar a fibra)
            if(!m.m2 && t.fib >= T.fib) {
                state.history[today].missions.m2 = true;
                gainXP(40, "Misión: Digestión de Acero");
            }
        }

        function updateDash() {
            document.getElementById('food-select').innerHTML = fullDB.map(f => `<option value="${f.id}">${f.name}</option>`).join('');

            let t = getSums();
            let T = state.targets;

            // Update Header RPG
            document.getElementById('ui-lvl').innerText = `LVL ${state.gamify.level}`;
            document.getElementById('ui-rank').innerText = getRank(state.gamify.level);
            document.getElementById('ui-xp').innerText = state.gamify.xp;
            let reqXP = state.gamify.level * 100;
            document.getElementById('ui-xp-max').innerText = reqXP;
            document.getElementById('ui-xp-bar').style.width = `${Math.min(100, (state.gamify.xp/reqXP)*100)}%`;

            // Update Macros
            const uM = (id, val, max) => {
                document.getElementById(`t-${id}`).innerText = `${Math.round(val)}`;
                document.getElementById(`b-${id}`).style.width = `${Math.min(100, (val/max)*100)}%`;
            };
            uM('kcal', t.k, T.kcal); uM('prot', t.p, T.prot); uM('carb', t.c, T.carb); uM('fat', t.f, T.fat);
            
            // Render Log Editable
            document.getElementById('today-log').innerHTML = state.history[today].log.map((i, idx) => `
                <div class="list-item">
                    <div class="item-info" style="flex: 1.5;">
                        <div class="item-name" style="font-size: 13px;">${i.name}</div>
                        <div class="item-sub">🔥 ${Math.round(i.k*(i.qty/100))}kc | 🥩 ${Math.round(i.p*(i.qty/100))}g</div>
                    </div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input type="number" value="${i.qty}" onchange="updateQty(${idx}, this.value)" style="width: 65px; padding: 8px 5px; margin-bottom: 0; text-align: center; font-size: 13px;">
                        <span style="font-size:11px; color:var(--text-sec);">g</span>
                        <button class="btn-icon" style="color:var(--c-danger);" onclick="delLog(${idx})">✖</button>
                    </div>
                </div>
            `).join('') || '<div style="font-size:12px; color:var(--text-sec);">Aún no has comido nada.</div>';

            checkMissions(t);
        }

        function logFood() {
            let id = document.getElementById('food-select').value;
            let qty = parseFloat(document.getElementById('food-qty').value);
            if(!id || isNaN(qty) || qty<=0) return;
            let item = fullDB.find(x => x.id == id);
            state.history[today].log.push({ ...item, qty });
            gainXP(10, "Registro de comida");
            document.getElementById('food-qty').value = "100";
            save(); 
        }
        
        function delLog(i) { state.history[today].log.splice(i, 1); save(); }
        
        function updateQty(idx, val) {
            let n = parseFloat(val);
            if(isNaN(n) || n <= 0) { delLog(idx); return; }
            state.history[today].log[idx].qty = n;
            save(); 
        }

        function endDay() { 
            if(state.history[today].done) return showToast("El día ya fue cerrado.", "⚠️");
            
            let t = getSums();
            // Misión 3: Control Calórico (Cerrar el día sin pasarse de Kcal, pero habiendo comido al menos un 50%)
            if(t.k <= state.targets.kcal && t.k > (state.targets.kcal*0.5)) {
                state.history[today].missions.m3 = true;
                gainXP(100, "Misión: Precisión Calórica");
            }

            state.history[today].done = true; 
            state.gamify.streak++;
            state.gamify.totalDays++;
            gainXP(50, "Día Completado");
            save(); 
        }

        // ================= VISTA RPG =================
        function updateRPG() {
            document.getElementById('rpg-streak').innerText = `${state.gamify.streak} DÍAS`;
            document.getElementById('stat-xp').innerText = state.gamify.level * 100 + state.gamify.xp; // Aprox
            document.getElementById('stat-days').innerText = state.gamify.totalDays;

            let m = state.history[today].missions;
            let mT = `
                <div class="mission-item ${m.m1 ? 'done' : ''}">
                    <div class="mission-icon">🥩</div>
                    <div class="mission-text"><div style="font-size:13px; font-weight:800;">Berserker</div><div style="font-size:10px; color:var(--text-sec);">Alcanza tu meta de Proteína</div></div>
                    <div class="mission-xp">${m.m1 ? 'COMPLETADA' : '+50 XP'}</div>
                </div>
                <div class="mission-item ${m.m2 ? 'done' : ''}">
                    <div class="mission-icon">🥦</div>
                    <div class="mission-text"><div style="font-size:13px; font-weight:800;">Digestión de Acero</div><div style="font-size:10px; color:var(--text-sec);">Alcanza tu meta de Fibra</div></div>
                    <div class="mission-xp">${m.m2 ? 'COMPLETADA' : '+40 XP'}</div>
                </div>
                <div class="mission-item ${m.m3 ? 'done' : ''}">
                    <div class="mission-icon">⚖️</div>
                    <div class="mission-text"><div style="font-size:13px; font-weight:800;">Precisión Calórica</div><div style="font-size:10px; color:var(--text-sec);">Cierra el día cumpliendo tus Kcal</div></div>
                    <div class="mission-xp">${m.m3 ? 'COMPLETADA' : '+100 XP'}</div>
                </div>
            `;
            document.getElementById('mission-list').innerHTML = mT;
        }

        // ================= COMPENDIO =================
        function renderDB() {
            let q = document.getElementById('search-db').value.toLowerCase();
            document.getElementById('db-render-list').innerHTML = fullDB.filter(x => x.name.toLowerCase().includes(q)).map(f => `
                <div class="list-item">
                    <div class="item-info">
                        <div class="item-name">${f.name}</div>
                        <div class="item-sub">${f.k}kc | ${f.p}P | ${f.c}C | ${f.f}F</div>
                    </div>
                </div>
            `).join('');
        }

        // ================= CONFIG =================
        function exportData() {
            let a=document.createElement('a'); a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(state)); a.download=`NexoRPG_${today}.json`; a.click();
        }
        function importData(e) {
            let f=e.target.files[0]; if(!f)return; let r=new FileReader();
            r.onload = ev => { try{ state=JSON.parse(ev.target.result); save(); location.reload(); }catch(err){alert("Error JSON");} }; r.readAsText(f);
        }

        updateDash();
        updateRPG();
    </script>
</body>
</html>
